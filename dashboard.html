              <Icon name="cash" size={15} /> Save licence
            </button>
            <button className="pricebook-btn" onClick={() => saveAgreementHistoryPacket()}>
              <Icon name="save" size={15} /> Save agreement log
            </button>
            <button className="pricebook-btn primary" onClick={() => saveRegisterRefreshPacket()}>
              <Icon name="connect" size={15} /> Save refresh log
            </button>
          </div>
        </div>

        <div className="settings-card">
          <div className="settings-title">Agreement Save History</div>
          <div className="settings-sub">Track agreement-save decisions before the live session-start endpoint is connected.</div>
          <div className="purchase-queue-list">
            {agreementSaveRows.map((item) => (
              <div className="purchase-queue-row" key={item.id}>
                <div className="purchase-queue-top">
                  <div>
                    <div className="purchase-queue-title">{item.value}</div>
                    <div className="purchase-queue-meta">{item.time} · {item.store} · {item.actor}</div>
                  </div>
                  <span className={`purchase-tag${item.status === 'Saved' ? ' blue' : ' amber'}`}>{item.status}</span>
                </div>
              </div>
            ))}
          </div>
        </div>

        <div className="settings-card">
          <div className="settings-title">Register Refresh Log</div>

          <div className="purchase-queue-list">
            {registerRefreshRows.map((item) => (
              <div className="purchase-queue-row" key={item.id}>
                <div className="purchase-queue-top">
                  <div>
                    <div className="purchase-queue-title">{item.previous} → {item.current}</div>
                    <div className="purchase-queue-meta">{item.time} · {item.store} · {item.source}</div>
                  </div>
                  <span className={`purchase-tag${item.status === 'Updated' || item.status === 'Reviewed' ? ' blue' : ' amber'}`}>{item.status}</span>
                </div>
              </div>

          </div>
        </div>

          </select>
          <div className="connect-status">
            <span className="source-dot"></span>
            <span>{currentLocation.manager} · {currentLocation.status}</span>
          </div>
          <div className="purchase-kv-list">
            <div className="purchase-kv"><span>Register</span><span>{registerStatus}</span></div>
            <div className="purchase-kv"><span>Agreement</span><span>{agreementAccepted ? 'Accepted' : 'Pending'}</span></div>
            <div className="purchase-kv"><span>Temp session</span><span>{tempSessionOpen ? 'Open' : 'Closed'}</span></div>
            <div className="purchase-kv"><span>Pending updates</span><span>{fmtN(releaseNeedsReviewCount)}</span></div>

          <label className="form-label">Logout reason</label>
          <select className="form-input" value={logoutReason} onChange={(e) => setLogoutReason(e.target.value)}>

          <label className="form-label">After logout</label>
          <select className="form-input" value={logoutDestination} onChange={(e) => setLogoutDestination(e.target.value)}>

          </select>
          <div className="pricebook-actions" style={{ marginTop: 16 }}>
            <button className="pricebook-btn" onClick={() => previewLogoutHandoff()}>
              <Icon name="report" size={15} /> Preview handoff
            </button>
            <button className="pricebook-btn" onClick={() => saveLogoutPacket()}>
              <Icon name="cash" size={15} /> Save packet
            </button>
          </div>
          <button className="connect-btn" onClick={() => confirmLogoutHandoff()}>
            <Icon name="close" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Confirm Log Out</span>
          </button>

          <div className="purchase-kv-list">

            <div className="purchase-kv"><span>Pending updates</span><span>{fmtN(releaseNeedsReviewCount)}</span></div>
            <div className="purchase-kv"><span>Current next step</span><span>{logoutDestination}</span></div>
          </div>
          <div className="purchase-queue-list" style={{ marginTop: 16 }}>
            {logoutQueue.map((item) => (
              <div className="purchase-queue-row" key={item.id}>
                <div className="purchase-queue-top">
                  <div>
                    <div className="purchase-queue-title">{item.reason}</div>
                    <div className="purchase-queue-meta">{item.time} · {item.store} · {item.destination}</div>
                  </div>
                  <span className={`purchase-tag${item.status === 'Complete' ? ' blue' : ' amber'}`}>{item.status}</span>
                </div>
              </div>
            ))}
          </div>
        </div>

          <div className="settings-sub">Replacement shell for Mercury temp-session open and new-screens feature toggle controls.</div>

            <span className="toggle-label">Legacy Mercury fallback</span>
            <span className={`purchase-tag${newScreensEnabled ? ' blue' : ''}`}>{newScreensEnabled ? 'Disabled' : 'Visible'}</span>

            <span>{tempSessionOpen ? 'Refresh Temp Session' : 'Open Temp Session'}</span>
          </button>
          <button className="connect-btn" style={{ marginTop: 10 }} onClick={() => showSessionNotice(`New screens ${newScreensEnabled ? 'enabled' : 'disabled'} in demo mode. Real \`/util/showNewScreens\` wiring still pending.`)}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Save Feature Toggle</span>
          </button>

        <div className="settings-card">

            {['gilbargo', 'ruby'].map((s) => (
              <div key={s} className={`pos-option${src === s ? ' active' : ''}`} onClick={() => setSrc(s)}>
                <Icon
                  name={s === 'gilbargo' ? 'fuel' : 'report'}
                  size={22}
                  bg={src === s ? 'rgba(39,198,107,0.16)' : 'rgba(148,163,184,0.14)'}
                  fg={src === s ? '#27C66B' : '#64748B'}
                  style={{ margin: '0 auto' }}
                />
                <div className="pos-label">{s === 'gilbargo' ? 'Gilbargo POS' : 'Ruby POS'}</div>

            <span>Connect POS System</span>

            <span>Not connected - using demo data</span>

          <input className="form-input" key={`store-manager-${currentLocation.id}`} defaultValue={currentLocation.manager} />
          <button className="connect-btn" onClick={() => showSessionNotice('Store details saved in demo mode. Real admin save endpoint still pending.')}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Save Details</span>
          </button>

        <div className="settings-card">

            </div>
          ))}
          <button className="connect-btn" onClick={() => showSessionNotice('Fuel price update saved in demo mode. Real endpoint still pending.')}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Update Prices</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Admin Account</div>
          <div className="settings-sub">Replacement shell for Mercury account and email settings.</div>
          <label className="form-label">Login / Account Email</label>
          <input className="form-input" value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} />
          <label className="form-label">Report Delivery Email</label>
          <input className="form-input" value={reportEmail} onChange={(e) => setReportEmail(e.target.value)} />
          <label className="form-label">Alerts Email</label>
          <input className="form-input" value={alertsEmail} onChange={(e) => setAlertsEmail(e.target.value)} />
          <div className="purchase-kv-list">
            <div className="purchase-kv"><span>Login route</span><span>{loginEmail}</span></div>
            <div className="purchase-kv"><span>Reports route</span><span>{reportEmail}</span></div>
            <div className="purchase-kv"><span>Alerts route</span><span>{alertsEmail}</span></div>
          </div>
          <div className="pricebook-actions" style={{ marginTop: 16 }}>
            <button className="pricebook-btn" onClick={() => previewAccountSettings()}>
              <Icon name="report" size={15} /> Preview packet
            </button>
            <button className="pricebook-btn" onClick={() => saveAccountSettingsPacket()}>
              <Icon name="cash" size={15} /> Save packet
            </button>
          </div>
          <button className="connect-btn" onClick={() => showSessionNotice('Admin account settings saved in demo mode. Real `/administration/email` wiring still pending.')}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Save Account Settings</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Alert Settings</div>
          <div className="settings-sub">Get notified about important things.</div>
          {[
            { label: 'Alert when cash is short', on: true },
            { label: 'Alert when tank level is low', on: true },
            { label: 'Daily sales summary at end of day', on: true },
            { label: 'Alert when lottery payout is high', on: false },
          ].map((item, i) => (
            <div key={i} className="toggle-row">
              <span className="toggle-label">{item.label}</span>
              {item.label === 'Alert when tank level is low' ? (
                <div className="toggle-inline-control">
                  <span className="toggle-inline-label">Remind at</span>
                  <input
                    className="toggle-inline-input"
                    value={`${fuelAlertPct}%`}
                    onChange={(e) => {
                      const digits = e.target.value.replace(/[^\d]/g, '');
                      const next = digits === '' ? '' : Math.min(100, Number(digits));
                      setFuelAlertPct(next === '' ? '' : next);
                    }}
                  />
                </div>
              ) : null}
              <div className={`toggle-switch${item.on ? ' on' : ''}`}></div>
            </div>
          ))}
        </div>

        <div className="settings-card">
          <div className="settings-title">Release Notes & Updates</div>
          <div className="settings-sub">Replacement shell for Mercury release notes and update visibility.</div>
          <div className="pricebook-actions" style={{ marginBottom: 16, flexWrap: 'wrap' }}>
            <input className="pricebook-input" value={releaseSearch} onChange={(e) => setReleaseSearch(e.target.value)} placeholder="Search updates" />
            <select className="pricebook-select" value={releaseFilter} onChange={(e) => setReleaseFilter(e.target.value)}>
              {['All', 'Needs review', 'Opened', 'Reviewed'].map((item) => <option key={item}>{item}</option>)}
            </select>
          </div>
          {visibleReleaseRows.map((item) => (
            <div key={item.id} className="toggle-row" onClick={() => setSelectedReleaseId(item.id)} style={{ cursor: 'pointer' }}>
              <div className="toggle-label">
                <div style={{ fontWeight: 800 }}>{item.title}</div>
                <div style={{ color: 'var(--text-3)', fontSize: 12, marginTop: 4 }}>{item.date} · {item.audience} · {item.note}</div>
              </div>
              <span className={`purchase-tag${item.status === 'Needs review' ? ' amber' : item.status === 'Reviewed' ? ' blue' : ''}`}>{item.status}</span>
            </div>
          ))}
          {selectedRelease ? (
            <div className="purchase-kv-list">
              <div className="purchase-kv"><span>Selected update</span><span>{selectedRelease.title}</span></div>
              <div className="purchase-kv"><span>Status</span><span>{selectedRelease.status}</span></div>
              <div className="purchase-kv"><span>Date</span><span>{selectedRelease.date}</span></div>
              <div className="purchase-kv"><span>Audience</span><span>{selectedRelease.audience}</span></div>
            </div>
          ) : null}
          <div className="pricebook-actions" style={{ marginTop: 16 }}>
            <button className="pricebook-btn" onClick={() => openSelectedRelease(selectedRelease)}>
              <Icon name="report" size={15} /> Open update
            </button>
            <button className="pricebook-btn" onClick={() => previewReleaseNotes()}>
              <Icon name="report" size={15} /> Preview notes
            </button>
            <button className="pricebook-btn" onClick={() => saveReleaseNotesPacket()}>
              <Icon name="cash" size={15} /> Save packet
            </button>
            {selectedRelease ? (
              <button className="pricebook-btn primary" onClick={() => markReleaseReviewed(selectedRelease.id)}>
                <Icon name="sync" size={15} /> Mark reviewed
              </button>
            ) : null}
          </div>
          <button className="connect-btn" onClick={() => openSelectedRelease(selectedRelease)}>
            <Icon name="report" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Open Release Notes</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Selected Update</div>
          <div className="settings-sub">Owner-facing release visibility stays tied to the current session and logout handoff.</div>
          {selectedRelease ? (
            <>
              <div className="purchase-kv-list">
                <div className="purchase-kv"><span>Update</span><span>{selectedRelease.title}</span></div>
                <div className="purchase-kv"><span>Status</span><span>{selectedRelease.status}</span></div>
                <div className="purchase-kv"><span>Audience</span><span>{selectedRelease.audience}</span></div>
                <div className="purchase-kv"><span>Route</span><span>/user/openReleasePage</span></div>
              </div>
              <div className="pricebook-actions" style={{ marginTop: 16 }}>
                <button className="pricebook-btn" onClick={() => saveSelectedReleasePacket(selectedRelease)}>
                  <Icon name="cash" size={15} /> Save selected
                </button>
                <button className="pricebook-btn" onClick={() => markReleaseReviewed(selectedRelease.id)}>
                  <Icon name="sync" size={15} /> Mark reviewed
                </button>
                <button className="pricebook-btn primary" onClick={() => setLogoutDestination('Open release notes')}>
                  <Icon name="connect" size={15} /> Tie to logout
                </button>
              </div>
            </>
          ) : (
            <div className="purchase-hint">No release note is selected right now.</div>
          )}
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [view, setView] = useState('today');
  const [viewMode, setViewMode] = useState('default');
  const [locationId, setLocationId] = useState(STORE_LOCATIONS[0].id);
  const [agreementAccepted, setAgreementAccepted] = useState(true);
  const [registerStatus, setRegisterStatus] = useState('Connected');
  const [shopCategory, setShopCategory] = useState('overview');
  const [shopExpanded, setShopExpanded] = useState(true);
  const [reportPage, setReportPage] = useState('week');
  const [pricebookPage, setPricebookPage] = useState('inventory');
  const [purchasePage, setPurchasePage] = useState('overview');
  const [reportExpanded, setReportExpanded] = useState(false);
  const [mobileNavOpen, setMobileNavOpen] = useState(false);
  const currentLocation = STORE_LOCATIONS.find((item) => item.id === locationId) || STORE_LOCATIONS[0];

  return (
    <>
      {mobileNavOpen ? <div className="mobile-sidebar-overlay" onClick={() => setMobileNavOpen(false)}></div> : null}
      <Sidebar
        active={view}
        setActive={setView}
        alerts={MOCK.alerts.length}
        currentLocation={currentLocation}
        setLocationId={setLocationId}
        shopCategory={shopCategory}
        setShopCategory={setShopCategory}
        shopExpanded={shopExpanded}
        setShopExpanded={setShopExpanded}
        reportPage={reportPage}
        setReportPage={setReportPage}
        reportExpanded={reportExpanded}
        setReportExpanded={setReportExpanded}
        mobileNavOpen={mobileNavOpen}
        setMobileNavOpen={setMobileNavOpen}
      />
      <div className="main">
        <TopBar view={view} currentLocation={currentLocation} registerStatus={registerStatus} setActive={setView} setMobileNavOpen={setMobileNavOpen} />
        <div className="content">
          {view === 'today' ? <TodayView viewMode={viewMode} setViewMode={setViewMode} /> : null}
          {view === 'transactions' ? <TransactionsView /> : null}
          {view === 'fuel' ? <FuelView /> : null}
          {view === 'shop' ? <ShopView viewMode={viewMode} shopCategory={shopCategory} setShopCategory={setShopCategory} /> : null}
          {view === 'pricebook' ? <PricebookView pricebookPage={pricebookPage} setPricebookPage={setPricebookPage} /> : null}
          {view === 'purchases' ? <PurchasesView purchasePage={purchasePage} setPurchasePage={setPurchasePage} /> : null}
          {view === 'financial' ? <FinancialView currentLocation={currentLocation} /> : null}
          {view === 'operations' ? <OperationsView currentLocation={currentLocation} setLocationId={setLocationId} /> : null}
          {view === 'multistore' ? <MultiStoreView currentLocation={currentLocation} setLocationId={setLocationId} setView={setView} /> : null}
          {view === 'reports' ? <ReportsView currentLocation={currentLocation} reportPage={reportPage} setReportPage={setReportPage} /> : null}
          {view === 'settings' ? <SettingsView agreementAccepted={agreementAccepted} currentLocation={currentLocation} registerStatus={registerStatus} setAgreementAccepted={setAgreementAccepted} setLocationId={setLocationId} setRegisterStatus={setRegisterStatus} /> : null}
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
