<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>StoreCheck - Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2F7;
  --bg-panel:#F8FBF9;
  --white:#FFFFFF;
  --sidebar:#ECF7F0;
  --sidebar-2:#DDEFE4;
  --accent:#27C66B;
  --accent-2:#8EE7B3;
  --accent-soft:rgba(39,198,107,0.12);
  --accent-deep:#1E9A54;
  --text:#14211A;
  --text-2:#495852;
  --text-3:#6E7F77;
  --border:#E3EBE6;
  --line:#EEF1F6;
  --shadow:0 16px 40px rgba(16,24,40,0.08);
  --shadow-soft:0 8px 24px rgba(16,24,40,0.05);
  --amber:#F59E0B;
  --amber-soft:rgba(245,158,11,0.16);
  --red:#EF4444;
  --red-soft:rgba(239,68,68,0.14);
  --blue:#3B82F6;
  --blue-soft:rgba(59,130,246,0.14);
  --purple:#8B5CF6;
  --purple-soft:rgba(139,92,246,0.15);
  --green-soft:rgba(39,198,107,0.14);
  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:12px;
  --sidebar-w:264px;
}
html,body,#app,#root{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(39,198,107,0.05), transparent 26%),
    radial-gradient(circle at bottom right, rgba(39,198,107,0.05), transparent 24%),
    var(--bg);
  color:var(--text);
}
button,input{font:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:999px}

#root{
  display:grid;
  grid-template-columns:var(--sidebar-w) minmax(0,1fr);
  min-height:100vh;
}
.sidebar{
  background:
    radial-gradient(circle at top right, rgba(39,198,107,0.1), transparent 26%),
    linear-gradient(180deg, #F3FAF5 0%, #EAF6EE 46%, #E2F1E8 100%);
  color:var(--text);
  padding:22px 18px 20px;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}
.sidebar::before{
  content:'';
  position:absolute;
  inset:auto -70px -110px auto;
  width:220px;
  height:220px;
  background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 72%);
  pointer-events:none;
}
.main{
  display:flex;
  flex-direction:column;
  min-width:0;
  min-height:100vh;
}
.content{
  flex:1;
  overflow-y:auto;
  padding:28px;
}
.shell{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.sb-logo{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:6px 6px 22px;
  border-bottom:1px solid rgba(39,198,107,0.1);
  position:relative;
  z-index:1;
  text-align:center;
}
.sb-logo-main{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.sb-logo-icon{
  width:44px;
  height:44px;
  border-radius:14px;
  background:#27C66B;
  border:1px solid rgba(39,198,107,0.22);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:15px;
  font-weight:700;
  letter-spacing:-0.04em;
  box-shadow:0 10px 24px rgba(39,198,107,0.18);
}
.sb-logo-text{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.sb-logo-text h2{
  font-size:17px;
  font-weight:700;
  letter-spacing:-0.03em;
  text-align:center;
}
.sb-logo-text p{display:none}
.sb-nav{
  flex:1;
  padding:16px 0;
  overflow-y:auto;
  position:relative;
  z-index:1;
}
.sb-section{
  font-size:11px;
  color:#71877B;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.14em;
  padding:8px 10px;
}
.sb-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px 12px 16px;
  border-left:3px solid transparent;
  color:#43524C;
  font-size:14px;
  font-weight:500;
  border-radius:0 14px 14px 0;
  cursor:pointer;
  transition:background .18s ease,color .18s ease,border-color .18s ease,transform .18s ease;
}
.sb-item + .sb-item{margin-top:4px}
.sb-item:hover{
  background:rgba(39,198,107,0.08);
  color:var(--text);
  transform:translateX(2px);
}
.sb-item.active{
  background:linear-gradient(90deg, rgba(39,198,107,0.18), rgba(39,198,107,0.08));
  color:var(--accent-deep);
  border-left-color:var(--accent);
}
.sb-item-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-badge{
  margin-left:auto;
  min-width:22px;
  height:22px;
  padding:0 8px;
  border-radius:999px;
  background:#fff;
  color:var(--accent);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:700;
}
.sb-footer{
  position:relative;
  z-index:1;
  padding-top:16px;
  border-top:1px solid rgba(39,198,107,0.1);
}
.sb-store-info{
  background:#FFFFFF;
  border:1px solid rgba(39,198,107,0.16);
  border-radius:18px;
  padding:14px;
  backdrop-filter:blur(10px);
}
.sb-location-select{
  width:100%;
  min-height:38px;
  margin-top:12px;
  border:1px solid rgba(39,198,107,0.18);
  border-radius:12px;
  padding:0 12px;
  background:#F8FCF9;
  color:var(--text-1);
  font:800 12px/1 "DM Sans",sans-serif;
}
.sb-footer-actions{
  display:grid;
  gap:8px;
  margin-top:12px;
}
.sb-link-btn{
  display:flex;
  align-items:center;
  gap:8px;
  border:0;
  padding:0;
  background:transparent;
  color:var(--green-dark);
  font:800 12px/1.4 "DM Sans",sans-serif;
  cursor:pointer;
}
.sb-meta{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:#61766A;
  margin-bottom:10px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:700;
}
.sb-live-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 6px rgba(39,198,107,0.14);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.sb-store-name{font-size:14px;font-weight:700;color:var(--text)}
.sb-store-sub{font-size:12px;color:var(--text-3);margin-top:4px}

.topbar{
  padding:22px 28px 0;
  flex-shrink:0;
}
.topbar-inner{
  background:rgba(255,255,255,0.88);
  border:1px solid rgba(39,198,107,0.08);
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(18px);
  border-radius:24px;
  padding:18px 20px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:16px;
}
.topbar-copy{
  grid-column:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  min-width:0;
}
.eyebrow{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text-3);
  margin-bottom:6px;
}
.eyebrow-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
}
.topbar-title{
  font-size:26px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.05em;
}
.topbar-sub{
  font-size:13px;
  color:var(--text-2);
  margin-top:6px;
}
.topbar-actions{
  grid-column:3;
  justify-self:end;
  display:flex;
  align-items:center;
  gap:10px;
}
.mobile-nav-btn{
  display:none;
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  align-items:center;
  justify-content:center;
  background:#FFFFFF;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
}
.mobile-sidebar-overlay{
  display:none;
}
.view-switch{
  display:flex;
  align-items:center;
  gap:6px;
  padding:5px;
  border-radius:16px;
  border:1px solid rgba(39,198,107,0.1);
  background:#fff;
  box-shadow:var(--shadow-soft);
}
.view-switch-btn{
  border:none;
  background:transparent;
  color:var(--text-2);
  padding:10px 14px;
  border-radius:12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}
.view-switch-btn.active{
  background:rgba(39,198,107,0.12);
  color:var(--accent-deep);
}
.source-pill,
.topbar-btn,
.topbar-avatar{
  border:1px solid rgba(39,198,107,0.1);
  background:rgba(255,255,255,0.86);
  box-shadow:var(--shadow-soft);
}
.source-pill{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:14px;
  color:var(--text-2);
  font-size:12px;
  font-weight:700;
}
.source-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 4px rgba(39,198,107,0.12);
}
.topbar-btn{
  width:42px;
  height:42px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
}
.notif-dot{
  position:absolute;
  top:8px;
  right:8px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--red);
  box-shadow:0 0 0 3px #fff;
}
.topbar-avatar{
  width:42px;
  height:42px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--accent-deep);
  font-weight:700;
  letter-spacing:-0.03em;
}

.section-hdr h1{
  font-size:34px;
  line-height:1.02;
  letter-spacing:-0.06em;
  font-weight:700;
}
.section-hdr p{
  font-size:15px;
  color:var(--text-2);
  margin-top:10px;
  line-height:1.55;
}
.section-hdr.slim p{
  margin-top:0;
  font-size:17px;
  max-width:760px;
}
.greeting-inline{
  display:inline-flex;
  align-items:center;
  gap:10px;
}

.card,
.kpi-card,
.status-card,
.chart-card,
.alerts-card,
.tank-card,
.grade-card,
.cat-card,
.week-card,
.settings-card{
  background:var(--white);
  border:1px solid rgba(228,232,239,0.9);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
}
.card-pad{padding:24px}

.demo-bar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px 18px;
  background:linear-gradient(135deg, rgba(245,158,11,0.16), rgba(245,158,11,0.08));
  border:1px solid rgba(245,158,11,0.26);
  border-radius:18px;
  color:#8A5A00;
  font-size:13px;
}
.demo-copy strong{font-weight:700}

.kpi-row{
  display:grid;
  grid-template-columns:1.7fr 1fr 1fr 1fr;
  gap:18px;
  margin-bottom:20px;
}
.kpi-hero{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at top right, rgba(39,198,107,0.12), transparent 28%),
    linear-gradient(135deg, #FFFFFF 0%, #F7FCF8 58%, #EEF9F2 100%);
  border-radius:var(--radius-xl);
  padding:28px;
  min-height:220px;
  border:1px solid rgba(39,198,107,0.12);
  box-shadow:0 24px 48px rgba(39,198,107,0.12);
}
.kpi-hero::before,
.kpi-hero::after{
  content:'';
  position:absolute;
  border-radius:50%;
  background:rgba(39,198,107,0.06);
}
.kpi-hero::before{width:210px;height:210px;top:-86px;right:-52px}
.kpi-hero::after{width:150px;height:150px;bottom:-64px;right:38px}
.hero-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  position:relative;
  z-index:1;
}
.kpi-hero-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:#7FA18E;
}
.kpi-hero-value{
  font-size:52px;
  line-height:0.96;
  font-weight:700;
  color:var(--text);
  letter-spacing:-0.07em;
  margin:14px 0 12px;
  position:relative;
  z-index:1;
}
.kpi-hero-trend{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(39,198,107,0.08);
  border:1px solid rgba(39,198,107,0.1);
  font-size:12px;
  font-weight:600;
  color:var(--text-2);
  position:relative;
  z-index:1;
}
.trend-up{color:#86EFAC}
.trend-down{color:#FCA5A5}
.hero-foot{
  position:absolute;
  left:28px;
  right:28px;
  bottom:24px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:18px;
  z-index:1;
}
.hero-foot-copy{
  font-size:13px;
  line-height:1.5;
  color:var(--text-2);
  max-width:260px;
}
.hero-tag{
  background:#FFFFFF;
  border:1px solid rgba(39,198,107,0.12);
  border-radius:16px;
  padding:12px 14px;
  min-width:138px;
}
.hero-tag-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:#83A090;
}
.hero-tag-value{
  font-size:20px;
  font-weight:700;
  color:var(--accent-deep);
  margin-top:6px;
  letter-spacing:-0.04em;
}
.kpi-card{
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.icon-chip{
  width:46px;
  height:46px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.kpi-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-weight:700;
  color:var(--text-3);
}
.kpi-value{
  font-size:32px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.06em;
}
.kpi-sub{
  font-size:13px;
  color:var(--text-2);
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:auto;
}

.status-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:18px;
  margin-bottom:20px;
}
.status-card{
  padding:22px;
  border-top:4px solid transparent;
}
.status-card.green{border-top-color:var(--accent)}
.status-card.red{border-top-color:var(--red)}
.status-card.amber{border-top-color:var(--amber)}
.status-card.blue{border-top-color:var(--blue)}
.status-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:16px;
}
.status-header-label{
  font-size:11px;
  font-weight:700;
  color:var(--text-3);
  letter-spacing:0.12em;
  text-transform:uppercase;
}
.status-big{
  font-size:38px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.06em;
}
.status-big.green{color:#15803D}
.status-big.red{color:var(--red)}
.status-big.amber{color:#B45309}
.status-big.blue{color:#1D4ED8}
.status-msg{
  margin-top:10px;
  font-size:13px;
  line-height:1.6;
  color:var(--text-2);
}
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  border-radius:999px;
  padding:7px 12px;
  margin-top:14px;
  font-size:12px;
  font-weight:700;
}
.status-badge.green{background:var(--green-soft);color:#15803D}
.status-badge.red{background:var(--red-soft);color:#B91C1C}
.status-badge.amber{background:var(--amber-soft);color:#92400E}
.status-badge.blue{background:var(--blue-soft);color:#1D4ED8}

.bottom-row{
  display:grid;
  grid-template-columns:1.45fr 1fr;
  gap:18px;
  margin-bottom:20px;
}
.chart-card,
.alerts-card,
.week-card,
.settings-card{
  padding:24px;
}
.chart-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:20px;
}
.chart-title,
.alerts-title,
.week-title,
.settings-title{
  font-size:17px;
  font-weight:700;
  letter-spacing:-0.04em;
}
.chart-sub,
.alerts-sub,
.settings-sub{
  font-size:13px;
  color:var(--text-3);
  margin-top:5px;
}
.chart-wrap{position:relative;height:220px}
.chart-total{
  padding:10px 12px;
  border-radius:14px;
  background:var(--accent-soft);
  color:#166534;
  font-size:12px;
  font-weight:700;
}
.alerts-list{display:flex;flex-direction:column}
.alert-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 0;
  border-bottom:1px solid var(--line);
}
.alert-item:last-child{border-bottom:none;padding-bottom:0}
.alert-copy{flex:1;min-width:0}
.alert-text{
  font-size:13px;
  line-height:1.6;
  color:var(--text);
  font-weight:500;
}
.alert-btn{
  margin-left:auto;
  border:none;
  border-radius:12px;
  padding:9px 12px;
  background:var(--bg-panel);
  color:var(--text-2);
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}
.alert-btn:hover{background:#E8EDF5}

.reports-filter-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
  margin-top:18px;
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}
.ops-shell{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.ops-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
.ops-title{
  font-size:42px;
  line-height:1.04;
  font-weight:700;
  letter-spacing:-0.06em;
}
.ops-subtitle{
  margin-top:6px;
  font-size:20px;
  line-height:1.6;
  color:var(--text-2);
}
.ops-kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.ops-kpi{
  background:#fff;
  border:1px solid rgba(39,198,107,0.14);
  border-radius:16px;
  padding:12px 14px;
}
.ops-kpi-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--text-3);
}
.ops-kpi-value{
  margin-top:6px;
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.06em;
}
.ops-kpi-sub{
  margin-top:4px;
  font-size:12px;
  color:var(--text-2);
}
.ops-sheet{
  background:#fff;
  border:1px solid rgba(39,198,107,0.14);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.ops-sheet-top{
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  gap:16px;
  padding:18px 22px;
  background:linear-gradient(90deg, #1E9A54 0%, #27C66B 100%);
  color:#fff;
}
.ops-sheet-brand{

const BarChart = ({ data, labels, height = 220 }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            data,
            backgroundColor: labels.map((_, i) =>
              i === 6 ? 'rgba(30,154,84,0.92)' : i % 2 === 0 ? 'rgba(39,198,107,0.9)' : 'rgba(142,231,179,0.82)'
            ),
            borderColor: labels.map((_, i) => (i === 6 ? '#1E9A54' : '#27C66B')),
            borderWidth: 1,
            borderRadius: 10,
            borderSkipped: false,
            maxBarThickness: 34,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: (ctx) => ' ' + fmt(ctx.raw) },
            backgroundColor: '#1E9A54',
            padding: 12,
            cornerRadius: 10,
            displayColors: false,
          },
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: { font: { family: 'DM Sans', size: 12, weight: '600' }, color: '#7B8794' },
          },
          y: {
            grid: { color: '#EDF1F6' },
            border: { display: false },
            ticks: {
              font: { family: 'DM Sans', size: 11, weight: '600' },
              color: '#94A3B8',
              callback: (v) => '$' + v / 1000 + 'K',
            },
          },
        },
      },
    });

    return () => chartRef.current?.destroy();
  }, [data, labels]);

  return <canvas ref={ref} style={{ height: height + 'px' }} />;
};

const uniqueValues = (rows, key) => [...new Set(rows.map((row) => row[key]))].sort();
const sumRows = (rows) => rows.reduce((sum, row) => sum + row.amount, 0);
const groupRows = (rows, key) =>
  rows.reduce((acc, row) => {
    const group = row[key];
    if (!acc[group]) acc[group] = { label: group, rows: 0, amount: 0, qty: 0 };
    acc[group].rows += 1;
    acc[group].amount += row.amount;
    acc[group].qty += Number(row.qty) || 0;
    return acc;
  }, {});

const downloadData = (rows, format, filename) => {
  const normalized = rows.map((row) => ({
    Date: row.date,
    Time: row.time,
    Receipt: row.receipt,
    Shift: row.shift,
    Cashier: row.cashier,
    Department: row.department,
    Item: row.item,
    Qty: row.qty,
    PriceLevel: row.priceLevel,
    Tender: row.tender,
    Amount: row.amount.toFixed(2),
    Register: row.register,
  }));
  const headers = Object.keys(normalized[0] || {});
  const body =
    format === 'JSON'
      ? JSON.stringify(normalized, null, 2)
      : [headers.join(','), ...normalized.map((row) => headers.map((header) => `"${String(row[header]).replaceAll('"', '""')}"`).join(','))].join('\n');
  const mime = format === 'JSON' ? 'application/json' : 'text/csv';
  const extension = format === 'JSON' ? 'json' : format === 'XLS' ? 'xls' : 'csv';
  const blob = new Blob([body], { type: mime });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename}.${extension}`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
};

      rows: [[row.id, fmtN(row.opening, 0), fmtN(row.delivery, 0), fmtN(row.pumped, 0), fmtN(row.posSales, 0), fmtN(row.difference, 0), fmtN(row.bookInventory, 0), row.status]],
      filename: `storecheck-ust-reading-${String(row.id).toLowerCase()}`,
    });
    showNotice(`${row.id} UST packet prepared in demo mode.`);
  };

  const markUstReviewed = (id) => {
    setUstRows((current) => current.map((row) => (
      row.id === id ? { ...row, status: Math.abs(row.difference) > 20 ? 'Needs follow-up' : 'Ready' } : row
    )));
    showNotice(`${id} reviewed in demo mode. Real UST save endpoint is still pending.`);
  };

  const reviewDraftAttachments = (row = selectedDraft) => {
    if (!row) return;
    openFuelPacket({
      title: `Fuel Draft Attachments - ${row.id}`,
      subtitle: `${row.draftDate} · ${row.status}`,
      headers: ['Draft', 'Deliveries', 'Invoices', 'Attachment Rows', 'Draft Amount'],
      rows: [[row.id, row.deliveries.join(', '), row.invoices.join(', '), fmtN(countDraftAttachments(row.id)), fmt(row.draftAmount)]],
    });
    showNotice(`${row.id} draft attachment review opened in demo mode.`);
  };

  const openDraftActionPacket = (row = selectedDraft) => {
    if (!row) return;
    openFuelPacket({
      title: `Fuel Draft Action Packet - ${row.id}`,
      subtitle: `${row.draftDate} · ${row.status}`,
      headers: ['Draft', 'Deliveries', 'Invoices', 'Batches', 'Fees', 'Rebate', 'Expenses', 'Other', 'Amount'],
      rows: [[
        row.id,
        row.deliveries.join(', '),
        row.invoices.join(', '),
        (row.linkedBatches || []).join(', ') || 'None linked',
        fmt(row.fees),
        fmt(row.rebate),
        fmt(row.expenses),
        fmt(row.otherCredits),
        fmt(row.draftAmount),
      ]],
    });
    showNotice(`${row.id} action packet opened in demo mode.`);
  };

  const saveDraftActionPacket = (row = selectedDraft) => {
    if (!row) return;
    saveFuelPacket({
      title: `Fuel Draft Action Packet - ${row.id}`,
      subtitle: `${row.draftDate} · ${row.status}`,
      route: `/jobberBatches/getDraftDetails/${row.id}`,
      note: 'Fuel draft action replacement shell',
      headers: ['Draft', 'Deliveries', 'Invoices', 'Batches', 'Fees', 'Rebate', 'Expenses', 'Other', 'Amount'],
      rows: [[
        row.id,
        row.deliveries.join(', '),
        row.invoices.join(', '),
        (row.linkedBatches || []).join(', ') || 'None linked',
        fmt(row.fees),
        fmt(row.rebate),
        fmt(row.expenses),
        fmt(row.otherCredits),
        fmt(row.draftAmount),
      ]],
      filename: `storecheck-fuel-draft-${String(row.id).toLowerCase()}`,
    });
    setDraftDetailEvents((current) => [
      {
        id: `DDE-${Date.now()}`,
        draftId: row.id,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
        action: 'Draft action packet saved',
        actor: 'StoreCheck owner',
        status: 'Packet saved',
        route: `/jobberBatches/getDraftDetails/${row.id}`,
      },
      ...current,
    ].slice(0, 18));
    showNotice(`${row.id} action packet prepared in demo mode.`);
  };

  const openDraftDetailEndpointPacket = (row = selectedDraft) => {
    if (!row) return;
    openFuelPacket({
      title: `Fuel Draft Detail Endpoint - ${row.id}`,
      subtitle: `/jobberBatches/getDraftDetails/${row.id}`,
      headers: ['Draft', 'Status', 'Deliveries', 'Invoices', 'Linked Batches', 'Attachments', 'Amount'],
      rows: [[
        row.id,
        row.status,
        row.deliveries.join(', '),
        row.invoices.join(', '),
        (row.linkedBatches || []).join(', ') || 'Open',
        fmtN(countDraftAttachments(row.id)),
        fmt(row.draftAmount),
      ]],
    });
    setDraftDetailEvents((current) => [
      {
        id: `DDE-${Date.now()}`,
        draftId: row.id,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
        action: 'Endpoint packet previewed',
        actor: 'StoreCheck owner',
        status: row.status,
        route: `/jobberBatches/getDraftDetails/${row.id}`,
      },
      ...current,
    ].slice(0, 18));
    showNotice(`${row.id} endpoint review opened in demo mode.`);
  };

  const saveDraftDetailEndpointPacket = (row = selectedDraft) => {
    if (!row) return;
    saveFuelPacket({
      title: `Fuel Draft Detail Endpoint - ${row.id}`,
      subtitle: `/jobberBatches/getDraftDetails/${row.id}`,
      route: `/jobberBatches/getDraftDetails/${row.id}`,
      note: 'Fuel draft-detail endpoint replacement shell',
      headers: ['Draft', 'Status', 'Deliveries', 'Invoices', 'Linked Batches', 'Attachments', 'Amount'],
      rows: [[
        row.id,
        row.status,
        row.deliveries.join(', '),
        row.invoices.join(', '),
        (row.linkedBatches || []).join(', ') || 'Open',
        fmtN(countDraftAttachments(row.id)),
        fmt(row.draftAmount),
      ]],
      filename: `storecheck-fuel-draft-detail-${String(row.id).toLowerCase()}`,
    });
    setDraftDetailEvents((current) => [
      {
        id: `DDE-${Date.now()}`,
        draftId: row.id,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
        action: 'Endpoint packet saved',
        actor: 'StoreCheck owner',
        status: row.status,
        route: `/jobberBatches/getDraftDetails/${row.id}`,
      },
      ...current,
    ].slice(0, 18));
    showNotice(`${row.id} endpoint packet prepared in demo mode.`);
  };

  const openNetworkBatchPacket = (row = selectedNetworkBatch) => {
    if (!row) return;
    openFuelPacket({
      title: `Fuel Network Batch - ${row.id}`,
      subtitle: `${row.date} · ${row.status}`,
      headers: ['Batch', 'Linked Draft', 'Gross', 'Fees', 'Net', 'Status'],
      rows: [[row.id, row.linkedDraft || 'Open', fmt(row.gross), fmt(row.fees), fmt(row.net), row.status]],
    });
    showNotice(`${row.id} network batch opened in demo mode.`);
  };

  const saveNetworkBatchPacket = (row = selectedNetworkBatch) => {
    if (!row) return;
    saveFuelPacket({
      title: `Fuel Network Batch - ${row.id}`,
      subtitle: `${row.date} · ${row.status}`,
      route: '/jobberBatches/index',
      note: 'Fuel network-batch replacement shell',
      headers: ['Batch', 'Linked Draft', 'Gross', 'Fees', 'Net', 'Status'],
      rows: [[row.id, row.linkedDraft || 'Open', fmt(row.gross), fmt(row.fees), fmt(row.net), row.status]],
      filename: `storecheck-network-batch-${String(row.id).toLowerCase()}`,
    });
    showNotice(`${row.id} network batch packet prepared in demo mode.`);
  };

  const setDraftStatus = (draftId, status) => {
    setDraftRows((current) => current.map((row) => (row.id === draftId ? { ...row, status } : row)));
    setDraftDetailEvents((current) => [
      {
        id: `DDE-${Date.now()}`,
        draftId,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
        action: 'Draft status updated',
        actor: 'StoreCheck owner',
        status,
        route: `/jobberBatches/getDraftDetails/${draftId}`,
      },
      ...current,
    ].slice(0, 18));
    showNotice(`${draftId} marked ${status.toLowerCase()} in demo mode. Real draft-save endpoint is still pending.`);
  };

  const toggleDraftComposerDelivery = (deliveryId) => {
    setDraftComposer((current) => ({
      ...current,
      deliveryIds: current.deliveryIds.includes(deliveryId)
        ? current.deliveryIds.filter((id) => id !== deliveryId)
        : [...current.deliveryIds, deliveryId],
    }));
  };

  const toggleDraftComposerBatch = (batchId) => {
    setDraftComposer((current) => ({
      ...current,
      batchIds: current.batchIds.includes(batchId)
        ? current.batchIds.filter((id) => id !== batchId)
        : [...current.batchIds, batchId],
    }));
  };

  const linkNetworkBatchToDraft = (batch = selectedNetworkBatch, draft = selectedDraft) => {
    if (!batch || !draft) return;
    const previousDraftId = batch.linkedDraft;
    setNetworkBatchRows((current) => current.map((row) => (
      row.id === batch.id
        ? { ...row, linkedDraft: draft.id, status: row.status === 'Settled' ? 'Settled' : 'Linked' }
        : row
    )));
    setDraftRows((current) => current.map((row) => {
      if (row.id === previousDraftId && row.id !== draft.id) {
        const nextBatches = (row.linkedBatches || []).filter((id) => id !== batch.id);
        return { ...row, linkedBatches: nextBatches, batches: nextBatches.length };
      }
      if (row.id === draft.id) {
        const nextBatches = Array.from(new Set([...(row.linkedBatches || []), batch.id]));
        return { ...row, linkedBatches: nextBatches, batches: nextBatches.length };
      }
      return row;
    }));
    setSelectedDraftId(draft.id);
    setSelectedNetworkBatchId(batch.id);
    setDraftDetailEvents((current) => [
      {
        id: `DDE-${Date.now()}`,
        draftId: draft.id,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
        action: `Linked network batch ${batch.id}`,
        actor: 'StoreCheck owner',
        status: 'Linked',
        route: `/jobberBatches/getDraftDetails/${draft.id}`,
      },
      ...current,
    ].slice(0, 18));
    showNotice(`${batch.id} linked to ${draft.id} in demo mode. Real network-batch save wiring is still pending.`);
  };

  const saveDelivery = () => {
    const nextId = `DLV-${120 + deliveryRows.length}`;
    const nextDraftDate = 'Open';
    const freightId = `FRT-${120 + deliveryRows.length}`;
    const freightRate = Number(deliveryDraft.freightRate || 0);
    const surchargeRate = Number(deliveryDraft.surchargeRate || 0);
    const freightTotal = Number((deliveryEntryTotal * freightRate).toFixed(2));
    const surchargeTotal = Number((deliveryEntryTotal * surchargeRate).toFixed(2));
    setDeliveryRows((current) => [
      {
        id: nextId,
        deliveryDate: deliveryDraft.date,
        shift: deliveryDraft.shift,
        volume: deliveryEntryTotal,
        draftDate: nextDraftDate,
        totalAmount: Number(deliveryDraft.totalAmount || 0),
        status: 'Awaiting draft',
        invoice: deliveryDraft.invoiceRef,
        draft: 'Open',
        bol: deliveryDraftUploads.bolName ? 'Attached' : 'Missing',
        rackSetId: deliveryDraft.rackSetId,
        freightId,
      },
      ...current,
    ]);
    setFreightChargeRows((current) => [
      {
        id: freightId,
        deliveryId: nextId,
        invoice: deliveryDraft.invoiceRef,
        terminal: (rackPriceRows.find((row) => row.id === deliveryDraft.rackSetId) || selectedRack || {}).terminal || 'Open',
        gallons: deliveryEntryTotal,
        freightRate,
        surchargeRate,
        freightTotal,
        surchargeTotal,
        status: 'Needs review',
        note: 'Created from the StoreCheck Add Delivery cost shell in demo mode.',
      },
      ...current,
    ]);
    const stamp = new Date().toLocaleString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
    const nextAttachments = [];
    if (deliveryDraftUploads.invoiceName) {
      nextAttachments.push({
        id: `FAT-${fuelAttachments.length + 301}`,
        deliveryId: nextId,
        draftId: null,
        fileName: deliveryDraftUploads.invoiceName,
        type: 'Invoice Attachment',
        added: stamp,
        status: 'Ready',
        note: 'Staged from Add Delivery modal in demo mode.',
      });
    }
    if (deliveryDraftUploads.bolName) {
      nextAttachments.push({
        id: `FAT-${fuelAttachments.length + 302}`,
        deliveryId: nextId,
        draftId: null,
        fileName: deliveryDraftUploads.bolName,
        type: 'BOL Attachment',
        added: stamp,
        status: 'Ready',
        note: 'Staged from Add Delivery modal in demo mode.',
      });
    }
    if (nextAttachments.length) {
      setFuelAttachments((current) => [...nextAttachments, ...current]);
      setSelectedFuelAttachmentId(nextAttachments[0].id);
    }
    setDeliverySaveEvents((current) => [
      {
        id: `DSE-${Date.now()}`,
        deliveryId: nextId,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
        action: 'Add Delivery saved',
        actor: 'StoreCheck owner',
        status: 'Awaiting draft',
        route: '/jobberBatches/index',
      },
      {
        id: `DSE-${Date.now()}-rack`,
        deliveryId: nextId,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
        action: `Rack and freight snapshot captured`,
        actor: 'StoreCheck owner',
        status: `${deliveryDraft.rackSetId} / ${deliveryDraft.freightRate} + ${deliveryDraft.surchargeRate}`,
        route: '/jobberBatches/index',
      },
      ...current,
    ].slice(0, 20));
    setSelectedDeliveryId(nextId);
    setSelectedFreightId(freightId);
    setSelectedRackId(deliveryDraft.rackSetId);
    setDeliveryDraftUploads({ invoiceName: '', bolName: '' });
    setDeliveryDraft({
      date: '2026-05-09',
      shift: 'Shift 2',
      regular: '5200',
      premium: '2100',
      diesel: '1220',
      totalAmount: '25384.44',
      invoiceRef: 'INV-8841',
      bolRef: 'BOL-5518',
      rackSetId: 'RACK-509-AM',
      freightRate: '0.041',
      surchargeRate: '0.012',
    });
    showNotice('Delivery and attachment handoff saved in demo mode. Real Add Delivery save wiring is still pending.');
    setShowAddDelivery(false);
  };

  const saveDraft = () => {
    if (!draftComposerDeliveryRows.length) {
      showNotice('Select at least one delivery before saving a draft.');
      return;
    }
    const nextId = `DR-${225 + draftRows.length}`;
    const nextDraft = {
      id: nextId,
      draftDate: draftComposer.draftDate,
      fuelInvoices: draftComposerInvoices.length,
      batches: draftComposer.batchIds.length,
      fees: Number(draftComposer.fees || 0),
      rebate: Number(draftComposer.rebate || 0),
      expenses: Number(draftComposer.expenses || 0),
      otherCredits: Number(draftComposer.otherCredits || 0),
      draftAmount: Number(draftComposerAmount.toFixed(2)),
      attachments: `${draftComposerDeliveryRows.reduce((sum, row) => sum + countDeliveryAttachments(row.id), 0)} docs`,
      status: 'Needs review',
      deliveries: draftComposer.deliveryIds,
      invoices: draftComposerInvoices,
      linkedBatches: draftComposer.batchIds,
    };
    const firstAttachment = fuelAttachments.find((item) => draftComposer.deliveryIds.includes(item.deliveryId));
    const remainingOpenDeliveries = deliveryRows
      .filter((row) => !draftComposer.deliveryIds.includes(row.id) && row.status !== 'Drafted')
      .map((row) => row.id)
      .slice(0, 1);
    const remainingOpenBatches = networkBatchRows
      .filter((row) => !draftComposer.batchIds.includes(row.id) && row.status !== 'Settled')
      .map((row) => row.id)
      .slice(0, 1);
    setDraftRows((current) => [nextDraft, ...current]);
    setDeliveryRows((current) => current.map((row) => (
      draftComposer.deliveryIds.includes(row.id)
        ? { ...row, draft: nextId, draftDate: draftComposer.draftDate, status: 'Drafted' }
        : row
    )));
    setFuelAttachments((current) => current.map((item) => (
      draftComposer.deliveryIds.includes(item.deliveryId)
        ? { ...item, draftId: nextId, note: `Linked to ${nextId} through the draft action flow in demo mode.` }
        : item
    )));
    setNetworkBatchRows((current) => current.map((row) => (
      draftComposer.batchIds.includes(row.id)
        ? { ...row, linkedDraft: nextId, status: row.status === 'Settled' ? 'Settled' : 'Linked' }
        : row
    )));
    if (firstAttachment) setSelectedFuelAttachmentId(firstAttachment.id);
    setSelectedDraftId(nextId);
    setSelectedNetworkBatchId(draftComposer.batchIds[0] || selectedNetworkBatchId);
    setDraftComposer({
      draftDate: '2026-05-10',
      fees: '245.18',
      rebate: '121.40',
      expenses: '90.25',
      otherCredits: '-18.00',
      deliveryIds: remainingOpenDeliveries,
      batchIds: remainingOpenBatches,
    });
    setShowAddDraft(false);
    setDraftDetailEvents((current) => [
      {
        id: `DDE-${Date.now()}`,
        draftId: nextId,
        time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
        action: 'Draft created from composer',
        actor: 'StoreCheck owner',
        status: nextDraft.status,
        route: `/jobberBatches/getDraftDetails/${nextId}`,
      },
      ...current,
    ].slice(0, 18));
    showNotice(`Draft ${nextId} saved in demo mode. Real fuel draft save and detail endpoints are still pending.`);
  };

  const saveUstReading = () => {
    const nextId = `UST-${509 + ustRows.length}-N`;
    const nextRow = {
      id: nextId,
      date: ustEntryDraft.date,
      shift: ustEntryDraft.shift,
      fuelType: ustEntryDraft.fuelType,
      opening: Number(ustEntryDraft.opening || 0),
      delivery: Number(ustEntryDraft.delivery || 0),
      pumped: Number(ustEntryDraft.pumped || 0),
      posSales: Number(ustEntryDraft.posSales || 0),
      difference: ustDraftDifference,
      bookInventory: ustDraftBookInventory,
      status: Math.abs(ustDraftDifference) > 20 ? 'Needs review' : 'Ready',
    };
    setUstRows((current) => [nextRow, ...current]);
    setSelectedUstId(nextId);
    setUstEntryDraft({
      date: ustEntryDraft.date,
      shift: 'Shift 3',
      fuelType: ustEntryDraft.fuelType,
      opening: String(ustDraftBookInventory),
      delivery: '0',
      pumped: '0',
      posSales: '0',
    });
    showNotice(`${nextId} saved in demo mode. Real UST save wiring is still pending.`);
  };

  const tabs = [
    { id: 'overview', label: 'Overview', icon: 'fuel' },
    { id: 'deliveries', label: 'Deliveries', icon: 'report' },
    { id: 'ust', label: 'UST', icon: 'gallons' },
    { id: 'drafts', label: 'Drafts', icon: 'cash' },
  ];

  return (
    <div className="shell">
      <div className="section-hdr">
        <h1>Fuel</h1>
        <p>Track fuel sales, delivery flow, and draft follow-through in one owner-facing workspace.</p>
      </div>

      <div className="pricebook-tabs" role="tablist" aria-label="Fuel sections">
        {tabs.map((tab) => (
          <button key={tab.id} className={`pricebook-tab ${fuelPage === tab.id ? 'active' : ''}`} onClick={() => setFuelPage(tab.id)}>
            <Icon name={tab.icon} size={17} /> {tab.label}
          </button>
        ))}
      </div>

      {fuelNotice ? <div className="pricebook-notice"><Icon name="fuel" size={16} /> {fuelNotice}</div> : null}

      {fuelPage === 'overview' ? (
        <>
          <div className="eyebrow-label">Tank Levels Right Now</div>
          <div className="fuel-tanks-row">
            {tanks.map((t) => {
              const pct = Math.round((t.current / t.capacity) * 100);
              const isLow = pct < 35;
              const isMid = pct < 60 && !isLow;
              const barColor = isLow ? '#EF4444' : isMid ? '#F59E0B' : t.color;
              return (
                <div key={t.name} className="tank-card">
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 12 }}>
                    <div className="tank-name">{t.name} Tank</div>
                    <Icon
                      name="fuel"
                      size={18}
                      bg={isLow ? iconDefaults.red.bg : isMid ? iconDefaults.fuel.bg : iconDefaults.green.bg}
                      fg={barColor}
                    />
                  </div>
                  <div className="tank-level-wrap">
                    <div className="tank-level-bar" style={{ width: pct + '%', background: barColor }}></div>
                  </div>
                  <div className="tank-pct" style={{ color: barColor }}>{pct}%</div>
                  <div className="tank-detail">{fmtN(t.current)} of {fmtN(t.capacity)} gallons left</div>
                  <StatBadge tone={isLow ? 'red' : isMid ? 'amber' : 'green'} icon={isLow ? 'alert' : isMid ? 'report' : 'success'}>
                    {isLow ? 'Low - order fuel today' : isMid ? 'Getting low' : 'Good level'}
                  </StatBadge>
                </div>
              );
            })}
          </div>

          <div className="eyebrow-label">Sales by Fuel Type - Today</div>
          <div className="fuel-grades-row">
            {grades.map((g) => (
              <div key={g.name} className="grade-card">
                <div className="grade-header">
                  <div className="grade-dot" style={{ background: g.color }}></div>
                  <div className="grade-name">{g.name}</div>
                  <div className="grade-price">${g.price}/gal</div>
                </div>
                <div className="grade-stat">
                  <span className="grade-stat-label"><Icon name="cash" size={14} bg="rgba(39,198,107,0.12)" fg="#27C66B" /> Money Earned</span>
                  <span className="grade-stat-val">{fmt(g.revenue)}</span>
                </div>
                <div className="grade-stat">
                  <span className="grade-stat-label"><Icon name="gallons" size={14} bg="rgba(245,158,11,0.12)" fg="#F59E0B" /> Gallons Sold</span>
                  <span className="grade-stat-val">{fmtN(g.gallons, 2)}</span>
                </div>
                <div className="grade-stat">
                  <span className="grade-stat-label"><Icon name="trendUp" size={14} bg="rgba(39,198,107,0.12)" fg="#27C66B" /> Profit / Gallon</span>
                  <span className="grade-stat-val" style={{ color: '#15803D' }}>${g.margin.toFixed(2)}</span>
                </div>
                <div className="grade-stat">
                  <span className="grade-stat-label"><Icon name="cash" size={14} bg="rgba(59,130,246,0.12)" fg="#3B82F6" /> Your Profit</span>
                  <span className="grade-stat-val" style={{ color: '#15803D' }}>{fmt(g.gallons * g.margin)}</span>
                </div>
              </div>
            ))}
          </div>

          <div className="card card-pad">
            <div className="chart-title" style={{ marginBottom: 16 }}>Fuel Totals - Today</div>
            <div className="summary-grid">
              {[
                { label: 'Total Gallons Sold', val: fmtN(totalGallons, 0) + ' gal', icon: 'fuel', tone: iconDefaults.fuel },
                { label: 'Total Fuel Revenue', val: fmt(totalRevenue), icon: 'cash', tone: iconDefaults.green },
                { label: 'Total Fuel Profit', val: fmt(totalProfit), icon: 'trendUp', tone: iconDefaults.blue },
                { label: 'Avg Profit / Gallon', val: '$' + (totalProfit / totalGallons).toFixed(3), icon: 'report', tone: iconDefaults.purple },
              ].map((s) => (
                <div key={s.label} className="summary-stat">
                  <Icon name={s.icon} size={22} bg={s.tone.bg} fg={s.tone.fg} style={{ margin: '0 auto' }} />
                  <div className="summary-label">{s.label}</div>
                  <div className="summary-value">{s.val}</div>
                </div>
              ))}
            </div>
          </div>
        </>
      ) : null}

      {fuelPage === 'deliveries' ? (
        <>

                    <div className="purchase-kv"><span>Batch</span><span>{selectedNetworkBatch.id}</span></div>
                    <div className="purchase-kv"><span>Linked draft</span><span>{selectedNetworkBatch.linkedDraft || 'Open'}</span></div>
                    <div className="purchase-kv"><span>Fees</span><span>{fmt(selectedNetworkBatch.fees)}</span></div>
                    <div className="purchase-kv"><span>Net</span><span>{fmt(selectedNetworkBatch.net)}</span></div>
                  </div>
                  <div className="pricebook-actions" style={{ marginTop: 16 }}>
                    <button className="pricebook-btn" onClick={() => saveNetworkBatchPacket(selectedNetworkBatch)}>
                      <Icon name="cash" size={15} /> Save packet
                    </button>
                    <button className="pricebook-btn" onClick={() => linkNetworkBatchToDraft(selectedNetworkBatch, selectedDraft)}>
                      <Icon name="connect" size={15} /> Use in draft
                    </button>
                    <button className="pricebook-btn primary" onClick={() => openDraftDetail(selectedNetworkBatch.linkedDraft || selectedDraft.id)}>
                      <Icon name="item" size={15} /> Open draft
                    </button>
                  </div>
                </>
              ) : (
                <div className="purchase-hint">No network batch is selected right now.</div>
              )}
            </div>
          </div>
        </div>
      ) : null}
    </div>
  );
};

          return false;
        }
      }
      if (txCashierFilter !== 'all' && row.cashier !== txCashierFilter) return false;
      if (txPriceFilter !== 'all' && row.priceLevel !== txPriceFilter) return false;
      if (txSearch.trim()) {
        const haystack = `${row.time} ${row.cashier} ${row.category} ${row.item} ${row.priceLevel}`.toLowerCase();
        if (!haystack.includes(txSearch.trim().toLowerCase())) return false;
      }
      return true;

      const timeValue = (v) => Number(v.time.replace(':', ''));
      if (txSort === 'time-asc') return timeValue(a) - timeValue(b);

      if (txSort === 'amount-asc') return a.amount - b.amount;
      return timeValue(b) - timeValue(a);

    const rows = filteredTransactions.map((row) => ({
      time: row.time,
      cashier: row.cashier,
      category: row.category,
      item: row.item,
      priceLevel: row.priceLevel,
      amount: row.amount,
    }));
    let payload = '';
    let mime = 'text/plain';
    let extension = format.toLowerCase();
    if (format === 'CSV') {
      mime = 'text/csv;charset=utf-8';
      payload = ['Time,Cashier,Category,Item,Price Level,Amount']
        .concat(rows.map((row) => [row.time, row.cashier, row.category, row.item, row.priceLevel, row.amount.toFixed(2)].join(',')))
        .join('\n');
    } else if (format === 'JSON') {
      mime = 'application/json;charset=utf-8';
      payload = JSON.stringify(rows, null, 2);
      extension = 'json';
    } else {
      mime = 'application/vnd.ms-excel';
      payload = ['Time\tCashier\tCategory\tItem\tPrice Level\tAmount']
        .concat(rows.map((row) => [row.time, row.cashier, row.category, row.item, row.priceLevel, row.amount.toFixed(2)].join('\t')))
        .join('\n');
      extension = 'xls';
    }
    const blob = new Blob([payload], { type: mime });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.download = `storecheck-transactions-${shopCategory}.${extension}`;
    link.style.display = 'none';

const TransactionsView = () => {
  const [mode, setMode] = useState('detail');
  const [scope, setScope] = useState('Today');
  const [shift, setShift] = useState('All');
  const [department, setDepartment] = useState('All');
  const [cashier, setCashier] = useState('All');
  const [tender, setTender] = useState('All');
  const [priceLevel, setPriceLevel] = useState('All');
  const [sort, setSort] = useState('Newest first');
  const [search, setSearch] = useState('');
  const [selectedId, setSelectedId] = useState(TRANSACTION_ROWS[0].id);

  const searchText = search.trim().toLowerCase();
  const filteredRows = TRANSACTION_ROWS.filter((row) => {
    const textMatch =
      !searchText ||
      [row.id, row.receipt, row.shift, row.cashier, row.department, row.item, row.priceLevel, row.tender, row.register]
        .some((value) => String(value).toLowerCase().includes(searchText));
    return (
      textMatch &&
      (shift === 'All' || row.shift === shift) &&
      (department === 'All' || row.department === department) &&
      (cashier === 'All' || row.cashier === cashier) &&
      (tender === 'All' || row.tender === tender) &&
      (priceLevel === 'All' || row.priceLevel === priceLevel)
    );
  });

  const sortedRows = [...filteredRows].sort((a, b) => {
    if (sort === 'Oldest first') return a.time.localeCompare(b.time);
    if (sort === 'Amount high') return b.amount - a.amount;
    if (sort === 'Amount low') return a.amount - b.amount;
    return b.time.localeCompare(a.time);
  });

  const selected = sortedRows.find((row) => row.id === selectedId) || sortedRows[0] || null;
  const total = sumRows(sortedRows);
  const avgTicket = sortedRows.length ? total / sortedRows.length : 0;
  const cardMix = sortedRows.length ? Math.round((sortedRows.filter((row) => row.tender === 'Card').length / sortedRows.length) * 100) : 0;
  const departmentRows = Object.values(groupRows(sortedRows, 'department')).sort((a, b) => b.amount - a.amount);
  const tenderRows = Object.values(groupRows(sortedRows, 'tender')).sort((a, b) => b.amount - a.amount);
  const cashierRows = Object.values(groupRows(sortedRows, 'cashier')).sort((a, b) => b.amount - a.amount);
  const hourlyRows = Object.values(sortedRows.reduce((acc, row) => {
    const hour = `${row.time.slice(0, 2)}:00`;
    if (!acc[hour]) acc[hour] = { label: hour, rows: 0, amount: 0, qty: 0 };
    acc[hour].rows += 1;
    acc[hour].amount += row.amount;
    acc[hour].qty += Number(row.qty) || 0;
    return acc;
  }, {})).sort((a, b) => a.label.localeCompare(b.label));
  const maxAmount = Math.max(1, ...departmentRows.map((row) => row.amount), ...tenderRows.map((row) => row.amount), ...cashierRows.map((row) => row.amount), ...hourlyRows.map((row) => row.amount));

  const exportRows = (format) => downloadData(sortedRows, format, `storecheck-transactions-${scope.toLowerCase().replaceAll(' ', '-')}`);
  const options = (items) => ['All', ...items];
  const renderSelect = (label, value, setter, items) => (
    <div className="tx-filter-group">
      <label>{label}</label>
      <select className="tx-select" value={value} onChange={(e) => setter(e.target.value)}>
        {items.map((item) => <option key={item}>{item}</option>)}
      </select>
    </div>
  );
  const renderBars = (rows) => (
    <div className="tx-bars">
      {rows.map((row) => (
        <div className="tx-bar-row" key={row.label}>
          <div className="tx-bar-label">{row.label}</div>
          <div className="tx-bar-track"><div className="tx-bar-fill" style={{ width: `${Math.max(5, (row.amount / maxAmount) * 100)}%` }}></div></div>
          <div className="tx-bar-value">{fmt(row.amount)}</div>
        </div>
      ))}
    </div>
  );
  const renderList = (rows, secondary = 'rows') => rows.map((row) => (
    <div className="tx-list-row" key={row.label}>
      <div>
        <div className="tx-list-label">{row.label}</div>
        <div className="tx-list-meta">{row.rows} {secondary} · {fmtN(row.qty)} units</div>
      </div>
      <strong>{fmt(row.amount)}</strong>
    </div>
  ));

  const tableRows = sortedRows.length ? sortedRows.map((row) => (
    <tr
      key={row.id}
      className={`tx-click-row ${selected?.id === row.id ? 'tx-row-active' : ''}`}
      onClick={() => setSelectedId(row.id)}
    >
      <td>{fmtTime12(row.time)}</td>
      <td>{row.receipt}</td>
      <td>{row.cashier}</td>
      <td>{row.department}</td>
      <td>{row.item}</td>
      <td>{row.tender}</td>
      <td className="tx-right">{fmt(row.amount)}</td>
    </tr>
  )) : (
    <tr><td colSpan="7"><div className="tx-empty">No transactions match these filters.</div></td></tr>
  );

  return (
    <div className="shell">
      <div className="section-hdr">
        <h1>Transactions Explorer</h1>
        <p>Search POS transactions, filter by cashier, department, tender, item, or price level, and open the receipt behind each number.</p>
      </div>

      <div className="tx-mode-switch" role="tablist" aria-label="Transactions Explorer views">
        {['detail', 'summary', 'hourly', 'graphical'].map((item) => (
          <button key={item} className={`tx-mode-btn ${mode === item ? 'active' : ''}`} onClick={() => setMode(item)}>
            {item === 'detail' ? 'Detail View' : item === 'summary' ? 'Summary View' : item === 'hourly' ? 'Hourly View' : 'Graphical View'}
          </button>
        ))}
      </div>

      <div className="tx-kpi-grid">
        <div className="tx-kpi-card"><div className="tx-kpi-label">Transaction Sales</div><div className="tx-kpi-value">{fmt(total)}</div><div className="tx-kpi-copy">{scope} source rows</div></div>
        <div className="tx-kpi-card"><div className="tx-kpi-label">Transactions</div><div className="tx-kpi-value">{fmtN(sortedRows.length)}</div><div className="tx-kpi-copy">Filtered receipt count</div></div>
        <div className="tx-kpi-card"><div className="tx-kpi-label">Avg Ticket</div><div className="tx-kpi-value">{fmt(avgTicket)}</div><div className="tx-kpi-copy">Average receipt value</div></div>
        <div className="tx-kpi-card"><div className="tx-kpi-label">Card Mix</div><div className="tx-kpi-value">{cardMix}%</div><div className="tx-kpi-copy">Card transactions</div></div>
      </div>

      <div className="tx-toolbar">
        <div className="tx-toolbar-head">
          <div>
            <div className="tx-toolbar-title">Filters and exports</div>
            <div className="tx-toolbar-sub">Use multiple filters together, then export exactly the rows on screen.</div>
          </div>
          <div className="tx-exports">
            <button className="tx-export-btn" onClick={() => exportRows('CSV')}><Icon name="cash" size={16} /> CSV</button>
            <button className="tx-export-btn" onClick={() => exportRows('XLS')}><Icon name="cash" size={16} /> Excel</button>
            <button className="tx-export-btn" onClick={() => exportRows('JSON')}><Icon name="cash" size={16} /> JSON</button>
          </div>
        </div>
        <div className="tx-filters">
          <div className="tx-filter-group">
            <label>Search</label>
            <input className="tx-input" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Receipt, cashier, item, department" />
          </div>
          {renderSelect('Scope', scope, setScope, ['Today', 'Current Shift', 'This Week'])}
          {renderSelect('Shift', shift, setShift, options(uniqueValues(TRANSACTION_ROWS, 'shift')))}
          {renderSelect('Department', department, setDepartment, options(uniqueValues(TRANSACTION_ROWS, 'department')))}
          {renderSelect('Cashier', cashier, setCashier, options(uniqueValues(TRANSACTION_ROWS, 'cashier')))}
          {renderSelect('Tender', tender, setTender, options(uniqueValues(TRANSACTION_ROWS, 'tender')))}
          {renderSelect('Price Level', priceLevel, setPriceLevel, options(uniqueValues(TRANSACTION_ROWS, 'priceLevel')))}
          {renderSelect('Sort', sort, setSort, ['Newest first', 'Oldest first', 'Amount high', 'Amount low'])}
        </div>
      </div>

      {mode === 'detail' ? (
        <div className="tx-layout">
          <div className="tx-table-card">
            <div className="tx-card-title">Transaction Detail</div>
            <div className="tx-card-sub">Click a row to inspect receipt, cashier, tender, register, and item information.</div>
            <div className="tx-table-wrap">
              <table className="tx-table">
                <thead><tr><th>Time</th><th>Receipt</th><th>Cashier</th><th>Department</th><th>Item</th><th>Tender</th><th className="tx-right">Amount</th></tr></thead>
                <tbody>{tableRows}</tbody>
              </table>
            </div>
          </div>
          <div className="tx-receipt-card">
            <div className="tx-receipt-title">Receipt Inspector</div>
            <div className="tx-receipt-meta">{selected ? `${selected.receipt} · ${fmtTime12(selected.time)}` : 'Select a transaction'}</div>
            {selected ? (
              <>
                <div className="tx-receipt-row"><span>Cashier</span><strong>{selected.cashier}</strong></div>
                <div className="tx-receipt-row"><span>Department</span><strong>{selected.department}</strong></div>
                <div className="tx-receipt-row"><span>Item</span><strong>{selected.item}</strong></div>
                <div className="tx-receipt-row"><span>Qty</span><strong>{selected.qty}</strong></div>
                <div className="tx-receipt-row"><span>Price level</span><strong>{selected.priceLevel}</strong></div>
                <div className="tx-receipt-row"><span>Tender</span><strong>{selected.tender}</strong></div>
                <div className="tx-receipt-row"><span>Register</span><strong>{selected.register}</strong></div>
                <div className="tx-receipt-total">{fmt(selected.amount)}</div>
              </>
            ) : <div className="tx-empty">No receipt selected.</div>}
          </div>
        </div>
      ) : null}

      {mode === 'summary' ? (
        <div className="tx-summary-grid">
          <div className="tx-summary-card"><div className="tx-card-title">By Department</div><div className="tx-card-sub">Where the money came from.</div>{renderList(departmentRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">By Tender</div><div className="tx-card-sub">How customers paid.</div>{renderList(tenderRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">By Cashier</div><div className="tx-card-sub">Who handled the transactions.</div>{renderList(cashierRows)}</div>
        </div>
      ) : null}

      {mode === 'hourly' ? (
        <div className="tx-table-card">
          <div className="tx-card-title">Hourly Transaction View</div>
          <div className="tx-card-sub">See traffic and sales by time window so busy periods are easier to explain.</div>
          {renderBars(hourlyRows)}
        </div>
      ) : null}

      {mode === 'graphical' ? (
        <div className="tx-summary-grid">
          <div className="tx-summary-card"><div className="tx-card-title">Department Sales</div>{renderBars(departmentRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">Tender Mix</div>{renderBars(tenderRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">Cashier Activity</div>{renderBars(cashierRows)}</div>
        </div>
      ) : null}
    </div>
  );
};

        ['From', item.from],

  <style>

    .meta strong{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#64748B;margin-bottom:6px}
    table{width:100%;border-collapse:collapse;margin-top:16px}

<body>
  <div class="wrap">

    <div class="meta">

      <div><strong>Status</strong>${item.status}</div>

    <table>
      <thead><tr><th>Field</th><th>Value</th></tr></thead>
      <tbody>
        <tr><td>Item</td><td>${item.item}</td></tr>
        <tr><td>Change</td><td>${item.change}</td></tr>
        <tr><td>Type</td><td>${item.type}</td></tr>

        <tr><td>Requested At</td><td>${item.requestedAt}</td></tr>
        <tr><td>Source</td><td>${item.source}</td></tr>
        <tr><td>Note</td><td>${item.note}</td></tr>
      </tbody>
    </table>
  </div>
</body>
</html>`;
    downloadTextData(html, 'text/html', `storecheck-pending-pos-${String(item.id).toLowerCase()}`, 'html');

    updatePendingRow(item.id, {
      status: 'Reviewed',
      lastAttempt: `Reviewed ${time}`,
      history: [...item.history, `Reviewed by owner at ${time}`],

    setSelectedPendingId(item.id);
    showNotice(`${item.id} marked reviewed in demo mode.`);
  };
  const holdPendingPacket = (item = selectedPendingRow) => {

    updatePendingRow(item.id, {
      status: 'Held',
      lastAttempt: `Held ${time}`,
      history: [...item.history, `Held in StoreCheck at ${time}`],

  const approvePendingPacket = (item = selectedPendingRow) => {

      lastAttempt: `Approved ${time}`,

      readyIds.includes(item.id)

<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>${title}</title>
  <style>
    body{font-family:"DM Sans",Arial,sans-serif;background:#F8FAFC;color:#0F172A;padding:28px}
    .wrap{max-width:980px;margin:0 auto;background:#fff;border:1px solid #E2E8F0;border-radius:18px;padding:28px;box-shadow:0 12px 40px rgba(15,23,42,.08)}

    p{margin:0;color:#475569}
    .meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:20px 0}
    .meta div{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:12px;padding:12px 14px}
    .meta strong{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#64748B;margin-bottom:6px}
    table{width:100%;border-collapse:collapse;margin-top:16px}
    th,td{padding:12px 14px;border-top:1px solid #E2E8F0;text-align:left}
    th{background:#F8FAFC;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#64748B}
    td{font-weight:600}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>${title}</h1>
    <p>${subtitle}</p>
    <div class="meta">
      <div><strong>Mercury Route</strong>${route}</div>
      <div><strong>Context</strong>${note}</div>
      <div><strong>Prepared</strong>${todayStr()}</div>
    </div>
    <table>
      <thead><tr>${headers.map((cell) => `<th>${cell}</th>`).join('')}</tr></thead>
      <tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
  </div>
</body>
</html>`;
    downloadTextData(html, 'text/html', filename, 'html');
  };
  const pushHouseUploadEvent = ({ attachmentId, customer, fileName, action, status, note }) => {
    setHouseUploadEvents((current) => [
      {
        id: `HAU-${current.length + 401}`,
        attachmentId,
        customer,
        fileName,
        time: buildFinancialStamp(),
        actor: 'StoreCheck demo',
        route: '/localCredits/uploadDocument',
        action,
        status,
        note,
      },
      ...current,
    ]);
  };
  const pushHouseDownloadEvent = ({ attachmentId, customer, fileName, action, status, note }) => {
    setHouseDownloadEvents((current) => [
      {
        id: `HADL-${current.length + 501}`,
        attachmentId,
        customer,
        fileName,
        time: buildFinancialStamp(),
        actor: 'StoreCheck demo',
        route: '/localCredits/downloadDocument?fileName=',
        action,
        status,
        note,
      },
      ...current,
    ]);
  };
  const addHouseAttachment = (file) => {

    const stamp = new Date().toLocaleString('en-US', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });

      id: `HAD-${houseAttachments.length + 220}`,

      fileName: file.name,
      type: 'Document Upload',
      added: stamp,
      status: 'Ready',
      note: 'Uploaded in demo mode for house-account attachment review.',
    };
    setHouseAttachments((current) => [next, ...current]);

      attachmentId: next.id,
      customer: next.customer,
      fileName: next.fileName,
      action: 'Queued upload packet',
      status: 'Queued',
      note: 'Demo-safe upload handoff staged from the Financial workspace.',

  const downloadHouseReference = (item = selectedAttachment) => {

  const previewHouseUploadPacket = (item = selectedAttachment) => {

  const saveHouseUploadPacket = (item = selectedAttachment) => {

    pushHouseUploadEvent({

      note: 'Endpoint packet exported while the live upload endpoint remained demo-only.',

  };
  const exportHouseUploadEvents = (format) => {

  const exportHouseDownloadEvents = (format) => {
    const rows = selectedHouseDownloadEvents.length ? selectedHouseDownloadEvents : visibleHouseDownloadEvents;

      { id: `LQ-${Date.now()}`, time, reason: logoutReason, destination: logoutDestination, store: currentLocation.name, status },
      ...current,
    ].slice(0, 6));
  };
  const stampSessionTime = () => new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const settingsPacketHtml = ({ title, subtitle, route, note, headers, rows }) => `<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>${title}</title>
  <style>
    body{font-family:"DM Sans",Arial,sans-serif;background:#F8FAFC;color:#0F172A;padding:28px}
    .wrap{max-width:980px;margin:0 auto;background:#fff;border:1px solid #E2E8F0;border-radius:18px;padding:28px;box-shadow:0 12px 40px rgba(15,23,42,.08)}
    h1{margin:0 0 8px;font-size:28px}
    p{margin:0;color:#475569}
    .meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin:20px 0}
    .meta div{background:#F8FAFC;border:1px solid #E2E8F0;border-radius:12px;padding:12px 14px}
    .meta strong{display:block;font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:#64748B;margin-bottom:6px}
    table{width:100%;border-collapse:collapse;margin-top:16px}
    th,td{padding:12px 14px;border-top:1px solid #E2E8F0;text-align:left}
    th{background:#F8FAFC;font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:#64748B}
    td{font-weight:600}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>${title}</h1>
    <p>${subtitle}</p>
    <div class="meta">
      <div><strong>Mercury Route</strong>${route}</div>
      <div><strong>Context</strong>${note}</div>
      <div><strong>Prepared</strong>${todayStr()}</div>
    </div>
    <table>
      <thead><tr>${headers.map((cell) => `<th>${cell}</th>`).join('')}</tr></thead>
      <tbody>${rows.map((row) => `<tr>${row.map((cell) => `<td>${cell}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>
  </div>
</body>
</html>`;
  const openSettingsPacket = ({ title, subtitle, headers, rows }) => openPrintPreview({ title, subtitle, rows: [headers, ...rows] });
  const saveSettingsPacket = ({ title, subtitle, route, note, headers, rows, filename }) => {
    const html = settingsPacketHtml({ title, subtitle, route, note, headers, rows });
    downloadTextData(html, 'text/html', filename, 'html');
  };
  const previewAccountSettings = () =>
    openSettingsPacket({
      title: 'Admin Account Settings',
      subtitle: `${currentLocation.name} · configured email routing`,
      headers: ['Role', 'Email', 'Surface'],
      rows: [
        ['Login / Account', loginEmail, 'Admin / Account'],
        ['Report Delivery', reportEmail, 'Reports / Delivery'],
        ['Alerts', alertsEmail, 'Alerts / Session'],
      ],
    });
  const saveAccountSettingsPacket = () => {
    saveSettingsPacket({
      title: 'Admin Account Settings Packet',
      subtitle: `${currentLocation.name} · configured email routing`,
      route: '/administration/email',
      note: 'Admin account and email settings replacement shell',
      headers: ['Role', 'Email', 'Surface'],
      rows: [
        ['Login / Account', loginEmail, 'Admin / Account'],
        ['Report Delivery', reportEmail, 'Reports / Delivery'],
        ['Alerts', alertsEmail, 'Alerts / Session'],
      ],
      filename: 'storecheck-admin-account-settings',
    });
    showSessionNotice('Admin account settings packet saved in demo mode.');
  };
  const previewLicenceCheck = (item = latestLicenceCheck) => {
    if (!item) return;
    openSettingsPacket({
      title: 'Licence Check Review',
      subtitle: `${item.store} · ${item.time}`,
      headers: ['Store', 'Agreement', 'Register', 'Result', 'Note'],
      rows: [[item.store, item.agreement, item.register, item.result, item.note]],
    });
  };
  const saveLicenceCheckPacket = (item = latestLicenceCheck) => {
    if (!item) return;
    saveSettingsPacket({
      title: 'Licence Check Packet',
      subtitle: `${item.store} · ${item.time}`,
      route: '/user/licenceDetails',
      note: 'Session licence review replacement shell',
      headers: ['Store', 'Agreement', 'Register', 'Result', 'Note'],
      rows: [[item.store, item.agreement, item.register, item.result, item.note]],
      filename: `storecheck-licence-check-${String(item.id).toLowerCase()}`,
    });
    showSessionNotice(`${item.id} licence packet saved in demo mode.`);
  };
  const saveAgreementState = () => {
    const time = stampSessionTime();
    const value = agreementAccepted ? 'Accepted' : 'Pending';
    const agreementRow = {
      id: `AGR-${Date.now()}`,
      time,
      store: currentLocation.name,
      value,
      actor: currentLocation.manager,
      status: agreementAccepted ? 'Saved' : 'Blocked',
      note: agreementAccepted ? 'Agreement saved during session init review.' : 'Agreement still needs acceptance before session can proceed.',
    };
    const licenceRow = {
      id: `LIC-${Date.now()}`,
      time,
      store: currentLocation.name,
      agreement: value,
      register: registerStatus,
      result: agreementAccepted && registerStatus === 'Connected' ? 'Passed' : 'Review',
      note: agreementAccepted ? 'Licence review updated after agreement save.' : 'Agreement must be accepted before the licence review can pass.',
    };
    setAgreementSaveRows((current) => [agreementRow, ...current].slice(0, 6));
    setLicenceCheckRows((current) => [licenceRow, ...current].slice(0, 6));
    showSessionNotice(agreementAccepted ? 'Agreement acceptance saved in demo mode. Real `/user/saveAgreementDetails` wiring still pending.' : 'Enable agreement acceptance before saving the demo session state.');
  };
  const saveAgreementHistoryPacket = () => {
    saveSettingsPacket({
      title: 'Agreement Save History',
      subtitle: `${currentLocation.name} · session init`,
      route: '/user/saveAgreementDetails',
      note: 'Agreement save history replacement shell',
      headers: ['Time', 'Store', 'Value', 'Actor', 'Status', 'Note'],
      rows: agreementSaveRows.map((item) => [item.time, item.store, item.value, item.actor, item.status, item.note]),
      filename: 'storecheck-agreement-history',
    });
    showSessionNotice('Agreement-history packet saved in demo mode.');
  };
  const refreshRegisterReview = () => {
    const previous = registerStatus;
    const nextStatus = registerStatus === 'Connected' ? 'Refresh Needed' : 'Connected';
    const time = stampSessionTime();
    const refreshRow = {
      id: `REG-${Date.now()}`,
      time,
      store: currentLocation.name,
      previous,
      current: nextStatus,
      source: 'Session start',
      status: nextStatus === 'Connected' ? 'Updated' : 'Needs follow-up',
      note: nextStatus === 'Connected' ? 'Register came online after refresh.' : 'Register still needs follow-up before session start clears.',
    };
    const licenceRow = {
      id: `LIC-${Date.now()}-REG`,
      time,
      store: currentLocation.name,
      agreement: agreementAccepted ? 'Accepted' : 'Pending',
      register: nextStatus,
      result: agreementAccepted && nextStatus === 'Connected' ? 'Passed' : 'Review',
      note: 'Licence review updated after register-status refresh.',
    };
    setRegisterStatus(nextStatus);
    setRegisterRefreshRows((current) => [refreshRow, ...current].slice(0, 6));
    setLicenceCheckRows((current) => [licenceRow, ...current].slice(0, 6));
    showSessionNotice('Register status refreshed in demo mode. Real `/user/checkRegisterStatus` wiring still pending.');
  };
  const saveRegisterRefreshPacket = () => {
    saveSettingsPacket({
      title: 'Register Refresh Log',
      subtitle: `${currentLocation.name} · session init`,
      route: '/user/checkRegisterStatus',
      note: 'Register refresh review replacement shell',
      headers: ['Time', 'Store', 'Previous', 'Current', 'Source', 'Status', 'Note'],
      rows: registerRefreshRows.map((item) => [item.time, item.store, item.previous, item.current, item.source, item.status, item.note]),
      filename: 'storecheck-register-refresh-log',
    });
    showSessionNotice('Register-refresh packet saved in demo mode.');
  };
  const previewLogoutHandoff = () =>
    openSettingsPacket({
      title: 'Logout Confirmation',
      subtitle: `${currentLocation.name} · ${logoutReason}`,
      headers: ['Store', 'Reason', 'Next Step', 'Register', 'Pending Updates', 'Temp Session'],
      rows: [[currentLocation.name, logoutReason, logoutDestination, registerStatus, fmtN(releaseNeedsReviewCount), tempSessionOpen ? 'Open' : 'Closed']],
    });
  const saveLogoutPacket = () => {
    saveSettingsPacket({
      title: 'Session Logout Packet',
      subtitle: `${currentLocation.name} · ${logoutReason}`,
      route: '/user/logout',
      note: 'Logout and session handoff replacement shell',
      headers: ['Store', 'Manager', 'Reason', 'Next Step', 'Register Status', 'Pending Updates', 'Temp Session'],
      rows: [[currentLocation.name, currentLocation.manager, logoutReason, logoutDestination, registerStatus, fmtN(releaseNeedsReviewCount), tempSessionOpen ? 'Open' : 'Closed']],
      filename: 'storecheck-session-logout',
    });
    showSessionNotice('Logout/session packet saved in demo mode. Real logout endpoint still pending.');
  };
  const confirmLogoutHandoff = () => {
    stampLogoutQueue(releaseNeedsReviewCount ? 'Pending updates' : 'Complete');
    setTempSessionOpen(false);
    setRegisterStatus(registerStatus === 'Connected' ? 'Refresh Needed' : registerStatus);
    showSessionNotice(`Logout handoff staged for ${currentLocation.name} in demo mode. Real \`/user/logout\` wiring still pending.`);
  };
  const previewReleaseNotes = () =>
    openSettingsPacket({
      title: 'Release Notes',
      subtitle: `${currentLocation.name} · StoreCheck updates`,
      headers: ['Date', 'Title', 'Status', 'Note'],
      rows: releaseRows.map((item) => [item.date, item.title, item.status, item.note]),
    });
  const openSelectedRelease = (item = selectedRelease) => {
    if (!item) return;
    setSelectedReleaseId(item.id);
    setReleaseRows((current) => current.map((row) => (
      row.id === item.id && row.status === 'Needs review' ? { ...row, status: 'Opened' } : row
    )));
    openSettingsPacket({
      title: 'Release Note Review',
      subtitle: `${currentLocation.name} · ${item.title}`,
      headers: ['Date', 'Title', 'Status', 'Audience', 'Note'],
      rows: [[item.date, item.title, item.status, item.audience, item.note]],
    });
    showSessionNotice(`${item.id} opened in demo mode. Live \`/user/openReleasePage\` wiring still pending.`);
  };
  const saveReleaseNotesPacket = () => {
    saveSettingsPacket({
      title: 'Release Notes Packet',
      subtitle: `${currentLocation.name} · StoreCheck updates`,
      route: '/user/openReleasePage',
      note: 'Release notes and updates replacement shell',
      headers: ['Date', 'Title', 'Status', 'Note'],
      rows: releaseRows.map((item) => [item.date, item.title, item.status, item.note]),
      filename: 'storecheck-release-notes',
    });
    showSessionNotice('Release-notes packet saved in demo mode.');
  };
  const saveSelectedReleasePacket = (item = selectedRelease) => {
    if (!item) return;
    saveSettingsPacket({
      title: 'Release Review Packet',
      subtitle: `${currentLocation.name} · ${item.title}`,
      route: '/user/openReleasePage',
      note: 'Release-note review replacement shell',
      headers: ['Date', 'Title', 'Status', 'Audience', 'Note'],
      rows: [[item.date, item.title, item.status, item.audience, item.note]],
      filename: `storecheck-release-${String(item.id).toLowerCase()}`,
    });
    showSessionNotice(`${item.id} release packet saved in demo mode.`);
  };
  const markReleaseReviewed = (id) => {
    setReleaseRows((current) => current.map((item) => (item.id === id ? { ...item, status: 'Reviewed' } : item)));
    setSelectedReleaseId(id);
    showSessionNotice(`${id} marked reviewed in demo mode.`);
  };

  return (

      <div className="settings-grid">
        <div className="settings-card">
          <div className="settings-title">Session Init & Agreements</div>
          <div className="settings-sub">Replacement shell for Mercury licence checks, agreement acceptance, and register/session status.</div>
          <div className="connect-status">
            <span className="source-dot"></span>
            <span>Register status: {registerStatus}</span>
          </div>
          <div className="toggle-row">
            <span className="toggle-label">Store agreement accepted for this session</span>
            <input type="checkbox" checked={agreementAccepted} onChange={(e) => setAgreementAccepted(e.target.checked)} />
          </div>
          <div className="toggle-row">
            <span className="toggle-label">Session licence check</span>
            <span className={`purchase-tag${latestLicenceCheck?.result === 'Passed' ? ' blue' : ' amber'}`}>{latestLicenceCheck?.result || (agreementAccepted ? 'Passed' : 'Pending')}</span>
          </div>
          <div className="purchase-kv-list">
            <div className="purchase-kv"><span>Latest licence review</span><span>{latestLicenceCheck?.result || 'Pending'}</span></div>
            <div className="purchase-kv"><span>Agreement saves</span><span>{fmtN(agreementSaveRows.length)}</span></div>
            <div className="purchase-kv"><span>Register refreshes</span><span>{fmtN(registerRefreshRows.length)}</span></div>
          </div>
          <button className="connect-btn" onClick={() => previewLicenceCheck()}>
            <Icon name="report" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Preview Licence Check</span>
          </button>
          <button className="connect-btn" style={{ marginTop: 10 }} onClick={() => saveAgreementState()}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Save Agreement State</span>
          </button>
          <button className="connect-btn" style={{ marginTop: 10 }} onClick={() => refreshRegisterReview()}>
            <Icon name="connect" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Refresh Register Status</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Session Init Review</div>
          <div className="settings-sub">Owner-facing review shell for licence checks, agreement saves, and register refresh before the session starts.</div>
          <div className="purchase-kv-list">
            <div className="purchase-kv"><span>Latest licence check</span><span>{latestLicenceCheck ? `${latestLicenceCheck.time} · ${latestLicenceCheck.result}` : 'Pending'}</span></div>
            <div className="purchase-kv"><span>Latest agreement save</span><span>{latestAgreementSave ? `${latestAgreementSave.time} · ${latestAgreementSave.value}` : 'Pending'}</span></div>
            <div className="purchase-kv"><span>Latest register refresh</span><span>{latestRegisterRefresh ? `${latestRegisterRefresh.time} · ${latestRegisterRefresh.current}` : 'Pending'}</span></div>
          </div>
          <div className="pricebook-actions" style={{ marginTop: 16 }}>
            <button className="pricebook-btn" onClick={() => previewLicenceCheck()}>
              <Icon name="report" size={15} /> Preview licence
