<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>StoreCheck - Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2F7;
  --bg-panel:#F8FBF9;
  --white:#FFFFFF;
  --sidebar:#ECF7F0;
  --sidebar-2:#DDEFE4;
  --accent:#27C66B;
  --accent-2:#8EE7B3;
  --accent-soft:rgba(39,198,107,0.12);
  --accent-deep:#1E9A54;
  --text:#14211A;
  --text-2:#495852;
  --text-3:#6E7F77;
  --border:#E3EBE6;
  --line:#EEF1F6;
  --shadow:0 16px 40px rgba(16,24,40,0.08);
  --shadow-soft:0 8px 24px rgba(16,24,40,0.05);
  --amber:#F59E0B;
  --amber-soft:rgba(245,158,11,0.16);
  --red:#EF4444;
  --red-soft:rgba(239,68,68,0.14);
  --blue:#3B82F6;
  --blue-soft:rgba(59,130,246,0.14);
  --purple:#8B5CF6;
  --purple-soft:rgba(139,92,246,0.15);
  --green-soft:rgba(39,198,107,0.14);
  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:12px;
  --sidebar-w:264px;
}
html,body,#app,#root{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(39,198,107,0.05), transparent 26%),
    radial-gradient(circle at bottom right, rgba(39,198,107,0.05), transparent 24%),
    var(--bg);
  color:var(--text);
}
button,input{font:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:999px}

#root{
  display:grid;
  grid-template-columns:var(--sidebar-w) minmax(0,1fr);
  min-height:100vh;
}
.sidebar{
  background:
    radial-gradient(circle at top right, rgba(39,198,107,0.1), transparent 26%),
    linear-gradient(180deg, #F3FAF5 0%, #EAF6EE 46%, #E2F1E8 100%);
  color:var(--text);
  padding:22px 18px 20px;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}
.sidebar::before{
  content:'';
  position:absolute;
  inset:auto -70px -110px auto;
  width:220px;
  height:220px;
  background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 72%);
  pointer-events:none;
}
.main{
  display:flex;
  flex-direction:column;
  min-width:0;
  min-height:100vh;
}
.content{
  flex:1;
  overflow-y:auto;
  padding:28px;
}
.shell{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.sb-logo{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:6px 6px 22px;
  border-bottom:1px solid rgba(39,198,107,0.1);
  position:relative;
  z-index:1;
  text-align:center;
}
.sb-logo-main{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.sb-logo-icon{
  width:44px;
  height:44px;
  border-radius:14px;
  background:#27C66B;
  border:1px solid rgba(39,198,107,0.22);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:15px;
  font-weight:700;
  letter-spacing:-0.04em;
  box-shadow:0 10px 24px rgba(39,198,107,0.18);
}
.sb-logo-text{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.sb-logo-text h2{
  font-size:17px;
  font-weight:700;
  letter-spacing:-0.03em;
  text-align:center;
}
.sb-logo-text p{display:none}
.sb-nav{
  flex:1;
  padding:16px 0;
  overflow-y:auto;
  position:relative;
  z-index:1;
}
.sb-section{
  font-size:11px;
  color:#71877B;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.14em;
  padding:8px 10px;
}
.sb-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px 12px 16px;
  border-left:3px solid transparent;
  color:#43524C;
  font-size:14px;
  font-weight:500;
  border-radius:0 14px 14px 0;
  cursor:pointer;
  transition:background .18s ease,color .18s ease,border-color .18s ease,transform .18s ease;
}
.sb-item + .sb-item{margin-top:4px}
.sb-item:hover{
  background:rgba(39,198,107,0.08);
  color:var(--text);
  transform:translateX(2px);
}
.sb-item.active{
  background:linear-gradient(90deg, rgba(39,198,107,0.18), rgba(39,198,107,0.08));
  color:var(--accent-deep);
  border-left-color:var(--accent);
}
.sb-item-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-badge{
  margin-left:auto;
  min-width:22px;
  height:22px;
  padding:0 8px;
  border-radius:999px;
  background:#fff;
  color:var(--accent);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:700;
}
.sb-footer{
  position:relative;
  z-index:1;
  padding-top:16px;
  border-top:1px solid rgba(39,198,107,0.1);
}
.sb-store-info{
  background:#FFFFFF;
  border:1px solid rgba(39,198,107,0.16);
  border-radius:18px;
  padding:14px;
  backdrop-filter:blur(10px);
}
.sb-location-select{
  width:100%;
  min-height:38px;
  margin-top:12px;
  border:1px solid rgba(39,198,107,0.18);
  border-radius:12px;
  padding:0 12px;
  background:#F8FCF9;
  color:var(--text-1);
  font:800 12px/1 "DM Sans",sans-serif;
}
.sb-footer-actions{
  display:grid;
  gap:8px;
  margin-top:12px;
}
.sb-link-btn{
  display:flex;
  align-items:center;
  gap:8px;
  border:0;
  padding:0;
  background:transparent;
  color:var(--green-dark);
  font:800 12px/1.4 "DM Sans",sans-serif;
  cursor:pointer;
}
.sb-meta{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:#61766A;
  margin-bottom:10px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:700;
}
.sb-live-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 6px rgba(39,198,107,0.14);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.sb-store-name{font-size:14px;font-weight:700;color:var(--text)}
.sb-store-sub{font-size:12px;color:var(--text-3);margin-top:4px}

.topbar{
  padding:22px 28px 0;
  flex-shrink:0;
}
.topbar-inner{
  background:rgba(255,255,255,0.88);
  border:1px solid rgba(39,198,107,0.08);
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(18px);
  border-radius:24px;
  padding:18px 20px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:16px;
}
.topbar-copy{
  grid-column:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  min-width:0;
}
.eyebrow{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text-3);
  margin-bottom:6px;
}
.eyebrow-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
}
.topbar-title{
  font-size:26px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.05em;
}
.topbar-sub{
  font-size:13px;
  color:var(--text-2);
  margin-top:6px;
}
.topbar-actions{
  grid-column:3;
  justify-self:end;
  display:flex;
  align-items:center;
  gap:10px;
}
.mobile-nav-btn{
  display:none;
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  align-items:center;
  justify-content:center;
  background:#FFFFFF;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
}
.mobile-sidebar-overlay{
  display:none;
}
.view-switch{
  display:flex;
  align-items:center;
  gap:6px;
  padding:5px;
  border-radius:16px;
  border:1px solid rgba(39,198,107,0.1);
  background:#fff;
  box-shadow:var(--shadow-soft);
}
.view-switch-btn{
  border:none;
  background:transparent;
  color:var(--text-2);
  padding:10px 14px;
  border-radius:12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}
.view-switch-btn.active{
  background:rgba(39,198,107,0.12);
  color:var(--accent-deep);
}
.source-pill,
.topbar-btn,
.topbar-avatar{
  border:1px solid rgba(39,198,107,0.1);
  background:rgba(255,255,255,0.86);
  box-shadow:var(--shadow-soft);
}
.source-pill{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:14px;
  color:var(--text-2);
  font-size:12px;
  font-weight:700;
}
.source-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 4px rgba(39,198,107,0.12);
}
.topbar-btn{
  width:42px;
  height:42px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
}
.notif-dot{
  position:absolute;
  top:8px;
  right:8px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--red);
  box-shadow:0 0 0 3px #fff;
}
.topbar-avatar{
  width:42px;
  height:42px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--accent-deep);
  font-weight:700;
  letter-spacing:-0.03em;
}

.section-hdr h1{
  font-size:34px;
  line-height:1.02;
  letter-spacing:-0.06em;
  font-weight:700;
}
.section-hdr p{
  font-size:15px;
  color:var(--text-2);
  margin-top:10px;
  line-height:1.55;
}
.section-hdr.slim p{
  margin-top:0;
  font-size:17px;
  max-width:760px;
}
.greeting-inline{
  display:inline-flex;
  align-items:center;
  gap:10px;
}

.card,
.kpi-card,
.status-card,
.chart-card,
.alerts-card,
.tank-card,
.grade-card,
.cat-card,
.week-card,
.settings-card{
  background:var(--white);
  border:1px solid rgba(228,232,239,0.9);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
}
.card-pad{padding:24px}

.demo-bar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px 18px;
  background:linear-gradient(135deg, rgba(245,158,11,0.16), rgba(245,158,11,0.08));
  border:1px solid rgba(245,158,11,0.26);
  border-radius:18px;
  color:#8A5A00;
  font-size:13px;
}
.demo-copy strong{font-weight:700}

.kpi-row{
  display:grid;
  grid-template-columns:1.7fr 1fr 1fr 1fr;
  gap:18px;
  margin-bottom:20px;
}
.kpi-hero{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at top right, rgba(39,198,107,0.12), transparent 28%),
    linear-gradient(135deg, #FFFFFF 0%, #F7FCF8 58%, #EEF9F2 100%);
  border-radius:var(--radius-xl);
  padding:28px;
  min-height:220px;
  border:1px solid rgba(39,198,107,0.12);
  box-shadow:0 24px 48px rgba(39,198,107,0.12);
}
.kpi-hero::before,
.kpi-hero::after{
  content:'';
  position:absolute;
  border-radius:50%;
  background:rgba(39,198,107,0.06);
}
.kpi-hero::before{width:210px;height:210px;top:-86px;right:-52px}
.kpi-hero::after{width:150px;height:150px;bottom:-64px;right:38px}
.hero-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  position:relative;
  z-index:1;
}
.kpi-hero-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:#7FA18E;
}
.kpi-hero-value{
  font-size:52px;
  line-height:0.96;
  font-weight:700;
  color:var(--text);
  letter-spacing:-0.07em;
  margin:14px 0 12px;
  position:relative;
  z-index:1;
}
.kpi-hero-trend{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(39,198,107,0.08);
  border:1px solid rgba(39,198,107,0.1);
  font-size:12px;
  font-weight:600;
  color:var(--text-2);
  position:relative;
  z-index:1;
}
.trend-up{color:#86EFAC}
.trend-down{color:#FCA5A5}
.hero-foot{
  position:absolute;
  left:28px;
  right:28px;
  bottom:24px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:18px;
  z-index:1;
}
.hero-foot-copy{
  font-size:13px;
  line-height:1.5;
  color:var(--text-2);
  max-width:260px;
}
.hero-tag{
  background:#FFFFFF;
  border:1px solid rgba(39,198,107,0.12);
  border-radius:16px;
  padding:12px 14px;
  min-width:138px;
}
.hero-tag-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:#83A090;
}
.hero-tag-value{
  font-size:20px;
  font-weight:700;
  color:var(--accent-deep);
  margin-top:6px;
  letter-spacing:-0.04em;
}
.kpi-card{
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.icon-chip{
  width:46px;
  height:46px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.kpi-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-weight:700;
  color:var(--text-3);
}
.kpi-value{
  font-size:32px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.06em;
}
.kpi-sub{
  font-size:13px;
  color:var(--text-2);
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:auto;
}

.status-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:18px;
  margin-bottom:20px;
}
.status-card{
  padding:22px;
  border-top:4px solid transparent;
}
.status-card.green{border-top-color:var(--accent)}
.status-card.red{border-top-color:var(--red)}
.status-card.amber{border-top-color:var(--amber)}
.status-card.blue{border-top-color:var(--blue)}
.status-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:16px;
}
.status-header-label{
  font-size:11px;
  font-weight:700;
  color:var(--text-3);
  letter-spacing:0.12em;
  text-transform:uppercase;
}
.status-big{
  font-size:38px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.06em;
}
.status-big.green{color:#15803D}
.status-big.red{color:var(--red)}
.status-big.amber{color:#B45309}
.status-big.blue{color:#1D4ED8}
.status-msg{
  margin-top:10px;
  font-size:13px;
  line-height:1.6;
  color:var(--text-2);
}
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  border-radius:999px;
  padding:7px 12px;
  margin-top:14px;
  font-size:12px;
  font-weight:700;
}
.status-badge.green{background:var(--green-soft);color:#15803D}
.status-badge.red{background:var(--red-soft);color:#B91C1C}
.status-badge.amber{background:var(--amber-soft);color:#92400E}
.status-badge.blue{background:var(--blue-soft);color:#1D4ED8}

.bottom-row{
  display:grid;
  grid-template-columns:1.45fr 1fr;
  gap:18px;
  margin-bottom:20px;
}
.chart-card,
.alerts-card,
.week-card,
.settings-card{
  padding:24px;
}
.chart-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:20px;
}
.chart-title,
.alerts-title,
.week-title,
.settings-title{
  font-size:17px;
  font-weight:700;
  letter-spacing:-0.04em;
}
.chart-sub,
.alerts-sub,
.settings-sub{
  font-size:13px;
  color:var(--text-3);
  margin-top:5px;
}
.chart-wrap{position:relative;height:220px}
.chart-total{
  padding:10px 12px;
  border-radius:14px;
  background:var(--accent-soft);
  color:#166534;
  font-size:12px;
  font-weight:700;
}
.alerts-list{display:flex;flex-direction:column}
.alert-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 0;
  border-bottom:1px solid var(--line);
}
.alert-item:last-child{border-bottom:none;padding-bottom:0}
.alert-copy{flex:1;min-width:0}
.alert-text{
  font-size:13px;
  line-height:1.6;
  color:var(--text);
  font-weight:500;
}
.alert-btn{
  margin-left:auto;
  border:none;
  border-radius:12px;
  padding:9px 12px;
  background:var(--bg-panel);
  color:var(--text-2);
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}
.alert-btn:hover{background:#E8EDF5}

.reports-filter-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
  margin-top:18px;
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}
.ops-shell{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.ops-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
.ops-title{
  font-size:42px;
  line-height:1.04;
  font-weight:700;
  letter-spacing:-0.06em;
}
.ops-subtitle{
  margin-top:6px;
  font-size:20px;
  line-height:1.6;
  color:var(--text-2);
}
.ops-kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.ops-kpi{
  background:#fff;
  border:1px solid rgba(39,198,107,0.14);
  border-radius:16px;
  padding:12px 14px;
}
.ops-kpi-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--text-3);
}
.ops-kpi-value{
  margin-top:6px;
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.06em;
}
.ops-kpi-sub{
  margin-top:4px;
  font-size:12px;
  color:var(--text-2);
}
.ops-sheet{
  background:#fff;
  border:1px solid rgba(39,198,107,0.14);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.ops-sheet-top{
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  gap:16px;
  padding:18px 22px;
  background:linear-gradient(90deg, #1E9A54 0%, #27C66B 100%);
  color:#fff;
}
.ops-sheet-brand{

const BarChart = ({ data, labels, height = 220 }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            data,
            backgroundColor: labels.map((_, i) =>
              i === 6 ? 'rgba(30,154,84,0.92)' : i % 2 === 0 ? 'rgba(39,198,107,0.9)' : 'rgba(142,231,179,0.82)'
            ),
            borderColor: labels.map((_, i) => (i === 6 ? '#1E9A54' : '#27C66B')),
            borderWidth: 1,
            borderRadius: 10,
            borderSkipped: false,
            maxBarThickness: 34,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: (ctx) => ' ' + fmt(ctx.raw) },
            backgroundColor: '#1E9A54',
            padding: 12,
            cornerRadius: 10,
            displayColors: false,
          },
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: { font: { family: 'DM Sans', size: 12, weight: '600' }, color: '#7B8794' },
          },
          y: {
            grid: { color: '#EDF1F6' },
            border: { display: false },
            ticks: {
              font: { family: 'DM Sans', size: 11, weight: '600' },
              color: '#94A3B8',
              callback: (v) => '$' + v / 1000 + 'K',
            },
          },
        },
      },
    });

    return () => chartRef.current?.destroy();
  }, [data, labels]);

  return <canvas ref={ref} style={{ height: height + 'px' }} />;
};

const uniqueValues = (rows, key) => [...new Set(rows.map((row) => row[key]))].sort();
const sumRows = (rows) => rows.reduce((sum, row) => sum + row.amount, 0);
const groupRows = (rows, key) =>
  rows.reduce((acc, row) => {
    const group = row[key];
    if (!acc[group]) acc[group] = { label: group, rows: 0, amount: 0, qty: 0 };
    acc[group].rows += 1;
    acc[group].amount += row.amount;
    acc[group].qty += Number(row.qty) || 0;
    return acc;
  }, {});

const downloadData = (rows, format, filename) => {
  const normalized = rows.map((row) => ({
    Date: row.date,
    Time: row.time,
    Receipt: row.receipt,
    Shift: row.shift,
    Cashier: row.cashier,
    Department: row.department,
    Item: row.item,
    Qty: row.qty,
    PriceLevel: row.priceLevel,
    Tender: row.tender,
    Amount: row.amount.toFixed(2),
    Register: row.register,
  }));
  const headers = Object.keys(normalized[0] || {});
  const body =
    format === 'JSON'
      ? JSON.stringify(normalized, null, 2)
      : [headers.join(','), ...normalized.map((row) => headers.map((header) => `"${String(row[header]).replaceAll('"', '""')}"`).join(','))].join('\n');
  const mime = format === 'JSON' ? 'application/json' : 'text/csv';
  const extension = format === 'JSON' ? 'json' : format === 'XLS' ? 'xls' : 'csv';
  const blob = new Blob([body], { type: mime });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename}.${extension}`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
};

    </div>

};

                <button className="pricebook-btn" onClick={() => showNotice(`${selectedDraft.id} opened in print preview shell. Live detail print is still pending.`)}>
                  <Icon name="report" size={15} /> Print
                </button>
                <button className="pricebook-btn primary" onClick={() => showNotice(`${selectedDraft.id} reopened for edit in demo mode.`)}>
                  <Icon name="cash" size={15} /> Open draft
                </button>
              </div>
            </div>

            <div className="purchase-note-card">
              <h3>Network batches</h3>
              <p>Supporting settlement context kept visible beside the draft drilldown.</p>
              <div className="purchase-kv-list">
                {networkBatches.map((row) => (
                  <div className="purchase-kv" key={row.id}><span>{row.id} · {row.date}</span><span>{fmt(row.net)}</span></div>
                ))}
              </div>
            </div>
          </div>
        </div>
      ) : null}
    </div>
  );
};

      if (txCategoryFilter !== 'all') {
        if (shopCategory === 'overview') {
          if (row.category !== txCategoryFilter) return false;
        } else if (row.item !== txCategoryFilter) {
          return false;
        }
      }
      if (txCashierFilter !== 'all' && row.cashier !== txCashierFilter) return false;
      if (txPriceFilter !== 'all' && row.priceLevel !== txPriceFilter) return false;
      if (txSearch.trim()) {
        const haystack = `${row.time} ${row.cashier} ${row.category} ${row.item} ${row.priceLevel}`.toLowerCase();
        if (!haystack.includes(txSearch.trim().toLowerCase())) return false;
      }
      return true;
    })
    .sort((a, b) => {
      const timeValue = (v) => Number(v.time.replace(':', ''));
      if (txSort === 'time-asc') return timeValue(a) - timeValue(b);
      if (txSort === 'amount-desc') return b.amount - a.amount;
      if (txSort === 'amount-asc') return a.amount - b.amount;
      return timeValue(b) - timeValue(a);

    const rows = filteredTransactions.map((row) => ({
      time: row.time,
      cashier: row.cashier,
      category: row.category,
      item: row.item,
      priceLevel: row.priceLevel,
      amount: row.amount,
    }));
    let payload = '';
    let mime = 'text/plain';
    let extension = format.toLowerCase();
    if (format === 'CSV') {
      mime = 'text/csv;charset=utf-8';
      payload = ['Time,Cashier,Category,Item,Price Level,Amount']
        .concat(rows.map((row) => [row.time, row.cashier, row.category, row.item, row.priceLevel, row.amount.toFixed(2)].join(',')))
        .join('\n');
    } else if (format === 'JSON') {
      mime = 'application/json;charset=utf-8';
      payload = JSON.stringify(rows, null, 2);
      extension = 'json';
    } else {
      mime = 'application/vnd.ms-excel';
      payload = ['Time\tCashier\tCategory\tItem\tPrice Level\tAmount']
        .concat(rows.map((row) => [row.time, row.cashier, row.category, row.item, row.priceLevel, row.amount.toFixed(2)].join('\t')))
        .join('\n');
      extension = 'xls';
    }
    const blob = new Blob([payload], { type: mime });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.download = `storecheck-transactions-${shopCategory}.${extension}`;
    link.style.display = 'none';

const TransactionsView = () => {
  const [mode, setMode] = useState('detail');
  const [scope, setScope] = useState('Today');
  const [shift, setShift] = useState('All');
  const [department, setDepartment] = useState('All');
  const [cashier, setCashier] = useState('All');
  const [tender, setTender] = useState('All');
  const [priceLevel, setPriceLevel] = useState('All');
  const [sort, setSort] = useState('Newest first');
  const [search, setSearch] = useState('');
  const [selectedId, setSelectedId] = useState(TRANSACTION_ROWS[0].id);

  const searchText = search.trim().toLowerCase();
  const filteredRows = TRANSACTION_ROWS.filter((row) => {
    const textMatch =
      !searchText ||
      [row.id, row.receipt, row.shift, row.cashier, row.department, row.item, row.priceLevel, row.tender, row.register]
        .some((value) => String(value).toLowerCase().includes(searchText));
    return (
      textMatch &&
      (shift === 'All' || row.shift === shift) &&
      (department === 'All' || row.department === department) &&
      (cashier === 'All' || row.cashier === cashier) &&
      (tender === 'All' || row.tender === tender) &&
      (priceLevel === 'All' || row.priceLevel === priceLevel)
    );
  });

  const sortedRows = [...filteredRows].sort((a, b) => {
    if (sort === 'Oldest first') return a.time.localeCompare(b.time);
    if (sort === 'Amount high') return b.amount - a.amount;
    if (sort === 'Amount low') return a.amount - b.amount;
    return b.time.localeCompare(a.time);
  });

  const selected = sortedRows.find((row) => row.id === selectedId) || sortedRows[0] || null;
  const total = sumRows(sortedRows);
  const avgTicket = sortedRows.length ? total / sortedRows.length : 0;
  const cardMix = sortedRows.length ? Math.round((sortedRows.filter((row) => row.tender === 'Card').length / sortedRows.length) * 100) : 0;
  const departmentRows = Object.values(groupRows(sortedRows, 'department')).sort((a, b) => b.amount - a.amount);
  const tenderRows = Object.values(groupRows(sortedRows, 'tender')).sort((a, b) => b.amount - a.amount);
  const cashierRows = Object.values(groupRows(sortedRows, 'cashier')).sort((a, b) => b.amount - a.amount);
  const hourlyRows = Object.values(sortedRows.reduce((acc, row) => {
    const hour = `${row.time.slice(0, 2)}:00`;
    if (!acc[hour]) acc[hour] = { label: hour, rows: 0, amount: 0, qty: 0 };
    acc[hour].rows += 1;
    acc[hour].amount += row.amount;
    acc[hour].qty += Number(row.qty) || 0;
    return acc;
  }, {})).sort((a, b) => a.label.localeCompare(b.label));
  const maxAmount = Math.max(1, ...departmentRows.map((row) => row.amount), ...tenderRows.map((row) => row.amount), ...cashierRows.map((row) => row.amount), ...hourlyRows.map((row) => row.amount));

  const exportRows = (format) => downloadData(sortedRows, format, `storecheck-transactions-${scope.toLowerCase().replaceAll(' ', '-')}`);
  const options = (items) => ['All', ...items];
  const renderSelect = (label, value, setter, items) => (
    <div className="tx-filter-group">
      <label>{label}</label>
      <select className="tx-select" value={value} onChange={(e) => setter(e.target.value)}>
        {items.map((item) => <option key={item}>{item}</option>)}
      </select>
    </div>
  );
  const renderBars = (rows) => (
    <div className="tx-bars">
      {rows.map((row) => (
        <div className="tx-bar-row" key={row.label}>
          <div className="tx-bar-label">{row.label}</div>
          <div className="tx-bar-track"><div className="tx-bar-fill" style={{ width: `${Math.max(5, (row.amount / maxAmount) * 100)}%` }}></div></div>
          <div className="tx-bar-value">{fmt(row.amount)}</div>
        </div>
      ))}
    </div>
  );
  const renderList = (rows, secondary = 'rows') => rows.map((row) => (
    <div className="tx-list-row" key={row.label}>
      <div>
        <div className="tx-list-label">{row.label}</div>
        <div className="tx-list-meta">{row.rows} {secondary} · {fmtN(row.qty)} units</div>
      </div>
      <strong>{fmt(row.amount)}</strong>
    </div>
  ));

  const tableRows = sortedRows.length ? sortedRows.map((row) => (
    <tr
      key={row.id}
      className={`tx-click-row ${selected?.id === row.id ? 'tx-row-active' : ''}`}
      onClick={() => setSelectedId(row.id)}
    >
      <td>{fmtTime12(row.time)}</td>
      <td>{row.receipt}</td>
      <td>{row.cashier}</td>
      <td>{row.department}</td>
      <td>{row.item}</td>
      <td>{row.tender}</td>
      <td className="tx-right">{fmt(row.amount)}</td>
    </tr>
  )) : (
    <tr><td colSpan="7"><div className="tx-empty">No transactions match these filters.</div></td></tr>
  );

  return (
    <div className="shell">
      <div className="section-hdr">
        <h1>Transactions Explorer</h1>
        <p>Search POS transactions, filter by cashier, department, tender, item, or price level, and open the receipt behind each number.</p>
      </div>

      <div className="tx-mode-switch" role="tablist" aria-label="Transactions Explorer views">
        {['detail', 'summary', 'hourly', 'graphical'].map((item) => (
          <button key={item} className={`tx-mode-btn ${mode === item ? 'active' : ''}`} onClick={() => setMode(item)}>
            {item === 'detail' ? 'Detail View' : item === 'summary' ? 'Summary View' : item === 'hourly' ? 'Hourly View' : 'Graphical View'}
          </button>
        ))}
      </div>

      <div className="tx-kpi-grid">
        <div className="tx-kpi-card"><div className="tx-kpi-label">Transaction Sales</div><div className="tx-kpi-value">{fmt(total)}</div><div className="tx-kpi-copy">{scope} source rows</div></div>
        <div className="tx-kpi-card"><div className="tx-kpi-label">Transactions</div><div className="tx-kpi-value">{fmtN(sortedRows.length)}</div><div className="tx-kpi-copy">Filtered receipt count</div></div>
        <div className="tx-kpi-card"><div className="tx-kpi-label">Avg Ticket</div><div className="tx-kpi-value">{fmt(avgTicket)}</div><div className="tx-kpi-copy">Average receipt value</div></div>
        <div className="tx-kpi-card"><div className="tx-kpi-label">Card Mix</div><div className="tx-kpi-value">{cardMix}%</div><div className="tx-kpi-copy">Card transactions</div></div>
      </div>

      <div className="tx-toolbar">
        <div className="tx-toolbar-head">
          <div>
            <div className="tx-toolbar-title">Filters and exports</div>
            <div className="tx-toolbar-sub">Use multiple filters together, then export exactly the rows on screen.</div>
          </div>
          <div className="tx-exports">
            <button className="tx-export-btn" onClick={() => exportRows('CSV')}><Icon name="cash" size={16} /> CSV</button>
            <button className="tx-export-btn" onClick={() => exportRows('XLS')}><Icon name="cash" size={16} /> Excel</button>
            <button className="tx-export-btn" onClick={() => exportRows('JSON')}><Icon name="cash" size={16} /> JSON</button>
          </div>
        </div>
        <div className="tx-filters">
          <div className="tx-filter-group">
            <label>Search</label>
            <input className="tx-input" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Receipt, cashier, item, department" />
          </div>
          {renderSelect('Scope', scope, setScope, ['Today', 'Current Shift', 'This Week'])}
          {renderSelect('Shift', shift, setShift, options(uniqueValues(TRANSACTION_ROWS, 'shift')))}
          {renderSelect('Department', department, setDepartment, options(uniqueValues(TRANSACTION_ROWS, 'department')))}
          {renderSelect('Cashier', cashier, setCashier, options(uniqueValues(TRANSACTION_ROWS, 'cashier')))}
          {renderSelect('Tender', tender, setTender, options(uniqueValues(TRANSACTION_ROWS, 'tender')))}
          {renderSelect('Price Level', priceLevel, setPriceLevel, options(uniqueValues(TRANSACTION_ROWS, 'priceLevel')))}
          {renderSelect('Sort', sort, setSort, ['Newest first', 'Oldest first', 'Amount high', 'Amount low'])}
        </div>
      </div>

      {mode === 'detail' ? (
        <div className="tx-layout">
          <div className="tx-table-card">
            <div className="tx-card-title">Transaction Detail</div>
            <div className="tx-card-sub">Click a row to inspect receipt, cashier, tender, register, and item information.</div>
            <div className="tx-table-wrap">
              <table className="tx-table">
                <thead><tr><th>Time</th><th>Receipt</th><th>Cashier</th><th>Department</th><th>Item</th><th>Tender</th><th className="tx-right">Amount</th></tr></thead>
                <tbody>{tableRows}</tbody>
              </table>
            </div>
          </div>
          <div className="tx-receipt-card">
            <div className="tx-receipt-title">Receipt Inspector</div>
            <div className="tx-receipt-meta">{selected ? `${selected.receipt} · ${fmtTime12(selected.time)}` : 'Select a transaction'}</div>
            {selected ? (
              <>
                <div className="tx-receipt-row"><span>Cashier</span><strong>{selected.cashier}</strong></div>
                <div className="tx-receipt-row"><span>Department</span><strong>{selected.department}</strong></div>
                <div className="tx-receipt-row"><span>Item</span><strong>{selected.item}</strong></div>
                <div className="tx-receipt-row"><span>Qty</span><strong>{selected.qty}</strong></div>
                <div className="tx-receipt-row"><span>Price level</span><strong>{selected.priceLevel}</strong></div>
                <div className="tx-receipt-row"><span>Tender</span><strong>{selected.tender}</strong></div>
                <div className="tx-receipt-row"><span>Register</span><strong>{selected.register}</strong></div>
                <div className="tx-receipt-total">{fmt(selected.amount)}</div>
              </>
            ) : <div className="tx-empty">No receipt selected.</div>}
          </div>
        </div>
      ) : null}

      {mode === 'summary' ? (
        <div className="tx-summary-grid">
          <div className="tx-summary-card"><div className="tx-card-title">By Department</div><div className="tx-card-sub">Where the money came from.</div>{renderList(departmentRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">By Tender</div><div className="tx-card-sub">How customers paid.</div>{renderList(tenderRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">By Cashier</div><div className="tx-card-sub">Who handled the transactions.</div>{renderList(cashierRows)}</div>
        </div>
      ) : null}

      {mode === 'hourly' ? (
        <div className="tx-table-card">
          <div className="tx-card-title">Hourly Transaction View</div>
          <div className="tx-card-sub">See traffic and sales by time window so busy periods are easier to explain.</div>
          {renderBars(hourlyRows)}
        </div>
      ) : null}

      {mode === 'graphical' ? (
        <div className="tx-summary-grid">
          <div className="tx-summary-card"><div className="tx-card-title">Department Sales</div>{renderBars(departmentRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">Tender Mix</div>{renderBars(tenderRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">Cashier Activity</div>{renderBars(cashierRows)}</div>
        </div>
      ) : null}
    </div>
  );
};

      title: `Purchase Ledger Packet - ${row.id}`,

      note: 'Purchases Ledger E-mail replacement shell',
      headers: ['Date', 'Vendor', 'Payment', 'Check #', 'Expense', 'Audit', 'Difference', 'Status', 'Invoice'],

  };
  const printCostPacket = () =>
    openPacketPreview({
      title: 'Cost Updates',
      subtitle: 'StoreCheck demo cost confirmation queue',
      headers: ['Update Time', 'UPC', 'Item', 'Prev Cost', 'New Cost', 'Retail', 'Status'],
      rows: visibleCostUpdates.map((row) => [row.updatedAt, row.upc, row.itemName, fmt(row.prevCost), fmt(row.newCost), fmt(row.retail), row.status]),
    });
  const emailCostPacket = () => {
    savePacket({
      title: 'Cost Update Email Packet',
      subtitle: `${visibleCostUpdates.length} visible updates`,
      route: '/storeExpenses/index',
      note: 'Cost Updates E-mail replacement shell',
      headers: ['Update Time', 'Item', 'Category', 'Prev Cost', 'New Cost', 'Margin', 'Status'],
      rows: visibleCostUpdates.map((row) => [row.updatedAt, row.itemName, row.category, fmt(row.prevCost), fmt(row.newCost), `${row.margin}%`, row.status]),
      filename: 'storecheck-cost-update-email-packet',

    showNotice('Cost update e-mail packet prepared in demo mode. Live e-mail endpoint is still pending.');

  const confirmCostRow = (id) => {
    setCostUpdateRows((current) => current.map((row) => (row.id === id ? { ...row, status: 'Ready' } : row)));
    showNotice(`${id} marked confirmed in demo mode. Real save/sync endpoint is still pending.`);
  };
  const confirmAllCosts = () => {

      showNotice('No visible cost updates to confirm.');

      current.map((row) =>
        visibleCostUpdates.some((item) => item.id === row.id) ? { ...row, status: 'Ready' } : row

  };
  const reviewDeadSelection = () => {

      showNotice('Select at least one dead inventory row first.');
      return;

    openPacketPreview({
      title: 'Dead Inventory Inactivation Review',
      subtitle: `${selectedDeadRows.length} selected items`,
      headers: ['UPC', 'Department', 'Item', 'Inventory', 'Total Cost', 'Recommendation', 'Stage'],
      rows: selectedDeadRows.map((row) => [row.upc, row.department, row.itemName, fmtN(row.inventory), fmt(row.totalCost), row.action, row.stage]),
    });
  };
  const stageInactiveItems = () => {
    if (!deadSelected.length) {
      showNotice('Select at least one item before staging an inactivation pass.');
      return;
    }
    setDeadInventoryRows((current) =>
      current.map((row) =>
        deadSelected.includes(row.id)
          ? { ...row, stage: 'Staged InActive' }
          : row
      )
    );
    showNotice(`${deadSelected.length} items staged for inactivation review. Real inactivation endpoint is still pending.`);
  };
  const saveDeadPacket = () => {
    if (!selectedDeadRows.length) {
      showNotice('Select at least one dead inventory row first.');
      return;
    }
    savePacket({
      title: 'Dead Inventory Inactivation Packet',
      subtitle: `${selectedDeadRows.length} selected items`,
      route: '/storeExpenses/index',
      note: 'Dead Inventory InActive replacement shell',
      headers: ['UPC', 'Department', 'Item', 'Inventory', 'Total Cost', 'Criteria', 'Stage'],
      rows: selectedDeadRows.map((row) => [row.upc, row.department, row.itemName, fmtN(row.inventory), fmt(row.totalCost), row.criteria, row.stage]),

  };
  const printPurchaseSummaryPacket = () =>
    openPacketPreview({
      title: 'Purchases Summary',
      subtitle: 'StoreCheck demo grocery purchase summary',
      headers: ['Category', 'Expenses', 'Retail', 'Mix'],
      rows: PURCHASE_CATEGORY_SUMMARY.map((row) => [row.category, fmt(row.expenses), row.retail ? fmt(row.retail) : '-', row.mix]),

      title: 'Purchases Summary Packet',

      <div className="settings-grid">
        <div className="settings-card">
          <div className="settings-title">Session Init & Agreements</div>
          <div className="settings-sub">Replacement shell for Mercury licence checks, agreement acceptance, and register/session status.</div>
          <div className="connect-status">
            <span className="source-dot"></span>
            <span>Register status: {registerStatus}</span>
          </div>
          <div className="toggle-row">
            <span className="toggle-label">Store agreement accepted for this session</span>
            <input type="checkbox" checked={agreementAccepted} onChange={(e) => setAgreementAccepted(e.target.checked)} />
          </div>
          <div className="toggle-row">
            <span className="toggle-label">Session licence check</span>
            <span className="purchase-tag blue">{agreementAccepted ? 'Passed' : 'Pending'}</span>
          </div>
          <button className="connect-btn" onClick={() => showSessionNotice(agreementAccepted ? 'Agreement acceptance saved in demo mode. Real `/user/saveAgreementDetails` wiring still pending.' : 'Enable agreement acceptance before saving the demo session state.')}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Save Agreement State</span>
          </button>
          <button className="connect-btn" style={{ marginTop: 10 }} onClick={() => { setRegisterStatus(registerStatus === 'Connected' ? 'Refresh Needed' : 'Connected'); showSessionNotice('Register status refreshed in demo mode. Real `/user/checkRegisterStatus` wiring still pending.'); }}>
            <Icon name="connect" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Refresh Register Status</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Location & Session</div>
          <div className="settings-sub">Replacement shell for Mercury location switching and logout flow.</div>
          <label className="form-label">Active Store</label>
          <select className="form-input" value={currentLocation.id} onChange={(e) => { setLocationId(e.target.value); showSessionNotice('Store location switched in demo mode.'); }}>
            {STORE_LOCATIONS.map((item) => <option key={item.id} value={item.id}>{item.name} · {item.location}</option>)}
          </select>
          <div className="connect-status">
            <span className="source-dot"></span>
            <span>{currentLocation.manager} · {currentLocation.status}</span>
          </div>
          <div className="purchase-kv-list">
            <div className="purchase-kv"><span>Register</span><span>{registerStatus}</span></div>
            <div className="purchase-kv"><span>Agreement</span><span>{agreementAccepted ? 'Accepted' : 'Pending'}</span></div>
            <div className="purchase-kv"><span>Temp session</span><span>{tempSessionOpen ? 'Open' : 'Closed'}</span></div>
          </div>
          <div className="pricebook-actions" style={{ marginTop: 16 }}>
            <button className="pricebook-btn" onClick={() => openSettingsPacket({
              title: 'Session Logout Review',
              subtitle: `${currentLocation.name} · ${currentLocation.manager}`,
              headers: ['Store', 'Manager', 'Register Status', 'Agreement', 'Temp Session'],
              rows: [[currentLocation.name, currentLocation.manager, registerStatus, agreementAccepted ? 'Accepted' : 'Pending', tempSessionOpen ? 'Open' : 'Closed']],
            })}>
              <Icon name="report" size={15} /> Preview handoff
            </button>
            <button className="pricebook-btn" onClick={() => saveLogoutPacket()}>
              <Icon name="cash" size={15} /> Save packet
            </button>
          </div>
          <button className="connect-btn" onClick={() => showSessionNotice('Demo session signed out. Real logout endpoint still pending.')}>
            <Icon name="close" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Log Out</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Internal Session Controls</div>
          <div className="settings-sub">Replacement shell for Mercury temp-session open and new-screens feature toggle controls.</div>
          <div className="connect-status">
            <span className="source-dot"></span>
            <span>Temp session: {tempSessionOpen ? 'Open in demo mode' : 'Closed'}</span>
          </div>
          <div className="toggle-row">
            <span className="toggle-label">Enable new screens experience</span>
            <input type="checkbox" checked={newScreensEnabled} onChange={(e) => setNewScreensEnabled(e.target.checked)} />
          </div>
          <div className="toggle-row">
            <span className="toggle-label">Legacy Mercury fallback</span>
            <span className={`purchase-tag${newScreensEnabled ? ' blue' : ''}`}>{newScreensEnabled ? 'Disabled' : 'Visible'}</span>
          </div>
          <button className="connect-btn" onClick={() => { setTempSessionOpen(!tempSessionOpen); showSessionNotice('Temp session toggled in demo mode. Real `/administration/openTempSession` wiring still pending.'); }}>
            <Icon name="connect" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>{tempSessionOpen ? 'Refresh Temp Session' : 'Open Temp Session'}</span>
          </button>
          <button className="connect-btn" style={{ marginTop: 10 }} onClick={() => showSessionNotice(`New screens ${newScreensEnabled ? 'enabled' : 'disabled'} in demo mode. Real \`/util/showNewScreens\` wiring still pending.`)}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Save Feature Toggle</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">POS System Connection</div>
          <div className="settings-sub">Choose which POS system to pull data from.</div>
          <div className="pos-picker">
            {['gilbargo', 'ruby'].map((s) => (
              <div key={s} className={`pos-option${src === s ? ' active' : ''}`} onClick={() => setSrc(s)}>
                <Icon
                  name={s === 'gilbargo' ? 'fuel' : 'report'}
                  size={22}
                  bg={src === s ? 'rgba(39,198,107,0.16)' : 'rgba(148,163,184,0.14)'}
                  fg={src === s ? '#27C66B' : '#64748B'}
                  style={{ margin: '0 auto' }}
                />
                <div className="pos-label">{s === 'gilbargo' ? 'Gilbargo POS' : 'Ruby POS'}</div>
              </div>
            ))}
          </div>
          <label className="form-label">POS URL / API Endpoint</label>
          <input className="form-input" placeholder="https://pos.yourstore.com/api" />
          <label className="form-label">API Key or Token</label>
          <input className="form-input" type="password" placeholder="Enter your API key" />
          <button className="connect-btn">
            <Icon name="connect" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Connect POS System</span>
          </button>
          <div className="connect-status">
            <span className="source-dot"></span>
            <span>Not connected - using demo data</span>
          </div>
        </div>

        <div className="settings-card">
          <div className="settings-title">Store Details</div>
          <div className="settings-sub">Your store information.</div>
          <label className="form-label">Store Name</label>
          <input className="form-input" key={`store-name-${currentLocation.id}`} defaultValue={currentLocation.name} />
          <label className="form-label">Store Address</label>
          <input className="form-input" key={`store-location-${currentLocation.id}`} defaultValue={currentLocation.location} />
          <label className="form-label">Owner / Manager Name</label>
          <input className="form-input" key={`store-manager-${currentLocation.id}`} defaultValue={currentLocation.manager} />
          <button className="connect-btn" onClick={() => showSessionNotice('Store details saved in demo mode. Real admin save endpoint still pending.')}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Save Details</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Current Fuel Prices</div>
          <div className="settings-sub">Update pump prices to track your profit correctly.</div>
          {MOCK.fuel.grades.map((g) => (
            <div key={g.name}>
              <label className="form-label">{g.name} (per gallon)</label>
              <input className="form-input" defaultValue={'$' + g.price} />
            </div>
          ))}
          <button className="connect-btn" onClick={() => showSessionNotice('Fuel price update saved in demo mode. Real endpoint still pending.')}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Update Prices</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Admin Account</div>
          <div className="settings-sub">Replacement shell for Mercury account and email settings.</div>
          <label className="form-label">Login / Account Email</label>
          <input className="form-input" value={loginEmail} onChange={(e) => setLoginEmail(e.target.value)} />
          <label className="form-label">Report Delivery Email</label>
          <input className="form-input" value={reportEmail} onChange={(e) => setReportEmail(e.target.value)} />
          <label className="form-label">Alerts Email</label>
          <input className="form-input" value={alertsEmail} onChange={(e) => setAlertsEmail(e.target.value)} />
          <div className="purchase-kv-list">
            <div className="purchase-kv"><span>Login route</span><span>{loginEmail}</span></div>
            <div className="purchase-kv"><span>Reports route</span><span>{reportEmail}</span></div>
            <div className="purchase-kv"><span>Alerts route</span><span>{alertsEmail}</span></div>
          </div>
          <div className="pricebook-actions" style={{ marginTop: 16 }}>
            <button className="pricebook-btn" onClick={() => previewAccountSettings()}>
              <Icon name="report" size={15} /> Preview packet
            </button>
            <button className="pricebook-btn" onClick={() => saveAccountSettingsPacket()}>
              <Icon name="cash" size={15} /> Save packet
            </button>
          </div>
          <button className="connect-btn" onClick={() => showSessionNotice('Admin account settings saved in demo mode. Real `/administration/email` wiring still pending.')}>
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Save Account Settings</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Alert Settings</div>
          <div className="settings-sub">Get notified about important things.</div>
          {[
            { label: 'Alert when cash is short', on: true },
            { label: 'Alert when tank level is low', on: true },
            { label: 'Daily sales summary at end of day', on: true },
            { label: 'Alert when lottery payout is high', on: false },
          ].map((item, i) => (
            <div key={i} className="toggle-row">
              <span className="toggle-label">{item.label}</span>
              {item.label === 'Alert when tank level is low' ? (
                <div className="toggle-inline-control">
                  <span className="toggle-inline-label">Remind at</span>
                  <input
                    className="toggle-inline-input"
                    value={`${fuelAlertPct}%`}
                    onChange={(e) => {
                      const digits = e.target.value.replace(/[^\d]/g, '');
                      const next = digits === '' ? '' : Math.min(100, Number(digits));
                      setFuelAlertPct(next === '' ? '' : next);
                    }}
                  />
                </div>
              ) : null}
              <div className={`toggle-switch${item.on ? ' on' : ''}`}></div>
            </div>
          ))}
        </div>

        <div className="settings-card">
          <div className="settings-title">Release Notes & Updates</div>
          <div className="settings-sub">Replacement shell for Mercury release notes and update visibility.</div>
          {releaseRows.map((item) => (
            <div key={item.id} className="toggle-row" onClick={() => setSelectedReleaseId(item.id)} style={{ cursor: 'pointer' }}>
              <div className="toggle-label">
                <div style={{ fontWeight: 800 }}>{item.title}</div>
                <div style={{ color: 'var(--text-3)', fontSize: 12, marginTop: 4 }}>{item.date} · {item.note}</div>
              </div>
              <span className={`purchase-tag${item.status === 'Needs review' ? ' amber' : ''}`}>{item.status}</span>
            </div>
          ))}
          {selectedRelease ? (
            <div className="purchase-kv-list">
              <div className="purchase-kv"><span>Selected update</span><span>{selectedRelease.title}</span></div>
              <div className="purchase-kv"><span>Status</span><span>{selectedRelease.status}</span></div>
              <div className="purchase-kv"><span>Date</span><span>{selectedRelease.date}</span></div>
            </div>
          ) : null}
          <div className="pricebook-actions" style={{ marginTop: 16 }}>
            <button className="pricebook-btn" onClick={() => previewReleaseNotes()}>
              <Icon name="report" size={15} /> Preview notes
            </button>
            <button className="pricebook-btn" onClick={() => saveReleaseNotesPacket()}>
              <Icon name="cash" size={15} /> Save packet
            </button>
            {selectedRelease ? (
              <button className="pricebook-btn primary" onClick={() => markReleaseReviewed(selectedRelease.id)}>
                <Icon name="sync" size={15} /> Mark reviewed
              </button>
            ) : null}
          </div>
          <button className="connect-btn" onClick={() => showSessionNotice('Release notes opened in demo mode. Live update feed still pending.')}>
            <Icon name="report" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Open Release Notes</span>
          </button>
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [view, setView] = useState('today');
  const [viewMode, setViewMode] = useState('default');
  const [locationId, setLocationId] = useState(STORE_LOCATIONS[0].id);
  const [agreementAccepted, setAgreementAccepted] = useState(true);
  const [registerStatus, setRegisterStatus] = useState('Connected');
  const [shopCategory, setShopCategory] = useState('overview');
  const [shopExpanded, setShopExpanded] = useState(true);
  const [reportPage, setReportPage] = useState('week');
  const [pricebookPage, setPricebookPage] = useState('inventory');
  const [purchasePage, setPurchasePage] = useState('overview');
  const [reportExpanded, setReportExpanded] = useState(false);
  const [mobileNavOpen, setMobileNavOpen] = useState(false);
  const currentLocation = STORE_LOCATIONS.find((item) => item.id === locationId) || STORE_LOCATIONS[0];

  return (
    <>
      {mobileNavOpen ? <div className="mobile-sidebar-overlay" onClick={() => setMobileNavOpen(false)}></div> : null}
      <Sidebar
        active={view}
        setActive={setView}
        alerts={MOCK.alerts.length}
        currentLocation={currentLocation}
        setLocationId={setLocationId}
        shopCategory={shopCategory}
        setShopCategory={setShopCategory}
        shopExpanded={shopExpanded}
        setShopExpanded={setShopExpanded}
        reportPage={reportPage}
        setReportPage={setReportPage}
        reportExpanded={reportExpanded}
        setReportExpanded={setReportExpanded}
        mobileNavOpen={mobileNavOpen}
        setMobileNavOpen={setMobileNavOpen}
      />
      <div className="main">
        <TopBar view={view} currentLocation={currentLocation} registerStatus={registerStatus} setActive={setView} setMobileNavOpen={setMobileNavOpen} />
        <div className="content">
          {view === 'today' ? <TodayView viewMode={viewMode} setViewMode={setViewMode} /> : null}
          {view === 'transactions' ? <TransactionsView /> : null}
          {view === 'fuel' ? <FuelView /> : null}
          {view === 'shop' ? <ShopView viewMode={viewMode} shopCategory={shopCategory} setShopCategory={setShopCategory} /> : null}
          {view === 'pricebook' ? <PricebookView pricebookPage={pricebookPage} setPricebookPage={setPricebookPage} /> : null}
          {view === 'purchases' ? <PurchasesView purchasePage={purchasePage} setPurchasePage={setPurchasePage} /> : null}
          {view === 'operations' ? <OperationsView currentLocation={currentLocation} setLocationId={setLocationId} /> : null}
          {view === 'multistore' ? <MultiStoreView currentLocation={currentLocation} setLocationId={setLocationId} setView={setView} /> : null}
          {view === 'reports' ? <ReportsView currentLocation={currentLocation} reportPage={reportPage} setReportPage={setReportPage} /> : null}
          {view === 'settings' ? <SettingsView agreementAccepted={agreementAccepted} currentLocation={currentLocation} registerStatus={registerStatus} setAgreementAccepted={setAgreementAccepted} setLocationId={setLocationId} setRegisterStatus={setRegisterStatus} /> : null}
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
