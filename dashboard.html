<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>StoreCheck — Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b}
:root{
  --sidebar-w:256px;--sidebar-collapsed:64px;
  --green:#22c55e;--green-dark:#16a34a;--green-light:#dcfce7;
  --blue:#3b82f6;--orange:#f59e0b;--red:#ef4444;--purple:#8b5cf6;
  --slate-900:#0f172a;--slate-800:#1e293b;--slate-700:#334155;--slate-600:#475569;
  --slate-400:#94a3b8;--slate-200:#e2e8f0;--slate-100:#f1f5f9;--slate-50:#f8fafc;
}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* LAYOUT */
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--slate-900);
  display:flex;flex-direction:column;
  transition:width .25s ease,min-width .25s ease;
  overflow:hidden;position:relative;z-index:50;
}
.sidebar.collapsed{width:var(--sidebar-collapsed);min-width:var(--sidebar-collapsed)}
.sidebar-logo{
  display:flex;align-items:center;gap:12px;
  padding:20px 16px;border-bottom:1px solid rgba(255,255,255,.08);
  min-height:64px;cursor:pointer;
}
.sidebar-logo-icon{
  width:36px;height:36px;min-width:36px;
  background:var(--green);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:16px;color:#fff;
}
.sidebar-logo-text{overflow:hidden;white-space:nowrap;transition:opacity .2s}
.sidebar-logo-text h2{font-size:15px;font-weight:700;color:#fff;line-height:1.2}
.sidebar-logo-text p{font-size:11px;color:var(--slate-400)}
.sidebar.collapsed .sidebar-logo-text{opacity:0;pointer-events:none}

.sidebar-nav{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 0}
.nav-section-label{
  font-size:10px;font-weight:600;letter-spacing:.08em;
  color:var(--slate-600);padding:16px 16px 4px;
  white-space:nowrap;overflow:hidden;
  transition:opacity .2s;
}
.sidebar.collapsed .nav-section-label{opacity:0}

.nav-item{
  display:flex;align-items:center;gap:12px;
  padding:9px 16px;cursor:pointer;
  color:var(--slate-400);font-size:13.5px;font-weight:500;
  white-space:nowrap;border-radius:0;
  transition:background .15s,color .15s;
  position:relative;border-left:3px solid transparent;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-item.active{background:rgba(34,197,94,.12);color:var(--green);border-left-color:var(--green)}
.nav-item.active .nav-icon{color:var(--green)}
.nav-icon{font-size:18px;min-width:20px;text-align:center;transition:color .15s}
.nav-label{overflow:hidden;transition:opacity .2s,width .2s;width:160px}
.sidebar.collapsed .nav-label{opacity:0;width:0}
.nav-badge{
  background:var(--red);color:#fff;
  font-size:10px;font-weight:700;padding:2px 6px;border-radius:10px;
  margin-left:auto;transition:opacity .2s;
}
.sidebar.collapsed .nav-badge{opacity:0}

.nav-sub{
  overflow:hidden;max-height:0;transition:max-height .3s ease;
  background:rgba(0,0,0,.15);
}
.nav-sub.open{max-height:400px}
.nav-sub-item{
  display:flex;align-items:center;gap:10px;
  padding:8px 16px 8px 44px;cursor:pointer;
  color:var(--slate-400);font-size:12.5px;
  transition:background .15s,color .15s;
  white-space:nowrap;overflow:hidden;
}
.nav-sub-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-sub-item.active{color:var(--green)}
.sidebar.collapsed .nav-sub{display:none}

.nav-chevron{
  margin-left:auto;font-size:11px;
  transition:transform .25s;opacity:.5;
}
.nav-chevron.open{transform:rotate(90deg)}

/* MAIN CONTENT */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* HEADER */
.header{
  height:64px;background:#fff;border-bottom:1px solid var(--slate-200);
  display:flex;align-items:center;padding:0 24px;gap:16px;
  flex-shrink:0;
}
.header-title{font-size:16px;font-weight:600;color:var(--slate-800);flex:1}
.header-store{
  display:flex;align-items:center;gap:8px;
  background:var(--slate-100);border-radius:8px;padding:6px 12px;
  font-size:13px;color:var(--slate-600);font-weight:500;
}
.header-store .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

/* DATA SOURCE TOGGLE */
.ds-toggle{
  display:flex;align-items:center;gap:0;
  background:var(--slate-100);border-radius:8px;padding:3px;
  border:1px solid var(--slate-200);
}
.ds-btn{
  padding:5px 12px;border-radius:6px;font-size:12px;font-weight:600;
  cursor:pointer;transition:all .2s;border:none;background:transparent;
  color:var(--slate-500);
}
.ds-btn.active{background:#fff;color:var(--slate-800);box-shadow:0 1px 3px rgba(0,0,0,.12)}
.ds-btn.active.mercury{color:var(--green-dark)}
.ds-btn.active.ruby{color:#e11d48}

.header-user{
  display:flex;align-items:center;gap:8px;
  color:var(--slate-600);font-size:13px;cursor:pointer;
}
.avatar{
  width:32px;height:32px;background:var(--green);border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:13px;font-weight:700;
}

/* PAGE CONTENT */
.page{flex:1;overflow-y:auto;padding:24px}

/* BREADCRUMB */
.breadcrumb{display:flex;align-items:center;gap:6px;margin-bottom:20px;font-size:13px;color:var(--slate-400)}
.breadcrumb span{color:var(--slate-600);font-weight:500}
.breadcrumb .sep{font-size:10px}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px}
.kpi-card{
  background:#fff;border-radius:12px;padding:20px;
  border:1px solid var(--slate-200);
  display:flex;flex-direction:column;gap:6px;
}
.kpi-card-label{font-size:12px;font-weight:600;color:var(--slate-400);letter-spacing:.04em;text-transform:uppercase}
.kpi-card-value{font-size:26px;font-weight:700;color:var(--slate-800);line-height:1}
.kpi-card-sub{font-size:12px;color:var(--slate-400);display:flex;align-items:center;gap:4px}
.kpi-card-sub .up{color:var(--green)}
.kpi-card-sub .down{color:var(--red)}
.kpi-icon{font-size:28px;margin-bottom:4px}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--slate-200);margin-bottom:24px}
.tab{
  padding:10px 18px;font-size:13.5px;font-weight:500;
  color:var(--slate-500);cursor:pointer;
  border-bottom:2px solid transparent;margin-bottom:-2px;
  transition:all .15s;white-space:nowrap;
}
.tab:hover{color:var(--slate-800)}
.tab.active{color:var(--green-dark);border-bottom-color:var(--green);font-weight:600}

/* CARD */
.card{background:#fff;border-radius:12px;border:1px solid var(--slate-200);overflow:hidden}
.card-header{
  padding:16px 20px;border-bottom:1px solid var(--slate-200);
  display:flex;align-items:center;justify-content:space-between;
}
.card-title{font-size:14px;font-weight:600;color:var(--slate-700)}
.card-body{padding:0}

/* FILTER BAR */
.filter-bar{
  background:#fff;border-radius:12px;border:1px solid var(--slate-200);
  padding:16px 20px;margin-bottom:20px;
  display:flex;align-items:center;gap:12px;flex-wrap:wrap;
}
.filter-bar label{font-size:13px;color:var(--slate-500);font-weight:500}
.filter-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid var(--slate-200)}
.filter-toggle button{
  padding:6px 14px;font-size:12.5px;font-weight:500;
  border:none;cursor:pointer;transition:all .15s;background:#fff;color:var(--slate-500);
}
.filter-toggle button.active{background:var(--green);color:#fff}
select.filter-select,input.filter-input{
  padding:7px 12px;border:1px solid var(--slate-200);border-radius:8px;
  font-size:13px;color:var(--slate-700);outline:none;background:#fff;
  cursor:pointer;
}
select.filter-select:focus,input.filter-input:focus{border-color:var(--green)}
.btn{
  padding:7px 18px;border-radius:8px;font-size:13px;font-weight:600;
  border:none;cursor:pointer;transition:all .15s;
}
.btn-primary{background:var(--green);color:#fff}
.btn-primary:hover{background:var(--green-dark)}
.btn-outline{background:#fff;color:var(--slate-600);border:1px solid var(--slate-200)}
.btn-outline:hover{background:var(--slate-50)}
.btn-icon{background:transparent;border:1px solid var(--slate-200);color:var(--slate-500);padding:7px 10px}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead tr{background:var(--slate-50)}
th{
  padding:10px 14px;text-align:left;font-size:11.5px;font-weight:700;
  color:var(--slate-500);letter-spacing:.06em;text-transform:uppercase;
  border-bottom:1px solid var(--slate-200);cursor:pointer;white-space:nowrap;
}
th:hover{color:var(--slate-700)}
td{
  padding:11px 14px;border-bottom:1px solid var(--slate-100);
  color:var(--slate-700);white-space:nowrap;
}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--slate-50)}
.td-right{text-align:right}
.td-mono{font-family:monospace;font-size:13px}
.tr-total td{background:var(--slate-50);font-weight:700;color:var(--slate-800);border-top:2px solid var(--slate-200)}

/* STATUS BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-green{background:var(--green-light);color:var(--green-dark)}
.badge-blue{background:#dbeafe;color:#1d4ed8}
.badge-orange{background:#fef3c7;color:#92400e}
.badge-red{background:#fee2e2;color:#991b1b}
.badge-gray{background:var(--slate-100);color:var(--slate-600)}

/* CHARTS */
.chart-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:20px;margin-bottom:24px}
.chart-card{background:#fff;border-radius:12px;border:1px solid var(--slate-200);padding:20px}
.chart-card h3{font-size:13px;font-weight:600;color:var(--slate-600);margin-bottom:16px}
.chart-wrap{position:relative;height:200px}

/* MODAL */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  display:flex;align-items:center;justify-content:center;z-index:1000;
  backdrop-filter:blur(2px);
}
.modal{
  background:#fff;border-radius:16px;width:480px;max-width:90vw;
  box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;
}
.modal-header{
  padding:20px 24px;border-bottom:1px solid var(--slate-200);
  display:flex;align-items:center;justify-content:space-between;
}
.modal-header h2{font-size:16px;font-weight:700}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--slate-400)}
.modal-body{padding:24px}
.modal-footer{padding:16px 24px;border-top:1px solid var(--slate-200);display:flex;justify-content:flex-end;gap:10px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--slate-600);margin-bottom:6px}
.form-input{
  width:100%;padding:9px 12px;border:1px solid var(--slate-200);
  border-radius:8px;font-size:13.5px;outline:none;transition:border-color .15s;
}
.form-input:focus{border-color:var(--green)}
.form-hint{font-size:11.5px;color:var(--slate-400);margin-top:4px}
.input-group{display:flex;gap:8px}
.input-group .form-input{flex:1}

/* TOGGLE SWITCH */
.switch{position:relative;display:inline-flex;align-items:center;cursor:pointer;gap:8px;font-size:13px}
.switch input{display:none}
.switch-track{
  width:40px;height:22px;background:var(--slate-300);
  border-radius:11px;transition:background .2s;position:relative;
}
.switch input:checked ~ .switch-track{background:var(--green)}
.switch-thumb{
  position:absolute;top:3px;left:3px;
  width:16px;height:16px;background:#fff;border-radius:50%;
  transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.2);
}
.switch input:checked ~ .switch-track .switch-thumb{left:21px}

/* CONNECTION STATUS */
.conn-status{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500;
}
.conn-status.connected{background:#dcfce7;color:#166534}
.conn-status.disconnected{background:#fee2e2;color:#991b1b}
.conn-dot{width:7px;height:7px;border-radius:50%;background:currentColor}

/* EMPTY STATE */
.empty-state{
  padding:60px 20px;text-align:center;color:var(--slate-400);
}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.empty-state p{font-size:14px}

/* SECTION HERO */
.section-hero{
  background:linear-gradient(135deg,var(--slate-900) 0%,var(--slate-800) 100%);
  border-radius:12px;padding:24px;margin-bottom:24px;color:#fff;
  display:flex;align-items:center;justify-content:space-between;
}
.section-hero h1{font-size:22px;font-weight:700}
.section-hero p{font-size:13px;color:var(--slate-400);margin-top:4px}

/* SCORE CARDS */
.score-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.score-card{
  background:#fff;border-radius:12px;border:1px solid var(--slate-200);
  padding:16px;text-align:center;
}
.score-circle{
  width:48px;height:48px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:20px;font-weight:800;color:#fff;margin:0 auto 10px;
}
.score-f{background:var(--red)}
.score-a{background:var(--green)}
.score-b{background:#3b82f6}
.score-c{background:var(--orange)}
.score-d{background:#f97316}
.score-label{font-size:11px;font-weight:700;color:var(--slate-400);letter-spacing:.06em;text-transform:uppercase}
.score-pct{font-size:18px;font-weight:700;color:var(--slate-800);margin-top:2px}
.score-trend{font-size:12px;margin-top:2px}
.score-trend.up{color:var(--green)}
.score-trend.down{color:var(--red)}

/* FUEL SPECIFIC */
.fuel-type-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--slate-100)}
.fuel-type-row:last-child{border-bottom:none}

/* TOOLTIP */
[title]{position:relative}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{position:fixed;z-index:100;height:100%;transform:translateX(0)}
  .score-grid{grid-template-columns:repeat(3,1fr)}
  .kpi-grid{grid-template-columns:repeat(2,1fr)}
}

/* PRINT HELPERS */
.no-print{}
@media print{.sidebar,.header,.filter-bar .btn,.no-print{display:none}}
</style>
</head>

/* ─── DATA SERVICE ─── */
const DataService = {
  source: 'mercury',
  rubyConfig: { baseUrl:'', username:'', password:'', port:'' },

  async fetchMercury(path, data={}) {
    try {
      const resp = await fetch('https://monecloud.aboveo.com' + path, {
        method:'POST', credentials:'include',
        headers:{ 'Content-Type':'application/x-www-form-urlencoded' },
        body: new URLSearchParams(data).toString(),
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      return await resp.json();
    } catch(e) {
      console.warn('Mercury fetch failed, using mock data:', e.message);
      return null;
    }
  },

  async fetchRubyPOS(endpoint, params={}) {
    const { baseUrl, username, password } = this.rubyConfig;
    if (!baseUrl) return null;
    try {
      const resp = await fetch(`${baseUrl}${endpoint}`, {
        method:'POST',
        headers:{
          'Authorization':'Basic ' + btoa(`${username}:${password}`),
          'Content-Type':'application/json',
        },
        body: JSON.stringify(params),
      });
      return await resp.json();
    } catch(e) {
      console.warn('Ruby POS fetch failed:', e.message);
      return null;
    }
  },

  async testRubyConnection() {
    const { baseUrl, username, password } = this.rubyConfig;
    if (!baseUrl) return false;
    try {
      const resp = await fetch(`${baseUrl}/api/status`, {
        headers:{ 'Authorization':'Basic ' + btoa(`${username}:${password}`) },
      });
      return resp.ok;
    } catch { return false; }
  },

  get(key) { return MOCK[key]; },
};

/* ─── CHART COMPONENT ─── */
const LineChart = ({labels, datasets, height=200}) => {
  const ref = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type:'line',
      data: { labels, datasets: datasets.map(d => ({
        ...d, borderWidth:2, pointRadius:3, tension:0.4, fill:true,
        backgroundColor: d.borderColor + '18',
      }))},
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom', labels:{font:{size:11}} } },
        scales:{
          x:{ grid:{display:false}, ticks:{font:{size:11}} },
          y:{ grid:{color:'#f1f5f9'}, ticks:{font:{size:11}, callback:v=>'£'+v.toLocaleString()} },
        },
      },
    });
    return () => chartRef.current?.destroy();
  }, [labels, datasets]);
  return <div className="chart-wrap" style={{height}}><canvas ref={ref}/></div>;
};

const BarChart = ({labels, datasets, height=200}) => {
  const ref = useRef();
  const chartRef = useRef();
  useEffect(() => {
    if (chartRef.current) chartRef.current.destroy();
    const ctx = ref.current.getContext('2d');
    chartRef.current = new Chart(ctx, {
      type:'bar',
      data: { labels, datasets },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ position:'bottom', labels:{font:{size:11}} } },
        scales:{
          x:{ grid:{display:false}, ticks:{font:{size:11}} },
          y:{ grid:{color:'#f1f5f9'}, ticks:{font:{size:11}, callback:v=>'£'+v.toLocaleString()} },
        },
      },
    });
    return () => chartRef.current?.destroy();
  }, [labels, datasets]);
  return <div className="chart-wrap" style={{height}}><canvas ref={ref}/></div>;
};

const RubyPOSModal = ({config, setConfig, onClose, onTest}) => {
  const [testing, setTesting] = useState(false);
  const [testResult, setTestResult] = useState(null);
  const [local, setLocal] = useState(config);

  const handleTest = async () => {
    setTesting(true); setTestResult(null);
    DataService.rubyConfig = local;
    const ok = await DataService.testRubyConnection();
    setTestResult(ok);
    setTesting(false);
  };

  return (
    <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="modal-header">
          <h2>🔴 Ruby POS Connection</h2>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">
          <p style={{fontSize:13,color:'var(--slate-500)',marginBottom:20}}>
            Connect to your Ruby POS system via local network (RJ45) or remote domain.
            Once configured, all data will pull directly from Ruby instead of Mercury.
          </p>

          <div className="form-group">
            <label className="form-label">Connection Type</label>
            <div className="filter-toggle" style={{display:'inline-flex'}}>
              <button
                className={local.type==='local'?'active':''}
                onClick={()=>setLocal({...local,type:'local'})}
              >🔌 Local (RJ45)</button>
              <button
                className={local.type==='remote'?'active':''}
                onClick={()=>setLocal({...local,type:'remote'})}
              >🌐 Remote Domain</button>
            </div>
          </div>

          {local.type==='local' ? (
            <div className="form-group">
              <label className="form-label">Local IP Address</label>
              <div className="input-group">
                <input className="form-input" placeholder="192.168.1.100"
                  value={local.ip||''} onChange={e=>setLocal({...local,ip:e.target.value,baseUrl:`http://${e.target.value}:${local.port||8080}`})}/>
                <input className="form-input" style={{width:80}} placeholder="Port"
                  value={local.port||''} onChange={e=>setLocal({...local,port:e.target.value,baseUrl:`http://${local.ip||''}:${e.target.value}`})}/>
              </div>
              <div className="form-hint">Connect the RJ45 cable from your Ruby POS terminal to the network, then enter its local IP address.</div>
            </div>
          ) : (
            <div className="form-group">
              <label className="form-label">Domain / URL</label>
              <input className="form-input" placeholder="https://yourstore.rubystems.com"
                value={local.baseUrl||''} onChange={e=>setLocal({...local,baseUrl:e.target.value})}/>
            </div>
          )}

          <div className="form-group">
            <label className="form-label">Username</label>
            <input className="form-input" placeholder="admin"
              value={local.username||''} onChange={e=>setLocal({...local,username:e.target.value})}/>
          </div>
          <div className="form-group">
            <label className="form-label">Password</label>
            <input className="form-input" type="password" placeholder="••••••••"
              value={local.password||''} onChange={e=>setLocal({...local,password:e.target.value})}/>
          </div>

          {testResult !== null && (
            <div className={`conn-status ${testResult?'connected':'disconnected'}`} style={{marginBottom:12}}>
              <div className="conn-dot"/>
              {testResult ? 'Connected successfully!' : 'Connection failed — check settings'}
            </div>
          )}
        </div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={handleTest} disabled={testing}>
            {testing ? 'Testing…' : '🔌 Test Connection'}
          </button>

            {rows.map((r,i)=>(
              <tr key={i}>
                <td>{r.date}</td><td>{r.category}</td><td>{r.vendor}</td><td style={{color:'var(--slate-400)'}}>{r.ref}</td>
                <td className="td-right td-mono">{fmt(r.amount)}</td>
                <td><Badge type={r.status==='Paid'?'green':'orange'}>{r.status}</Badge></td>
                <td style={{display:'flex',gap:4}}>
                  <button className="btn btn-icon" title="View">👁</button>
                  <button className="btn btn-icon" title="Edit">✏️</button>
                </td>
              </tr>
            ))}
            <tr className="tr-total"><td colSpan={4}>Total</td><td className="td-right td-mono">{fmt(total)}</td><td colSpan={2}/></tr>
          </tbody>
        </table></div>
      </div>
    </div>
  );
};

/* Setup */
const Setup = ({sub}) => {
  const sections = {
    'setup-alerts': { title:'Alerts & SMS Preferences', icon:'🔔', desc:'Configure who receives SMS alerts and what triggers them.' },
    'setup-users': { title:'System Admin — Users', icon:'👥', desc:'Manage user accounts, roles, and permissions.' },
    'setup-preferences': { title:'Location Preferences', icon:'⚙️', desc:'Tax rates, currency, date formats, and display settings.' },
    'setup-pos': { title:'POS System Information', icon:'🖥️', desc:'Connect and configure your Point of Sale terminal.' },
    'setup-location': { title:'Location Information', icon:'📍', desc:'Store address, contact info, and operating hours.' },
    'setup-jobber': { title:'Jobber & Fuel Management', icon:'🚛', desc:'Configure fuel suppliers, jobber accounts, and tank info.' },
    'setup-lottery': { title:'Lottery Settings', icon:'🎰', desc:'Lottery commission rates, machine settings, and reporting.' },
  };
  const s = sections[sub] || sections['setup-preferences'];
  return (
    <div>
      <div className="section-hero">
        <div>
          <h1>{s.icon} {s.title}</h1>
          <p>{s.desc}</p>
        </div>
      </div>
      <div className="card" style={{padding:32,textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:16}}>{s.icon}</div>
        <div style={{fontSize:16,fontWeight:600,color:'var(--slate-700)',marginBottom:8}}>{s.title}</div>
        <div style={{color:'var(--slate-400)',fontSize:14,marginBottom:24}}>{s.desc}</div>
        <button className="btn btn-primary">⚙️ Configure Settings</button>
      </div>
    </div>
  );
};

/* Generic placeholder for other sections */
const Placeholder = ({title, icon, desc}) => (
  <div>
    <div className="section-hero">
      <div><h1>{icon} {title}</h1><p>{desc}</p></div>
    </div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,marginBottom:24}}>
      {[1,2,3].map(i=><div key={i} className="kpi-card" style={{height:80,background:'var(--slate-100)',border:'2px dashed var(--slate-200)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--slate-400)'}}>Loading data…</div>)}
    </div>
    <div className="card" style={{padding:60,textAlign:'center',color:'var(--slate-400)'}}>
      <div style={{fontSize:48,marginBottom:12}}>{icon}</div>
      <div style={{fontSize:15,fontWeight:600,marginBottom:4}}>{title}</div>
      <div style={{fontSize:13}}>Connect to Mercury or Ruby POS to view live data</div>
      <div style={{marginTop:16,display:'flex',gap:8,justifyContent:'center'}}>
        <button className="btn btn-primary">🔌 Connect Data Source</button>
        <button className="btn btn-outline">📂 Load Sample Data</button>
      </div>
    </div>
  </div>
);

/* ─── MAIN APP ─── */
const App = () => {
  const [page, setPage] = useState('sales-summary');
  const [collapsed, setCollapsed] = useState(false);
  const [source, setSource] = useState('mercury');
  const [showRubyModal, setShowRubyModal] = useState(false);
  const [rubyConfig, setRubyConfig] = useState({ type:'local', ip:'', port:'8080', baseUrl:'', username:'', password:'' });

  const store = MOCK.store;

  const renderPage = () => {
    switch(page) {
      case 'dashboard-analytics': return <DashboardAnalytics/>;
      case 'dashboard-summary': return <Placeholder title="Dashboard Summary" icon="📋" desc="High-level store performance summary and key metrics."/>;
      case 'dashboard-som': return <Placeholder title="SOM Report" icon="🎯" desc="Share of Market analysis and competitive benchmarking."/>;
      case 'sales-summary': return <SalesSummary/>;
      case 'sales-day': return <SalesDay/>;
      case 'sales-shifts': return <SalesDay/>; // reuse pattern
      case 'sales-current': return <CurrentShift/>;
      case 'grocery-sales': return <GrocerySales/>;
      case 'grocery-purchases': return <Placeholder title="Grocery Purchases" icon="📦" desc="Track all grocery purchase orders and invoices from vendors."/>;
      case 'grocery-pricebook': return <Placeholder title="Pricebook & Deals" icon="🏷️" desc="Manage product pricing, promotions, and deal configurations."/>;
      case 'grocery-inventory': return <Placeholder title="Inventory" icon="📋" desc="Real-time inventory levels, shrink tracking, and reorder points."/>;
      case 'grocery-search': return <Placeholder title="Search / Add Item" icon="🔍" desc="Search products by PLU, barcode, or name. Add new items."/>;
      case 'lottery': return <Lottery/>;
      case 'fuel-jobber': return <Fuel sub="fuel-jobber"/>;
      case 'fuel-margins': return <Fuel sub="fuel-margins"/>;
      case 'fuel-ust': return <Fuel sub="fuel-ust"/>;
      case 'financial-atm': return <Placeholder title="ATM Cash Drops" icon="🏧" desc="Record and reconcile ATM cash drops and settlements."/>;
      case 'financial-other': return <Placeholder title="Other Income" icon="💵" desc="Track miscellaneous income sources beyond core POS categories."/>;
      case 'financial-services': return <Placeholder title="Financial Services" icon="💳" desc="Money orders, bill pay, and financial service transactions."/>;
      case 'financial-house': return <Placeholder title="House Accounts" icon="🏠" desc="Manage local credit accounts and customer house account balances."/>;
      case 'expenses': return <OperatingExpenses/>;
      case 'reports': return <Placeholder title="Reports" icon="📈" desc="Generate and download detailed financial and operational reports."/>;
      case 'scan-data': return <Placeholder title="Scan Data" icon="📦" desc="Barcode scan data, PLU movement, and inventory reconciliation."/>;
      case 'transactions': return <Placeholder title="Store Transactions" icon="🔄" desc="Full transaction log with filtering, search, and export."/>;
      case 'mostedge': return <Placeholder title="MostEdge TV" icon="📺" desc="Digital signage and promotional content management."/>;
      default:
        if (page.startsWith('setup-')) return <Setup sub={page}/>;
        return <Placeholder title={page} icon="📄" desc=""/>;
    }
  };

  return (
    <div id="app">
      <Sidebar active={page} setActive={setPage} collapsed={collapsed} setCollapsed={setCollapsed}/>
      <div className="main">
        <Header
          page={page}
          source={source}
          setSource={setSource}
          store={store}
          onSettingsClick={()=>setShowRubyModal(true)}
        />
        <div className="page">
          {renderPage()}
        </div>
      </div>
      {showRubyModal && (
        <RubyPOSModal
          config={rubyConfig}
          setConfig={setRubyConfig}
          onClose={()=>setShowRubyModal(false)}
        />
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
