<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0" />
<title>StoreCheck - Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F0F2F7;
  --bg-panel:#F8FBF9;
  --white:#FFFFFF;
  --sidebar:#ECF7F0;
  --sidebar-2:#DDEFE4;
  --accent:#27C66B;
  --accent-2:#8EE7B3;
  --accent-soft:rgba(39,198,107,0.12);
  --accent-deep:#1E9A54;
  --text:#14211A;
  --text-2:#495852;
  --text-3:#6E7F77;
  --border:#E3EBE6;
  --line:#EEF1F6;
  --shadow:0 16px 40px rgba(16,24,40,0.08);
  --shadow-soft:0 8px 24px rgba(16,24,40,0.05);
  --amber:#F59E0B;
  --amber-soft:rgba(245,158,11,0.16);
  --red:#EF4444;
  --red-soft:rgba(239,68,68,0.14);
  --blue:#3B82F6;
  --blue-soft:rgba(59,130,246,0.14);
  --purple:#8B5CF6;
  --purple-soft:rgba(139,92,246,0.15);
  --green-soft:rgba(39,198,107,0.14);
  --radius-xl:28px;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:12px;
  --sidebar-w:264px;
}
html,body,#app,#root{height:100%}
body{
  font-family:'DM Sans',sans-serif;
  background:
    radial-gradient(circle at top left, rgba(39,198,107,0.05), transparent 26%),
    radial-gradient(circle at bottom right, rgba(39,198,107,0.05), transparent 24%),
    var(--bg);
  color:var(--text);
}
button,input{font:inherit}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:999px}

#root{
  display:grid;
  grid-template-columns:var(--sidebar-w) minmax(0,1fr);
  min-height:100vh;
}
.sidebar{
  background:
    radial-gradient(circle at top right, rgba(39,198,107,0.1), transparent 26%),
    linear-gradient(180deg, #F3FAF5 0%, #EAF6EE 46%, #E2F1E8 100%);
  color:var(--text);
  padding:22px 18px 20px;
  display:flex;
  flex-direction:column;
  min-height:100vh;
  position:relative;
  overflow:hidden;
}
.sidebar::before{
  content:'';
  position:absolute;
  inset:auto -70px -110px auto;
  width:220px;
  height:220px;
  background:radial-gradient(circle, rgba(255,255,255,0.12), transparent 72%);
  pointer-events:none;
}
.main{
  display:flex;
  flex-direction:column;
  min-width:0;
  min-height:100vh;
}
.content{
  flex:1;
  overflow-y:auto;
  padding:28px;
}
.shell{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.sb-logo{
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  padding:6px 6px 22px;
  border-bottom:1px solid rgba(39,198,107,0.1);
  position:relative;
  z-index:1;
  text-align:center;
}
.sb-logo-main{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
}
.sb-logo-icon{
  width:44px;
  height:44px;
  border-radius:14px;
  background:#27C66B;
  border:1px solid rgba(39,198,107,0.22);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:15px;
  font-weight:700;
  letter-spacing:-0.04em;
  box-shadow:0 10px 24px rgba(39,198,107,0.18);
}
.sb-logo-text{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}
.sb-logo-text h2{
  font-size:17px;
  font-weight:700;
  letter-spacing:-0.03em;
  text-align:center;
}
.sb-logo-text p{display:none}
.sb-nav{
  flex:1;
  padding:16px 0;
  overflow-y:auto;
  position:relative;
  z-index:1;
}
.sb-section{
  font-size:11px;
  color:#71877B;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.14em;
  padding:8px 10px;
}
.sb-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:12px 14px 12px 16px;
  border-left:3px solid transparent;
  color:#43524C;
  font-size:14px;
  font-weight:500;
  border-radius:0 14px 14px 0;
  cursor:pointer;
  transition:background .18s ease,color .18s ease,border-color .18s ease,transform .18s ease;
}
.sb-item + .sb-item{margin-top:4px}
.sb-item:hover{
  background:rgba(39,198,107,0.08);
  color:var(--text);
  transform:translateX(2px);
}
.sb-item.active{
  background:linear-gradient(90deg, rgba(39,198,107,0.18), rgba(39,198,107,0.08));
  color:var(--accent-deep);
  border-left-color:var(--accent);
}
.sb-item-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-badge{
  margin-left:auto;
  min-width:22px;
  height:22px;
  padding:0 8px;
  border-radius:999px;
  background:#fff;
  color:var(--accent);
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:700;
}
.sb-footer{
  position:relative;
  z-index:1;
  padding-top:16px;
  border-top:1px solid rgba(39,198,107,0.1);
}
.sb-store-info{
  background:#FFFFFF;
  border:1px solid rgba(39,198,107,0.16);
  border-radius:18px;
  padding:14px;
  backdrop-filter:blur(10px);
}
.sb-meta{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  color:#61766A;
  margin-bottom:10px;
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:700;
}
.sb-live-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 6px rgba(39,198,107,0.14);
  animation:pulse 2s infinite;
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.sb-store-name{font-size:14px;font-weight:700;color:var(--text)}
.sb-store-sub{font-size:12px;color:var(--text-3);margin-top:4px}

.topbar{
  padding:22px 28px 0;
  flex-shrink:0;
}
.topbar-inner{
  background:rgba(255,255,255,0.88);
  border:1px solid rgba(39,198,107,0.08);
  box-shadow:var(--shadow-soft);
  backdrop-filter:blur(18px);
  border-radius:24px;
  padding:18px 20px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:16px;
}
.topbar-copy{
  grid-column:2;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  min-width:0;
}
.eyebrow{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:11px;
  font-weight:700;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text-3);
  margin-bottom:6px;
}
.eyebrow-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
}
.topbar-title{
  font-size:26px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.05em;
}
.topbar-sub{
  font-size:13px;
  color:var(--text-2);
  margin-top:6px;
}
.topbar-actions{
  grid-column:3;
  justify-self:end;
  display:flex;
  align-items:center;
  gap:10px;
}
.mobile-nav-btn{
  display:none;
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  align-items:center;
  justify-content:center;
  background:#FFFFFF;
  box-shadow:var(--shadow-soft);
  cursor:pointer;
}
.mobile-sidebar-overlay{
  display:none;
}
.view-switch{
  display:flex;
  align-items:center;
  gap:6px;
  padding:5px;
  border-radius:16px;
  border:1px solid rgba(39,198,107,0.1);
  background:#fff;
  box-shadow:var(--shadow-soft);
}
.view-switch-btn{
  border:none;
  background:transparent;
  color:var(--text-2);
  padding:10px 14px;
  border-radius:12px;
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}
.view-switch-btn.active{
  background:rgba(39,198,107,0.12);
  color:var(--accent-deep);
}
.source-pill,
.topbar-btn,
.topbar-avatar{
  border:1px solid rgba(39,198,107,0.1);
  background:rgba(255,255,255,0.86);
  box-shadow:var(--shadow-soft);
}
.source-pill{
  display:flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:14px;
  color:var(--text-2);
  font-size:12px;
  font-weight:700;
}
.source-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--accent);
  box-shadow:0 0 0 4px rgba(39,198,107,0.12);
}
.topbar-btn{
  width:42px;
  height:42px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  position:relative;
}
.notif-dot{
  position:absolute;
  top:8px;
  right:8px;
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--red);
  box-shadow:0 0 0 3px #fff;
}
.topbar-avatar{
  width:42px;
  height:42px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--accent-deep);
  font-weight:700;
  letter-spacing:-0.03em;
}

.section-hdr h1{
  font-size:34px;
  line-height:1.02;
  letter-spacing:-0.06em;
  font-weight:700;
}
.section-hdr p{
  font-size:15px;
  color:var(--text-2);
  margin-top:10px;
  line-height:1.55;
}
.section-hdr.slim p{
  margin-top:0;
  font-size:17px;
  max-width:760px;
}
.greeting-inline{
  display:inline-flex;
  align-items:center;
  gap:10px;
}

.card,
.kpi-card,
.status-card,
.chart-card,
.alerts-card,
.tank-card,
.grade-card,
.cat-card,
.week-card,
.settings-card{
  background:var(--white);
  border:1px solid rgba(228,232,239,0.9);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
}
.card-pad{padding:24px}

.demo-bar{
  display:flex;
  align-items:center;
  gap:12px;
  padding:16px 18px;
  background:linear-gradient(135deg, rgba(245,158,11,0.16), rgba(245,158,11,0.08));
  border:1px solid rgba(245,158,11,0.26);
  border-radius:18px;
  color:#8A5A00;
  font-size:13px;
}
.demo-copy strong{font-weight:700}

.kpi-row{
  display:grid;
  grid-template-columns:1.7fr 1fr 1fr 1fr;
  gap:18px;
  margin-bottom:20px;
}
.kpi-hero{
  position:relative;
  overflow:hidden;
  background:
    radial-gradient(circle at top right, rgba(39,198,107,0.12), transparent 28%),
    linear-gradient(135deg, #FFFFFF 0%, #F7FCF8 58%, #EEF9F2 100%);
  border-radius:var(--radius-xl);
  padding:28px;
  min-height:220px;
  border:1px solid rgba(39,198,107,0.12);
  box-shadow:0 24px 48px rgba(39,198,107,0.12);
}
.kpi-hero::before,
.kpi-hero::after{
  content:'';
  position:absolute;
  border-radius:50%;
  background:rgba(39,198,107,0.06);
}
.kpi-hero::before{width:210px;height:210px;top:-86px;right:-52px}
.kpi-hero::after{width:150px;height:150px;bottom:-64px;right:38px}
.hero-head{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:16px;
  position:relative;
  z-index:1;
}
.kpi-hero-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:#7FA18E;
}
.kpi-hero-value{
  font-size:52px;
  line-height:0.96;
  font-weight:700;
  color:var(--text);
  letter-spacing:-0.07em;
  margin:14px 0 12px;
  position:relative;
  z-index:1;
}
.kpi-hero-trend{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(39,198,107,0.08);
  border:1px solid rgba(39,198,107,0.1);
  font-size:12px;
  font-weight:600;
  color:var(--text-2);
  position:relative;
  z-index:1;
}
.trend-up{color:#86EFAC}
.trend-down{color:#FCA5A5}
.hero-foot{
  position:absolute;
  left:28px;
  right:28px;
  bottom:24px;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  gap:18px;
  z-index:1;
}
.hero-foot-copy{
  font-size:13px;
  line-height:1.5;
  color:var(--text-2);
  max-width:260px;
}
.hero-tag{
  background:#FFFFFF;
  border:1px solid rgba(39,198,107,0.12);
  border-radius:16px;
  padding:12px 14px;
  min-width:138px;
}
.hero-tag-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  color:#83A090;
}
.hero-tag-value{
  font-size:20px;
  font-weight:700;
  color:var(--accent-deep);
  margin-top:6px;
  letter-spacing:-0.04em;
}
.kpi-card{
  padding:22px;
  display:flex;
  flex-direction:column;
  gap:10px;
}
.icon-chip{
  width:46px;
  height:46px;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.kpi-label{
  font-size:11px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  font-weight:700;
  color:var(--text-3);
}
.kpi-value{
  font-size:32px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.06em;
}
.kpi-sub{
  font-size:13px;
  color:var(--text-2);
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:auto;
}

.status-row{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:18px;
  margin-bottom:20px;
}
.status-card{
  padding:22px;
  border-top:4px solid transparent;
}
.status-card.green{border-top-color:var(--accent)}
.status-card.red{border-top-color:var(--red)}
.status-card.amber{border-top-color:var(--amber)}
.status-card.blue{border-top-color:var(--blue)}
.status-header{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:16px;
}
.status-header-label{
  font-size:11px;
  font-weight:700;
  color:var(--text-3);
  letter-spacing:0.12em;
  text-transform:uppercase;
}
.status-big{
  font-size:38px;
  line-height:1;
  font-weight:700;
  letter-spacing:-0.06em;
}
.status-big.green{color:#15803D}
.status-big.red{color:var(--red)}
.status-big.amber{color:#B45309}
.status-big.blue{color:#1D4ED8}
.status-msg{
  margin-top:10px;
  font-size:13px;
  line-height:1.6;
  color:var(--text-2);
}
.status-badge{
  display:inline-flex;
  align-items:center;
  gap:7px;
  border-radius:999px;
  padding:7px 12px;
  margin-top:14px;
  font-size:12px;
  font-weight:700;
}
.status-badge.green{background:var(--green-soft);color:#15803D}
.status-badge.red{background:var(--red-soft);color:#B91C1C}
.status-badge.amber{background:var(--amber-soft);color:#92400E}
.status-badge.blue{background:var(--blue-soft);color:#1D4ED8}

.bottom-row{
  display:grid;
  grid-template-columns:1.45fr 1fr;
  gap:18px;
  margin-bottom:20px;
}
.chart-card,
.alerts-card,
.week-card,
.settings-card{
  padding:24px;
}
.chart-header{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:16px;
  margin-bottom:20px;
}
.chart-title,
.alerts-title,
.week-title,
.settings-title{
  font-size:17px;
  font-weight:700;
  letter-spacing:-0.04em;
}
.chart-sub,
.alerts-sub,
.settings-sub{
  font-size:13px;
  color:var(--text-3);
  margin-top:5px;
}
.chart-wrap{position:relative;height:220px}
.chart-total{
  padding:10px 12px;
  border-radius:14px;
  background:var(--accent-soft);
  color:#166534;
  font-size:12px;
  font-weight:700;
}
.alerts-list{display:flex;flex-direction:column}
.alert-item{
  display:flex;
  align-items:flex-start;
  gap:12px;
  padding:14px 0;
  border-bottom:1px solid var(--line);
}
.alert-item:last-child{border-bottom:none;padding-bottom:0}
.alert-copy{flex:1;min-width:0}
.alert-text{
  font-size:13px;
  line-height:1.6;
  color:var(--text);
  font-weight:500;
}
.alert-btn{
  margin-left:auto;
  border:none;
  border-radius:12px;
  padding:9px 12px;
  background:var(--bg-panel);
  color:var(--text-2);
  font-size:12px;
  font-weight:700;
  cursor:pointer;
}
.alert-btn:hover{background:#E8EDF5}

.reports-filter-grid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
  margin-top:18px;
}

.summary-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:18px;
}
.ops-shell{
  display:flex;
  flex-direction:column;
  gap:18px;
}
.ops-meta{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:16px;
}
.ops-title{
  font-size:42px;
  line-height:1.04;
  font-weight:700;
  letter-spacing:-0.06em;
}
.ops-subtitle{
  margin-top:6px;
  font-size:20px;
  line-height:1.6;
  color:var(--text-2);
}
.ops-kpis{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}
.ops-kpi{
  background:#fff;
  border:1px solid rgba(39,198,107,0.14);
  border-radius:16px;
  padding:12px 14px;
}
.ops-kpi-label{
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--text-3);
}
.ops-kpi-value{
  margin-top:6px;
  font-size:22px;
  font-weight:700;
  letter-spacing:-0.06em;
}
.ops-kpi-sub{
  margin-top:4px;
  font-size:12px;
  color:var(--text-2);
}
.ops-sheet{
  background:#fff;
  border:1px solid rgba(39,198,107,0.14);
  border-radius:24px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.ops-sheet-top{
  display:flex;
  align-items:flex-end;
  justify-content:flex-start;
  gap:16px;
  padding:18px 22px;
  background:linear-gradient(90deg, #1E9A54 0%, #27C66B 100%);
  color:#fff;
}
.ops-sheet-brand{
  font-size:18px;
  font-weight:700;
  letter-spacing:-0.04em;
}
.ops-sheet-sub{
  margin-top:6px;
  font-size:13px;
  color:rgba(255,255,255,0.82);
}
.ops-table{
  width:100%;
  border-collapse:collapse;
}
.ops-table th{
  background:#EDF3F0;
  color:#62756C;
  font-size:11px;
  font-weight:700;
  text-transform:uppercase;
  letter-spacing:0.1em;
  text-align:left;
  padding:12px 16px;
  border-bottom:1px solid var(--line);
}
.ops-table th:nth-child(2){
  background:#EFF4F2;
}
.ops-table th:nth-child(3){

const BarChart = ({ data, labels, height = 220 }) => {
  const ref = useRef(null);
  const chartRef = useRef(null);

  useEffect(() => {
    if (!ref.current) return;
    if (chartRef.current) chartRef.current.destroy();

    chartRef.current = new Chart(ref.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [
          {
            data,
            backgroundColor: labels.map((_, i) =>
              i === 6 ? 'rgba(30,154,84,0.92)' : i % 2 === 0 ? 'rgba(39,198,107,0.9)' : 'rgba(142,231,179,0.82)'
            ),
            borderColor: labels.map((_, i) => (i === 6 ? '#1E9A54' : '#27C66B')),
            borderWidth: 1,
            borderRadius: 10,
            borderSkipped: false,
            maxBarThickness: 34,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: { label: (ctx) => ' ' + fmt(ctx.raw) },
            backgroundColor: '#1E9A54',
            padding: 12,
            cornerRadius: 10,
            displayColors: false,
          },
        },
        scales: {
          x: {
            grid: { display: false },
            border: { display: false },
            ticks: { font: { family: 'DM Sans', size: 12, weight: '600' }, color: '#7B8794' },
          },
          y: {
            grid: { color: '#EDF1F6' },
            border: { display: false },
            ticks: {
              font: { family: 'DM Sans', size: 11, weight: '600' },
              color: '#94A3B8',
              callback: (v) => '$' + v / 1000 + 'K',
            },
          },
        },
      },
    });

    return () => chartRef.current?.destroy();
  }, [data, labels]);

  return <canvas ref={ref} style={{ height: height + 'px' }} />;
};

const downloadData = (rows, format, filename) => {
  const normalized = rows.map((row) => ({
    Date: row.date,
    Time: row.time,
    Receipt: row.receipt,
    Shift: row.shift,
    Cashier: row.cashier,
    Department: row.department,
    Item: row.item,
    Qty: row.qty,
    PriceLevel: row.priceLevel,
    Tender: row.tender,
    Amount: row.amount.toFixed(2),
    Register: row.register,
  }));
  const headers = Object.keys(normalized[0] || {});
  const body =
    format === 'JSON'
      ? JSON.stringify(normalized, null, 2)
      : [headers.join(','), ...normalized.map((row) => headers.map((header) => `"${String(row[header]).replaceAll('"', '""')}"`).join(','))].join('\n');
  const mime = format === 'JSON' ? 'application/json' : 'text/csv';
  const extension = format === 'JSON' ? 'json' : format === 'XLS' ? 'xls' : 'csv';
  const blob = new Blob([body], { type: mime });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename}.${extension}`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
};

      : [headers.join(','), ...rows.map((row) => headers.map((header) => `"${String(row[header] ?? '').replaceAll('"', '""')}"`).join(','))].join('\n');
  const mime = format === 'JSON' ? 'application/json' : 'text/csv';
  const extension = format === 'JSON' ? 'json' : format === 'XLS' ? 'xls' : 'csv';
  const blob = new Blob([body], { type: mime });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = `${filename}.${extension}`;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
};

              <span className="grade-stat-label"><Icon name="gallons" size={14} bg="rgba(245,158,11,0.12)" fg="#F59E0B" /> Gallons Sold</span>
              <span className="grade-stat-val">{fmtN(g.gallons, 2)}</span>
            </div>
            <div className="grade-stat">
              <span className="grade-stat-label"><Icon name="trendUp" size={14} bg="rgba(39,198,107,0.12)" fg="#27C66B" /> Profit / Gallon</span>
              <span className="grade-stat-val" style={{ color: '#15803D' }}>${g.margin.toFixed(2)}</span>
            </div>
            <div className="grade-stat">
              <span className="grade-stat-label"><Icon name="cash" size={14} bg="rgba(59,130,246,0.12)" fg="#3B82F6" /> Your Profit</span>
              <span className="grade-stat-val" style={{ color: '#15803D' }}>{fmt(g.gallons * g.margin)}</span>
            </div>
          </div>
        ))}
      </div>

      <div className="card card-pad">
        <div className="chart-title" style={{ marginBottom: 16 }}>Fuel Totals - Today</div>
        <div className="summary-grid">
          {[
            { label: 'Total Gallons Sold', val: fmtN(totalGallons, 0) + ' gal', icon: 'fuel', tone: iconDefaults.fuel },
            { label: 'Total Fuel Revenue', val: fmt(totalRevenue), icon: 'cash', tone: iconDefaults.green },
            { label: 'Total Fuel Profit', val: fmt(totalProfit), icon: 'trendUp', tone: iconDefaults.blue },
            { label: 'Avg Profit / Gallon', val: '$' + (totalProfit / totalGallons).toFixed(3), icon: 'report', tone: iconDefaults.purple },
          ].map((s) => (
            <div key={s.label} className="summary-stat">
              <Icon name={s.icon} size={22} bg={s.tone.bg} fg={s.tone.fg} style={{ margin: '0 auto' }} />
              <div className="summary-label">{s.label}</div>
              <div className="summary-value">{s.val}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

  const sampleLabel = activeDisplay.name;
  const allTransactions = [

    { time: '12:18', cashier: 'M. Chen', item: 'Snacks Item C', category: 'Snacks', priceLevel: 'Pack', amount: 9.99 },
    { time: '13:24', cashier: 'A. Patel', item: 'Grocery Item D', category: 'Grocery', priceLevel: 'Standard', amount: 12.45 },
    { time: '15:22', cashier: 'J. Lopez', item: 'Beverages Item B', category: 'Beverages', priceLevel: 'Promo', amount: 7.49 },
    { time: '16:47', cashier: 'M. Chen', item: 'Tobacco Item D', category: 'Tobacco', priceLevel: 'Pack', amount: 9.99 },
    { time: '18:03', cashier: 'A. Patel', item: 'Snacks Item A', category: 'Snacks', priceLevel: 'Standard', amount: 3.49 },
  ];

  const drillData = {
    items: [
      { name: `${sampleLabel} Top Item A`, qty: 84, avg: '$3.49', sales: '$293.16' },
      { name: `${sampleLabel} Top Item B`, qty: 61, avg: '$4.29', sales: '$261.69' },
      { name: `${sampleLabel} Top Item C`, qty: 44, avg: '$5.99', sales: '$263.56' },

    ],
    transactions: [
      { time: '07:12', cashier: 'A. Patel', item: `${sampleLabel} Item A`, category: sampleLabel, priceLevel: 'Standard', amount: 14.99 },
      { time: '09:41', cashier: 'M. Chen', item: `${sampleLabel} Item B`, category: sampleLabel, priceLevel: 'Promo', amount: 6.49 },

  const activeTransactions = shopCategory === 'overview' ? allTransactions : drillData.transactions;
  const scopedItemOptions = [...new Set(activeTransactions.map((row) => row.item))];
  const filteredTransactions = activeTransactions
    .filter((row) => {
      if (txCategoryFilter !== 'all') {
        if (shopCategory === 'overview') {
          if (row.category !== txCategoryFilter) return false;
        } else if (row.item !== txCategoryFilter) {
          return false;
        }
      }
      if (txCashierFilter !== 'all' && row.cashier !== txCashierFilter) return false;
      if (txPriceFilter !== 'all' && row.priceLevel !== txPriceFilter) return false;
      if (txSearch.trim()) {
        const haystack = `${row.time} ${row.cashier} ${row.category} ${row.item} ${row.priceLevel}`.toLowerCase();
        if (!haystack.includes(txSearch.trim().toLowerCase())) return false;
      }
      return true;
    })
    .sort((a, b) => {
      const timeValue = (v) => Number(v.time.replace(':', ''));
      if (txSort === 'time-asc') return timeValue(a) - timeValue(b);
      if (txSort === 'amount-desc') return b.amount - a.amount;
      if (txSort === 'amount-asc') return a.amount - b.amount;
      return timeValue(b) - timeValue(a);
    });
  const exportTransactions = (format) => {
    const rows = filteredTransactions.map((row) => ({
      time: row.time,
      cashier: row.cashier,
      category: row.category,
      item: row.item,
      priceLevel: row.priceLevel,
      amount: row.amount,
    }));
    let payload = '';
    let mime = 'text/plain';
    let extension = format.toLowerCase();
    if (format === 'CSV') {
      mime = 'text/csv;charset=utf-8';
      payload = ['Time,Cashier,Category,Item,Price Level,Amount']
        .concat(rows.map((row) => [row.time, row.cashier, row.category, row.item, row.priceLevel, row.amount.toFixed(2)].join(',')))
        .join('\n');
    } else if (format === 'JSON') {
      mime = 'application/json;charset=utf-8';
      payload = JSON.stringify(rows, null, 2);
      extension = 'json';
    } else {
      mime = 'application/vnd.ms-excel';
      payload = ['Time\tCashier\tCategory\tItem\tPrice Level\tAmount']
        .concat(rows.map((row) => [row.time, row.cashier, row.category, row.item, row.priceLevel, row.amount.toFixed(2)].join('\t')))
        .join('\n');
      extension = 'xls';
    }
    const blob = new Blob([payload], { type: mime });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.download = `storecheck-transactions-${shopCategory}.${extension}`;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    window.setTimeout(() => URL.revokeObjectURL(url), 1000);

                          <tr>

                            <td>

                        </tbody>
                      </table>
                    </div>
                  </>
                ) : (
                  <div className="shop-drill-panel">{drillPanel}</div>

          </div>
        </div>
      </div>
    );
  }

  return (

      <div className="shop-summary-grid">

          <div className="shop-nav-sub">Choose a department, then move into items or transactions only when needed.</div>
          {transactionFocus ? (

                  >

          <div className="shop-category-list">

              </div>
              <div className="shop-category-meta">

                <span>100% share</span>
              </div>
              <div className="shop-progress"><div className="shop-progress-bar" style={{ width: '100%', background: '#27C66B' }}></div></div>
            </div>
            {categoryRows.map((category) => (
              <div key={category.id} className={`shop-category-item${shopCategory === category.id ? ' active' : ''}`} onClick={() => setShopCategory(category.id)}>
                <div className="shop-category-top">
                  <div className="shop-category-name">
                    <Icon name={category.icon} size={18} bg={`${category.detailColor}20`} fg={category.detailColor} />
                    <span>{category.name}</span>
                  </div>
                  <div className="shop-category-value">{fmt(category.sales)}</div>
                </div>
                <div className="shop-category-meta">
                  <span>{category.id === 'lottery' ? 'Net after payouts' : `${fmtN(category.items)} items`}</span>
                  <span>{category.share}% share</span>
                </div>
                <div className="shop-progress"><div className="shop-progress-bar" style={{ width: `${category.share}%`, background: category.detailColor }}></div></div>
              </div>
            ))}
          </div>
        </div>

        <div className="shop-detail-card">
          {shopCategory === 'overview' ? (
            <>
              <div className="shop-detail-head">
                <div>
                  <div className="shop-detail-title">Store Overview Detail</div>
                  <div className="shop-detail-sub">Whole-store roll-up before you drill into a department.</div>
                  <div className="shop-detail-metric">{fmt(totalShop)}</div>
                  </div>
                  <Icon name="shop" size={32} bg="rgba(39,198,107,0.12)" fg="#27C66B" />
                </div>
              {drillMode === 'transactions' ? (
                <div className="shop-drill-panel">{drillPanel}</div>
              ) : (
                <>
                  <div className="shop-utility-row">
                    <div className="shop-utility-copy">Open or export the full transaction feed across every shop department.</div>
                    <div className="shop-utility-actions">
                      <button type="button" className="shop-utility-btn" onClick={() => setDrillMode('transactions')}>
                        <Icon name="report" size={14} bg="transparent" fg="#1E9A54" />
                        <span>View all transactions</span>
                      </button>
                      <button type="button" className="shop-export-btn" onClick={() => exportTransactions('CSV')}>
                        <Icon name="save" size={14} bg="transparent" fg="#1E9A54" />
                        <span>Download CSV</span>
                      </button>
                    </div>
                  </div>

                  <div className="shop-detail-grid">
                    <div className="shop-detail-stat">
                      <div className="shop-detail-stat-label">Tracked Categories</div>
                      <div className="shop-detail-stat-value">{cats.length}</div>
                    </div>
                    <div className="shop-detail-stat">
                      <div className="shop-detail-stat-label">Items Sold</div>
                      <div className="shop-detail-stat-value">{fmtN(totalItems)}</div>
                    </div>
                    <div className="shop-detail-stat">
                      <div className="shop-detail-stat-label">Top Category</div>
                      <div className="shop-detail-stat-value">{topCategory.name}</div>
                    </div>
                  </div>

                  <div className="shop-table-wrap">
                    <table className="shop-table">
                      <thead>
                        <tr>
                          <th>Department</th>
                          <th>Items</th>
                          <th>Share</th>
                          <th>Sales</th>
                        </tr>
                      </thead>
                      <tbody>
                        {categoryRows.map((category) => (
                          <tr key={category.id}>
                            <td>{category.name}</td>
                            <td>{category.id === 'lottery' ? 'Net only' : fmtN(category.items)}</td>
                            <td>{category.share}%</td>
                            <td>{fmt(category.sales)}</td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </>
              )}
            </>
          ) : (
            <>
              <div className="shop-surface-nav">
                <div className="shop-surface-path">
                  <span className="shop-surface-caption">Department page</span>
                </div>
              </div>
              {drillMode !== 'category' ? (
                <div className="shop-panel-return">
                  <button type="button" className="shop-back-btn prominent panel" onClick={() => setDrillMode('category')}>
                    <Icon name="back" size={14} bg="transparent" fg="#1E9A54" />
                    <span>Summary</span>
                  </button>
                </div>
              ) : null}
              <div className="shop-utility-row">
                <div className="shop-utility-copy">Open the full transaction feed for this department when you need the source rows.</div>
                <button type="button" className="shop-utility-btn" onClick={() => setDrillMode('transactions')}>
                  <Icon name="report" size={14} bg="transparent" fg="#1E9A54" />
                  <span>View all transactions</span>
                </button>
              </div>
              <div className="shop-detail-head" style={{ marginTop: 18 }}>
                <div>
                  <div className="shop-detail-title">{activeDisplay.name} Detail</div>
                  <div className="shop-detail-sub">
                    {activeDisplay.id === 'lottery'
                      ? 'Lottery keeps a separate data path for gross, payout, and net revenue.'
                      : 'Review the summary first, then open the detail that explains the result.'}
                  </div>
                  <div className="shop-detail-metric">{fmt(activeDisplay.sales)}</div>
                </div>
                <Icon name={activeDisplay.detailIcon} size={32} bg={`${activeDisplay.detailColor}20`} fg={activeDisplay.detailColor} />
              </div>

              <div className="shop-detail-grid">
                <div className="shop-detail-stat">
                  <div className="shop-detail-stat-label">Sales Share</div>
                  <div className="shop-detail-stat-value">{activeDisplay.share}%</div>
                </div>
                <div className="shop-detail-stat">
                  <div className="shop-detail-stat-label">{activeDisplay.id === 'lottery' ? 'Gross Sales' : 'Items Sold'}</div>
                  <div className="shop-detail-stat-value">{activeDisplay.id === 'lottery' ? fmt(activeDisplay.grossSales) : fmtN(activeDisplay.items)}</div>
                </div>
                <div className="shop-detail-stat">
                  <div className="shop-detail-stat-label">{activeDisplay.id === 'lottery' ? 'Payouts' : 'Avg Unit Value'}</div>
                  <div className="shop-detail-stat-value">{activeDisplay.id === 'lottery' ? fmt(activeDisplay.payouts) : fmt(activeDisplay.avgItem)}</div>
                </div>
              </div>

              <div className="shop-drill-panel">
                {drillPanel}
              </div>
            </>
          )}
          </div>
        </div>
      </div>
  );
};

const TransactionsView = () => {
  const [mode, setMode] = useState('detail');
  const [scope, setScope] = useState('Today');
  const [shift, setShift] = useState('All');
  const [department, setDepartment] = useState('All');
  const [cashier, setCashier] = useState('All');
  const [tender, setTender] = useState('All');
  const [priceLevel, setPriceLevel] = useState('All');
  const [sort, setSort] = useState('Newest first');
  const [search, setSearch] = useState('');
  const [selectedId, setSelectedId] = useState(TRANSACTION_ROWS[0].id);

  const searchText = search.trim().toLowerCase();
  const filteredRows = TRANSACTION_ROWS.filter((row) => {
    const textMatch =
      !searchText ||
      [row.id, row.receipt, row.shift, row.cashier, row.department, row.item, row.priceLevel, row.tender, row.register]
        .some((value) => String(value).toLowerCase().includes(searchText));
    return (
      textMatch &&
      (shift === 'All' || row.shift === shift) &&
      (department === 'All' || row.department === department) &&
      (cashier === 'All' || row.cashier === cashier) &&
      (tender === 'All' || row.tender === tender) &&
      (priceLevel === 'All' || row.priceLevel === priceLevel)
    );
  });

  const sortedRows = [...filteredRows].sort((a, b) => {
    if (sort === 'Oldest first') return a.time.localeCompare(b.time);
    if (sort === 'Amount high') return b.amount - a.amount;
    if (sort === 'Amount low') return a.amount - b.amount;
    return b.time.localeCompare(a.time);
  });

  const selected = sortedRows.find((row) => row.id === selectedId) || sortedRows[0] || null;
  const total = sumRows(sortedRows);
  const avgTicket = sortedRows.length ? total / sortedRows.length : 0;
  const cardMix = sortedRows.length ? Math.round((sortedRows.filter((row) => row.tender === 'Card').length / sortedRows.length) * 100) : 0;
  const departmentRows = Object.values(groupRows(sortedRows, 'department')).sort((a, b) => b.amount - a.amount);
  const tenderRows = Object.values(groupRows(sortedRows, 'tender')).sort((a, b) => b.amount - a.amount);
  const cashierRows = Object.values(groupRows(sortedRows, 'cashier')).sort((a, b) => b.amount - a.amount);
  const hourlyRows = Object.values(sortedRows.reduce((acc, row) => {
    const hour = `${row.time.slice(0, 2)}:00`;
    if (!acc[hour]) acc[hour] = { label: hour, rows: 0, amount: 0, qty: 0 };
    acc[hour].rows += 1;
    acc[hour].amount += row.amount;
    acc[hour].qty += Number(row.qty) || 0;
    return acc;
  }, {})).sort((a, b) => a.label.localeCompare(b.label));
  const maxAmount = Math.max(1, ...departmentRows.map((row) => row.amount), ...tenderRows.map((row) => row.amount), ...cashierRows.map((row) => row.amount), ...hourlyRows.map((row) => row.amount));

  const exportRows = (format) => downloadData(sortedRows, format, `storecheck-transactions-${scope.toLowerCase().replaceAll(' ', '-')}`);
  const options = (items) => ['All', ...items];
  const renderSelect = (label, value, setter, items) => (
    <div className="tx-filter-group">
      <label>{label}</label>
      <select className="tx-select" value={value} onChange={(e) => setter(e.target.value)}>
        {items.map((item) => <option key={item}>{item}</option>)}
      </select>
    </div>
  );
  const renderBars = (rows) => (
    <div className="tx-bars">
      {rows.map((row) => (
        <div className="tx-bar-row" key={row.label}>
          <div className="tx-bar-label">{row.label}</div>
          <div className="tx-bar-track"><div className="tx-bar-fill" style={{ width: `${Math.max(5, (row.amount / maxAmount) * 100)}%` }}></div></div>
          <div className="tx-bar-value">{fmt(row.amount)}</div>
        </div>
      ))}
    </div>
  );
  const renderList = (rows, secondary = 'rows') => rows.map((row) => (
    <div className="tx-list-row" key={row.label}>
      <div>
        <div className="tx-list-label">{row.label}</div>
        <div className="tx-list-meta">{row.rows} {secondary} · {fmtN(row.qty)} units</div>
      </div>
      <strong>{fmt(row.amount)}</strong>
    </div>
  ));

  const tableRows = sortedRows.length ? sortedRows.map((row) => (
    <tr
      key={row.id}
      className={`tx-click-row ${selected?.id === row.id ? 'tx-row-active' : ''}`}
      onClick={() => setSelectedId(row.id)}
    >
      <td>{fmtTime12(row.time)}</td>
      <td>{row.receipt}</td>
      <td>{row.cashier}</td>
      <td>{row.department}</td>
      <td>{row.item}</td>
      <td>{row.tender}</td>
      <td className="tx-right">{fmt(row.amount)}</td>
    </tr>
  )) : (
    <tr><td colSpan="7"><div className="tx-empty">No transactions match these filters.</div></td></tr>
  );

  return (
    <div className="shell">
      <div className="section-hdr">
        <h1>Transactions Explorer</h1>
        <p>Search POS transactions, filter by cashier, department, tender, item, or price level, and open the receipt behind each number.</p>
      </div>

      <div className="tx-mode-switch" role="tablist" aria-label="Transactions Explorer views">
        {['detail', 'summary', 'hourly', 'graphical'].map((item) => (
          <button key={item} className={`tx-mode-btn ${mode === item ? 'active' : ''}`} onClick={() => setMode(item)}>
            {item === 'detail' ? 'Detail View' : item === 'summary' ? 'Summary View' : item === 'hourly' ? 'Hourly View' : 'Graphical View'}
          </button>
        ))}
      </div>

      <div className="tx-kpi-grid">
        <div className="tx-kpi-card"><div className="tx-kpi-label">Transaction Sales</div><div className="tx-kpi-value">{fmt(total)}</div><div className="tx-kpi-copy">{scope} source rows</div></div>
        <div className="tx-kpi-card"><div className="tx-kpi-label">Transactions</div><div className="tx-kpi-value">{fmtN(sortedRows.length)}</div><div className="tx-kpi-copy">Filtered receipt count</div></div>
        <div className="tx-kpi-card"><div className="tx-kpi-label">Avg Ticket</div><div className="tx-kpi-value">{fmt(avgTicket)}</div><div className="tx-kpi-copy">Average receipt value</div></div>
        <div className="tx-kpi-card"><div className="tx-kpi-label">Card Mix</div><div className="tx-kpi-value">{cardMix}%</div><div className="tx-kpi-copy">Card transactions</div></div>
      </div>

      <div className="tx-toolbar">
        <div className="tx-toolbar-head">
          <div>
            <div className="tx-toolbar-title">Filters and exports</div>
            <div className="tx-toolbar-sub">Use multiple filters together, then export exactly the rows on screen.</div>
          </div>
          <div className="tx-exports">
            <button className="tx-export-btn" onClick={() => exportRows('CSV')}><Icon name="cash" size={16} /> CSV</button>
            <button className="tx-export-btn" onClick={() => exportRows('XLS')}><Icon name="cash" size={16} /> Excel</button>
            <button className="tx-export-btn" onClick={() => exportRows('JSON')}><Icon name="cash" size={16} /> JSON</button>
          </div>
        </div>
        <div className="tx-filters">
          <div className="tx-filter-group">
            <label>Search</label>
            <input className="tx-input" value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Receipt, cashier, item, department" />
          </div>
          {renderSelect('Scope', scope, setScope, ['Today', 'Current Shift', 'This Week'])}
          {renderSelect('Shift', shift, setShift, options(uniqueValues(TRANSACTION_ROWS, 'shift')))}
          {renderSelect('Department', department, setDepartment, options(uniqueValues(TRANSACTION_ROWS, 'department')))}
          {renderSelect('Cashier', cashier, setCashier, options(uniqueValues(TRANSACTION_ROWS, 'cashier')))}
          {renderSelect('Tender', tender, setTender, options(uniqueValues(TRANSACTION_ROWS, 'tender')))}
          {renderSelect('Price Level', priceLevel, setPriceLevel, options(uniqueValues(TRANSACTION_ROWS, 'priceLevel')))}
          {renderSelect('Sort', sort, setSort, ['Newest first', 'Oldest first', 'Amount high', 'Amount low'])}
        </div>
      </div>

      {mode === 'detail' ? (
        <div className="tx-layout">
          <div className="tx-table-card">
            <div className="tx-card-title">Transaction Detail</div>
            <div className="tx-card-sub">Click a row to inspect receipt, cashier, tender, register, and item information.</div>
            <div className="tx-table-wrap">
              <table className="tx-table">
                <thead><tr><th>Time</th><th>Receipt</th><th>Cashier</th><th>Department</th><th>Item</th><th>Tender</th><th className="tx-right">Amount</th></tr></thead>
                <tbody>{tableRows}</tbody>
              </table>
            </div>
          </div>
          <div className="tx-receipt-card">
            <div className="tx-receipt-title">Receipt Inspector</div>
            <div className="tx-receipt-meta">{selected ? `${selected.receipt} · ${fmtTime12(selected.time)}` : 'Select a transaction'}</div>
            {selected ? (
              <>
                <div className="tx-receipt-row"><span>Cashier</span><strong>{selected.cashier}</strong></div>
                <div className="tx-receipt-row"><span>Department</span><strong>{selected.department}</strong></div>
                <div className="tx-receipt-row"><span>Item</span><strong>{selected.item}</strong></div>
                <div className="tx-receipt-row"><span>Qty</span><strong>{selected.qty}</strong></div>
                <div className="tx-receipt-row"><span>Price level</span><strong>{selected.priceLevel}</strong></div>
                <div className="tx-receipt-row"><span>Tender</span><strong>{selected.tender}</strong></div>
                <div className="tx-receipt-row"><span>Register</span><strong>{selected.register}</strong></div>
                <div className="tx-receipt-total">{fmt(selected.amount)}</div>
              </>
            ) : <div className="tx-empty">No receipt selected.</div>}
          </div>
        </div>
      ) : null}

      {mode === 'summary' ? (
        <div className="tx-summary-grid">
          <div className="tx-summary-card"><div className="tx-card-title">By Department</div><div className="tx-card-sub">Where the money came from.</div>{renderList(departmentRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">By Tender</div><div className="tx-card-sub">How customers paid.</div>{renderList(tenderRows)}</div>
          <div className="tx-summary-card"><div className="tx-card-title">By Cashier</div><div className="tx-card-sub">Who handled the transactions.</div>{renderList(cashierRows)}</div>
        </div>
      ) : null}

      {mode === 'hourly' ? (
        <div className="tx-table-card">
          <div className="tx-card-title">Hourly Transaction View</div>
          <div className="tx-card-sub">See traffic and sales by time window so busy periods are easier to explain.</div>
          {renderBars(hourlyRows)}
        </div>
      ) : null}

      {mode === 'graphical' ? (
        <div className="tx-summary-grid">

};

                    <td className="td-right td-mono">{fmt(r.shop)}</td>
                    <td className="td-right td-mono">{fmt(r.lottery)}</td>
                    <td className="td-right td-mono" style={{ fontWeight: 700 }}>{fmt(r.total)}</td>
                    <td className="td-right td-mono">{fmtN(r.gallons)}</td>
                  </tr>
                ))}
                <tr className="week-total-row">
                  <td>TOTAL</td>
                  <td className="td-right td-mono">{fmt(customTotals.fuel)}</td>
                  <td className="td-right td-mono">{fmt(customTotals.shop)}</td>
                  <td className="td-right td-mono">{fmt(customTotals.lottery)}</td>
                  <td className="td-right td-mono">{fmt(customTotals.total)}</td>
                  <td className="td-right td-mono">{fmtN(customTotals.gallons)}</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="shell">
      <div className="section-hdr">
        <h1>Reports - This Week</h1>
        <p>Seven-day store summary for quick weekly review.</p>
      </div>

      {reportSwitcher}

      <div className="week-hero">
        {[
          { icon: 'cash', label: 'Week Total', val: fmt(totals.total), dark: true, tone: iconDefaults.green },
          { icon: 'fuel', label: 'Fuel Sales', val: fmt(totals.fuel), dark: false, tone: iconDefaults.fuel },
          { icon: 'shop', label: 'Shop Sales', val: fmt(totals.shop), dark: false, tone: iconDefaults.blue },
          { icon: 'gallons', label: 'Total Gallons', val: fmtN(totals.gallons) + ' gal', dark: false, tone: iconDefaults.purple },
        ].map((s) => (
          <div key={s.label} className={`week-stat${s.dark ? ' dark' : ''}`}>
            <Icon
              name={s.icon}
              size={22}
              bg={s.dark ? 'rgba(255,255,255,0.1)' : s.tone.bg}
              fg={s.dark ? '#86EFAC' : s.tone.fg}
            />
            <div className="week-stat-label">{s.label}</div>
            <div className="week-stat-value">{s.val}</div>
          </div>
        ))}
      </div>

      <div className="chart-card" style={{ marginBottom: 20 }}>
        <div className="chart-header">
          <div>
            <div className="chart-title">Daily Sales This Week</div>
            <div className="chart-sub">Each bar shows total sales for that day.</div>
          </div>
        </div>
        <div className="chart-wrap">
          <BarChart data={rows.map((r) => r.total)} labels={rows.map((r) => r.day)} />
        </div>
      </div>

      <div className="week-card">
        <div className="week-title">Day-by-Day Breakdown</div>
        <div style={{ overflowX: 'auto', marginTop: 18 }}>
          <table className="week-table">
            <thead>
              <tr>
                <th>Day</th>
                <th className="td-right">Fuel</th>
                <th className="td-right">Shop</th>
                <th className="td-right">Lottery</th>
                <th className="td-right">Total Sales</th>
                <th className="td-right">Gallons</th>
                <th className="td-right">Cash Check</th>
              </tr>
            </thead>
            <tbody>
              {rows.map((r, i) => (
                <tr key={i}>
                  <td>
                    <div className="day-col">{r.day}</div>
                    <div className="day-sub">{r.date}</div>
                  </td>
                  <td className="td-right td-mono">{fmt(r.fuel)}</td>
                  <td className="td-right td-mono">{fmt(r.shop)}</td>
                  <td className="td-right td-mono">{fmt(r.lottery)}</td>
                  <td className="td-right td-mono" style={{ fontWeight: 700 }}>{fmt(r.total)}</td>
                  <td className="td-right td-mono">{fmtN(r.gallons)}</td>
                  <td className="td-right">
                    <span className={`diff-pill ${r.diff >= -50 ? 'ok' : 'bad'}`}>
                      <Icon
                        name={r.diff >= 0 ? 'success' : r.diff >= -50 ? 'alert' : 'alert'}
                        size={13}
                        bg="transparent"
                        fg={r.diff >= -50 ? '#15803D' : '#B91C1C'}
                      />
                      <span>{fmt(Math.abs(r.diff))}</span>
                    </span>
                  </td>
                </tr>
              ))}
              <tr className="week-total-row">
                <td>TOTAL</td>
                <td className="td-right td-mono">{fmt(totals.fuel)}</td>
                <td className="td-right td-mono">{fmt(totals.shop)}</td>
                <td className="td-right td-mono">{fmt(totals.lottery)}</td>
                <td className="td-right td-mono">{fmt(totals.total)}</td>
                <td className="td-right td-mono">{fmtN(totals.gallons)}</td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <div className="card card-pad tips-card">
        <div className="tips-title">
          <Icon name="report" size={18} bg="rgba(39,198,107,0.18)" fg="#27C66B" />
          <span>This Week's Insights</span>
        </div>
        <div className="insights-grid">
          {[
            { icon: 'trendUp', text: `Best day: ${bestDay.day} (${bestDay.date}) - ${fmt(bestDay.total)}` },
            { icon: 'trendDown', text: `Slowest day: ${worstDay.day} (${worstDay.date}) - ${fmt(worstDay.total)}` },
            { icon: 'fuel', text: `You pumped ${fmtN(totals.gallons)} gallons total this week.` },
            { icon: 'cash', text: `Daily average: ${fmt(totals.total / 7)} per day.` },
          ].map((tip, i) => (
            <div key={i} className="insight-card">
              <Icon name={tip.icon} size={16} bg="rgba(39,198,107,0.14)" fg="#27C66B" />
              <span>{tip.text}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const SettingsView = () => {
  const [src, setSrc] = useState(MOCK.source);
  const [fuelAlertPct, setFuelAlertPct] = useState(25);

  return (
    <div className="shell">
      <div className="section-hdr">
        <h1>Settings</h1>
        <p>Manage your POS connection, store details, pricing, and alert settings.</p>
      </div>

      <div className="settings-grid">
        <div className="settings-card">
          <div className="settings-title">POS System Connection</div>
          <div className="settings-sub">Choose which POS system to pull data from.</div>
          <div className="pos-picker">
            {['gilbargo', 'ruby'].map((s) => (
              <div key={s} className={`pos-option${src === s ? ' active' : ''}`} onClick={() => setSrc(s)}>
                <Icon
                  name={s === 'gilbargo' ? 'fuel' : 'report'}
                  size={22}
                  bg={src === s ? 'rgba(39,198,107,0.16)' : 'rgba(148,163,184,0.14)'}
                  fg={src === s ? '#27C66B' : '#64748B'}
                  style={{ margin: '0 auto' }}
                />
                <div className="pos-label">{s === 'gilbargo' ? 'Gilbargo POS' : 'Ruby POS'}</div>
              </div>
            ))}
          </div>
          <label className="form-label">POS URL / API Endpoint</label>
          <input className="form-input" placeholder="https://pos.yourstore.com/api" />
          <label className="form-label">API Key or Token</label>
          <input className="form-input" type="password" placeholder="Enter your API key" />
          <button className="connect-btn">
            <Icon name="connect" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Connect POS System</span>
          </button>
          <div className="connect-status">
            <span className="source-dot"></span>
            <span>Not connected - using demo data</span>
          </div>
        </div>

        <div className="settings-card">
          <div className="settings-title">Store Details</div>
          <div className="settings-sub">Your store information.</div>
          <label className="form-label">Store Name</label>
          <input className="form-input" defaultValue={MOCK.store.name} />
          <label className="form-label">Store Address</label>
          <input className="form-input" defaultValue={MOCK.store.location} />
          <label className="form-label">Owner / Manager Name</label>
          <input className="form-input" placeholder="Your name" />
          <button className="connect-btn">
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Save Details</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Current Fuel Prices</div>
          <div className="settings-sub">Update pump prices to track your profit correctly.</div>
          {MOCK.fuel.grades.map((g) => (
            <div key={g.name}>
              <label className="form-label">{g.name} (per gallon)</label>
              <input className="form-input" defaultValue={'$' + g.price} />
            </div>
          ))}
          <button className="connect-btn">
            <Icon name="save" size={16} bg="rgba(255,255,255,0.12)" fg="#86EFAC" />
            <span>Update Prices</span>
          </button>
        </div>

        <div className="settings-card">
          <div className="settings-title">Alert Settings</div>
          <div className="settings-sub">Get notified about important things.</div>
          {[
            { label: 'Alert when cash is short', on: true },
            { label: 'Alert when tank level is low', on: true },
            { label: 'Daily sales summary at end of day', on: true },
            { label: 'Alert when lottery payout is high', on: false },
          ].map((item, i) => (
            <div key={i} className="toggle-row">
              <span className="toggle-label">{item.label}</span>
              {item.label === 'Alert when tank level is low' ? (
                <div className="toggle-inline-control">
                  <span className="toggle-inline-label">Remind at</span>
                  <input
                    className="toggle-inline-input"
                    value={`${fuelAlertPct}%`}
                    onChange={(e) => {
                      const digits = e.target.value.replace(/[^\d]/g, '');
                      const next = digits === '' ? '' : Math.min(100, Number(digits));
                      setFuelAlertPct(next === '' ? '' : next);
                    }}
                  />
                </div>
              ) : null}
              <div className={`toggle-switch${item.on ? ' on' : ''}`}></div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
};

const App = () => {
  const [view, setView] = useState('today');
  const [viewMode, setViewMode] = useState('default');
  const [shopCategory, setShopCategory] = useState('overview');
  const [shopExpanded, setShopExpanded] = useState(true);
  const [reportPage, setReportPage] = useState('week');
  const [pricebookPage, setPricebookPage] = useState('inventory');
  const [reportExpanded, setReportExpanded] = useState(false);
  const [mobileNavOpen, setMobileNavOpen] = useState(false);

  return (
    <>
      {mobileNavOpen ? <div className="mobile-sidebar-overlay" onClick={() => setMobileNavOpen(false)}></div> : null}
      <Sidebar
        active={view}
        setActive={setView}
        alerts={MOCK.alerts.length}
        shopCategory={shopCategory}
        setShopCategory={setShopCategory}
        shopExpanded={shopExpanded}
        setShopExpanded={setShopExpanded}
        reportPage={reportPage}
        setReportPage={setReportPage}
        reportExpanded={reportExpanded}
        setReportExpanded={setReportExpanded}
        mobileNavOpen={mobileNavOpen}
        setMobileNavOpen={setMobileNavOpen}
      />
      <div className="main">
        <TopBar view={view} setMobileNavOpen={setMobileNavOpen} />
        <div className="content">
          {view === 'today' ? <TodayView viewMode={viewMode} setViewMode={setViewMode} /> : null}
          {view === 'transactions' ? <TransactionsView /> : null}
          {view === 'fuel' ? <FuelView /> : null}
          {view === 'shop' ? <ShopView viewMode={viewMode} shopCategory={shopCategory} setShopCategory={setShopCategory} /> : null}
          {view === 'pricebook' ? <PricebookView pricebookPage={pricebookPage} setPricebookPage={setPricebookPage} /> : null}
          {view === 'reports' ? <ReportsView reportPage={reportPage} setReportPage={setReportPage} /> : null}
          {view === 'settings' ? <SettingsView /> : null}
        </div>
      </div>
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
